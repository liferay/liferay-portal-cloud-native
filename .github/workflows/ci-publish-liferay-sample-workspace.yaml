jobs:
    publish-liferay-sample-workspace:
        secrets: inherit
        uses: ./.github/workflows/ci-publish-workspace.yaml
        with:
            workspace-name: liferay-sample-workspace
name: CI Publish Liferay Sample Workspace
on:
    push:
        branches:
            - master
        paths:
            - workspaces/liferay-sample-workspace/**