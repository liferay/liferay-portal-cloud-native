jobs:
    publish-liferay-clarity-workspace:
        secrets: inherit
        uses: ./.github/workflows/ci-publish-workspace.yaml
        with:
            workspace-name: liferay-clarity-workspace
name: CI Publish Liferay Clarity Workspace
on:
    push:
        branches:
            - master
        paths:
            - workspaces/liferay-clarity-workspace/**