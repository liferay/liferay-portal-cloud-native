jobs:
    publish-liferay-ticket-workspace:
        secrets: inherit
        uses: ./.github/workflows/ci-publish-workspace.yaml
        with:
            workspace-name: liferay-ticket-workspace
name: CI Publish Liferay Ticket Workspace
on:
    push:
        branches:
            - master
        paths:
            - workspaces/liferay-ticket-workspace/**