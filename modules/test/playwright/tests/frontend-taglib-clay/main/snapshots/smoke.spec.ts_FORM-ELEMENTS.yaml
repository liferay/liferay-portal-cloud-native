        -   option "Sample 2"
        -   option "Sample 3"
        -   option "Sample 4"
        -   option "Sample 5"
        -   option "Sample 6"
        -   option "Sample 7"
    -   text: Multiple Select Element
    -   listbox "Multiple Select Element":
