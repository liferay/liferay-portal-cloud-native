liferay-releng-app-description=Aplikace ${liferay.releng.app.title.prefix} Enterprise Search Cross-Cluster Replication umožňuje provádět operace čtení z lokálního clusteru, který byl nakonfigurován k replikaci neboli sledování indexů vzdáleného clusteru. Lokální cluster obsahující replikované indexy musí být před spuštěním požadavků na něj nakonfigurován ručně. Více informací o aplikaci Cross-Cluster Replication naleznete na adrese https://www.elastic.co/guide/en/elasticsearch/reference/7.9/xpack-ccr.html.<br />Informace o kompatibilitě naleznete v matici kompatibility: https://help.liferay.com/hc/en-us/articles/360016511651#Liferay-Enterprise-Search.