liferay-releng-app-description=Využijte snadno použitelné a intuitivní uživatelské rozhraní Liferay Reports pro vytváření a plánování generování reportů. Aplikace Liferay Reports obsahuje modul pro tvorbu reportů s Jasper Reports, což je vynikající implementace, která vám umožňuje ihned po instalaci nahrávat definice reportů (navržené v návrháři reportů) do Správy reportů a spouštět je na kartě Definice. Generujte reporty ručně nebo plánujte jejich spuštění. Exportujte reporty do formátů HTML, CSV, XLS, PDF a dalších. Reporty lze zobrazit v aplikaci Správa reportů v Ovládacích panelech nebo na stránce v aplikaci Zobrazení reportů a lze je také doručit e-mailem.