##
## Test Suites
##

    modified.files.includes[relevant][saml-rule]=**

    relevant.rule.names=\
        saml-rule

    test.batch.names[relevant][saml-rule]=\
        functional-tomcat90-mysql57,\
        modules-integration-mysql57,\
        modules-unit

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*][relevant][saml-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57][relevant][saml-rule]=\
        dxp/apps/saml/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit][relevant][saml-rule]=\
        dxp/apps/saml/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*][relevant][saml-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "SAML") OR \
            (testray.main.component.name ~ "SAML")\
        )

##
## Testray
##

    testray.main.component.name=SAML