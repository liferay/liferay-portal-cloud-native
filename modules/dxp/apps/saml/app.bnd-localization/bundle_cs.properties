liferay-releng-app-description=Security Assertion Markup Language 2.0 (SAML 2.0) je verze standardu SAML OASIS pro výměnu ověřovacích a autorizačních dat mezi bezpečnostními doménami. SAML 2.0 je protokol založený na XML, který používá bezpečnostní tokeny obsahující aserce k předávání informací o principalu (obvykle koncovém uživateli) mezi poskytovatelem identity a webovou službou. SAML 2.0 umožňuje webové ověřování a autorizační scénáře včetně jednotného přihlášení (SSO). Tato aplikace umožňuje aplikaci Liferay fungovat jako poskytovatel identity (IdP) nebo poskytovatel služeb (SP) SAML 2.0. Je postavena na OpenSAML a používá úložiště klíčů Java pro poskytování certifikátů/přihlašovacích údajů pro zabezpečení. Po instalaci této aplikace je nutná další konfigurace, aby se aplikace přizpůsobila vašemu místnímu prostředí a konfiguraci SAML. Navštivte odkaz Dokumentace a dozvíte se více o SAML a jeho možnostech konfigurace.<br /><br />Podporovaní poskytovatelé SAML: PingFederate, ADFS, Shibboleth, Siteminder a OpenAM.