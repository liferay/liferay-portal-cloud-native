components:
    schemas:
        AgentDefinition:
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    readOnly: true
                    type: object
                active:
                    type: boolean
                description:
                    type: string
                externalReferenceCode:
                    readOnly: true
                    type: string
                id:
                    format: int64
                    readOnly: true
                    type: integer
                inputVariables:
                    items:
                        $ref: "#/components/schemas/Variable"
                    type: array
                outputVariable:
                    $ref: "#/components/schemas/Variable"
                title:
                    type: string
                version:
                    readOnly: true
                    type: integer
                workflowDefinitionName:
                    type: string
            type: object
        Chat:
            properties:
                externalReferenceCode:
                    type: string
            type: object
        Message:
            properties:
                chat:
                    $ref: "#/components/schemas/Chat"
                    readOnly: true
                context:
                    additionalProperties: true
                    type: object
                scope:
                    $ref: "#/components/schemas/Scope"
                text:
                    type: string
            type: object
        Scope:
            properties:
                externalReferenceCode:
                    type: string
            type: object
        Task:
            properties:
                context:
                    additionalProperties: true
                    type: object
                    writeOnly: true
                externalReferenceCode:
                    readOnly: true
                    type: string
                scope:
                    $ref: "#/components/schemas/Scope"
                sseEventSinkKey:
                    type: string
                type:
                    type: string
            type: object
        Token:
            properties:
                accessToken:
                    readOnly: true
                    type: string
                scope:
                    readOnly: true
                    type: string
                serviceURL:
                    readOnly: true
                    type: string
                userToken:
                    readOnly: true
                    type: string
            type: object
        Variable:
            properties:
                name:
                    type: string
                type:
                    type: string
            type: object
info:
    description:
        "A Java client JAR is available for use with the group ID 'com.liferay', artifact ID
        'com.liferay.ai.hub.rest.client', and version '1.0.6'."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: ""
    version: v1.0
openapi: 3.0.1
paths:
    "/agent-definitions":
        get:
            operationId: getAgentDefinitionsPage
            parameters:
                -   in: query
                    name: filter
                    schema:
                        type: string
                -   in: query
                    name: page
                    schema:
                        type: integer
                -   in: query
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    name: search
                    schema:
                        type: string
                -   in: query
                    name: sort
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/AgentDefinition"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/AgentDefinition"
                                type: array
            tags: ["AgentDefinition"]
    "/agent-definitions/by-external-reference-code/{externalReferenceCode}":
        delete:
            operationId: deleteAgentDefinitionByExternalReferenceCode
            parameters:
                -   in: path
                    name: externalReferenceCode
                    required: true
                    schema:
                        type: string
            responses:
                204:
                    content:
                        application/json: {}
                        application/xml: {}
            tags: ["AgentDefinition"]
    "/agent-definitions/by-external-reference-code/{externalReferenceCode}/copy":
        post:
            operationId: postAgentDefinitionByExternalReferenceCodeCopy
            parameters:
                -   in: path
                    name: externalReferenceCode
                    required: true
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AgentDefinition"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/AgentDefinition"
            tags: ["AgentDefinition"]
    "/agent-definitions/by-external-reference-code/{externalReferenceCode}/update-active":
        patch:
            operationId: patchAgentDefinitionByExternalReferenceCodeUpdateActive
            parameters:
                -   in: path
                    name: externalReferenceCode
                    required: true
                    schema:
                        type: string
                -   in: query
                    name: active
                    required: true
                    schema:
                        type: boolean
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AgentDefinition"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/AgentDefinition"
            tags: ["AgentDefinition"]
    "/chats/by-external-reference-code/{externalReferenceCode}/messages":
        post:
            operationId: postChatByExternalReferenceCodeMessage
            parameters:
                -   in: path
                    name: externalReferenceCode
                    required: true
                    schema:
                        type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Message"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/Message"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Message"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Message"
            tags: ["Message"]
    "/chats/subscribe":
        get:
            operationId: getChatSubscribe
            parameters:
                -   in: context
                    name: sseEventSink
                    schema:
                        type: sseEventSink
            responses:
                200:
                    content:
                        text/event-stream: {}
            tags: ["Chat"]
    "/tasks":
        post:
            operationId: postTask
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Task"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/Task"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Task"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Task"
            tags: ["Task"]
    "/tasks/subscribe":
        get:
            operationId: getTaskSubscribe
            parameters:
                -   in: context
                    name: sseEventSink
                    schema:
                        type: sseEventSink
            responses:
                200:
                    content:
                        text/event-stream: {}
            tags: ["Task"]
    "/tokens":
        post:
            operationId: postToken
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Token"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Token"
            tags: ["Token"]