components:
    schemas:
        Chat:
            properties:
                externalReferenceCode:
                    type: string
            type: object
        Message:
            properties:
                chat:
                    $ref: "#/components/schemas/Chat"
                    readOnly: true
                context:
                    additionalProperties: true
                    type: object
                scope:
                    $ref: "#/components/schemas/Scope"
                text:
                    type: string
            type: object
        Scope:
            properties:
                externalReferenceCode:
                    type: string
            type: object
        Task:
            properties:
                context:
                    additionalProperties: true
                    type: object
                    writeOnly: true
                externalReferenceCode:
                    readOnly: true
                    type: string
                scope:
                    $ref: "#/components/schemas/Scope"
                type:
                    type: string
            type: object
info:
    description:
        "A Java client JAR is available for use with the group ID 'com.liferay', artifact ID
        'com.liferay.ai.hub.rest.client', and version '1.0.2'."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: ""
    version: v1.0
openapi: 3.0.1
paths:
    "/by-external-reference-code/{externalReferenceCode}/tasks":
        post:
            operationId: postByExternalReferenceCodeTask
            parameters:
                -   in: path
                    name: externalReferenceCode
                    required: true
                    schema:
                        type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Task"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/Task"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Task"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Task"
            tags: ["Task"]
    "/chats/by-external-reference-code/{externalReferenceCode}/messages":
        post:
            operationId: postChatByExternalReferenceCodeMessage
            parameters:
                -   in: path
                    name: externalReferenceCode
                    required: true
                    schema:
                        type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Message"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/Message"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Message"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Message"
            tags: ["Message"]
    "/chats/subscribe":
        get:
            operationId: getChatSubscribe
            parameters:
                -   in: context
                    name: sseEventSink
                    schema:
                        type: sseEventSink
            responses:
                200:
                    content:
                        text/event-stream: {}
            tags: ["Chat"]
    "/tasks/subscribe":
        get:
            operationId: getTaskSubscribe
            parameters:
                -   in: context
                    name: sseEventSink
                    schema:
                        type: sseEventSink
            responses:
                200:
                    content:
                        text/event-stream: {}
            tags: ["Task"]