components:
    schemas:
        AgentDefinition:
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    readOnly: true
                    type: object
                active:
                    type: boolean
                description:
                    type: string
                externalReferenceCode:
                    readOnly: true
                    type: string
                id:
                    format: int64
                    readOnly: true
                    type: integer
                inputVariables:
                    items:
                        $ref: "#/components/schemas/Variable"
                    type: array
                outputVariable:
                    $ref: "#/components/schemas/Variable"
                status:
                    $ref: "#/components/schemas/Status"
                    readOnly: true
                title:
                    type: string
                version:
                    readOnly: true
                    type: integer
                workflowDefinitionName:
                    type: string
            type: object
        AgentInstance:
            properties:
                agentDefinitionExternalReferenceCode:
                    type: string
                context:
                    additionalProperties: true
                    type: object
                    writeOnly: true
                externalReferenceCode:
                    readOnly: true
                    type: string
                sseEventSinkKey:
                    type: string
            type: object
        Chat:
            properties:
                externalReferenceCode:
                    type: string
            type: object
        ContentRetriever:
            properties:
                crawlDate:
                    format: date-time
                    type: string
                description:
                    readOnly: true
                    type: string
                description_i18n:
                    additionalProperties:
                        type: string
                    type: object
                externalReferenceCode:
                    type: string
                indexName:
                    type: string
                title:
                    readOnly: true
                    type: string
                title_i18n:
                    additionalProperties:
                        type: string
                    type: object
                type:
                    type: string
                url:
                    type: string
            type: object
        Message:
            properties:
                chat:
                    $ref: "#/components/schemas/Chat"
                    readOnly: true
                context:
                    additionalProperties: true
                    type: object
                instructionDefinitionScope:
                    enum:
                        -   clickToChat
                        -   cms
                        -   everywhere
                    type: string
                text:
                    type: string
            type: object
        Site:
            properties:
                externalReferenceCode:
                    readOnly: true
                    type: string
            type: object
        Status:
            properties:
                code:
                    format: int32
                    type: integer
                label:
                    type: string
                label_i18n:
                    type: string
            type: object
        Variable:
            properties:
                name:
                    type: string
                type:
                    type: string
            type: object
info:
    description:
        "A Java client JAR is available for use with the group ID 'com.liferay', artifact ID
        'com.liferay.ai.hub.rest.client', and version '1.0.6'."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: ""
    version: v1.0
openapi: 3.0.1
paths:
    "/agent-definitions":
        get:
            operationId: getAgentDefinitionsPage
            parameters:
                -   in: query
                    name: filter
                    schema:
                        type: string
                -   in: query
                    name: page
                    schema:
                        type: integer
                -   in: query
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    name: search
                    schema:
                        type: string
                -   in: query
                    name: sort
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/AgentDefinition"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/AgentDefinition"
                                type: array
            tags: ["AgentDefinition"]
    "/agent-definitions/by-external-reference-code/{externalReferenceCode}":
        delete:
            operationId: deleteAgentDefinitionByExternalReferenceCode
            parameters:
                -   in: path
                    name: externalReferenceCode
                    required: true
                    schema:
                        type: string
            responses:
                204:
                    content:
                        application/json: {}
                        application/xml: {}
            tags: ["AgentDefinition"]
    "/agent-definitions/by-external-reference-code/{externalReferenceCode}/copy":
        post:
            operationId: postAgentDefinitionByExternalReferenceCodeCopy
            parameters:
                -   in: path
                    name: externalReferenceCode
                    required: true
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AgentDefinition"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/AgentDefinition"
            tags: ["AgentDefinition"]
    "/agent-definitions/by-external-reference-code/{externalReferenceCode}/update-active":
        patch:
            operationId: patchAgentDefinitionByExternalReferenceCodeUpdateActive
            parameters:
                -   in: path
                    name: externalReferenceCode
                    required: true
                    schema:
                        type: string
                -   in: query
                    name: active
                    required: true
                    schema:
                        type: boolean
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AgentDefinition"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/AgentDefinition"
            tags: ["AgentDefinition"]
    "/agent-instances":
        post:
            operationId: postAgentInstance
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AgentInstance"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/AgentInstance"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AgentInstance"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/AgentInstance"
            tags: ["AgentInstance"]
    "/agent-instances/subscribe":
        get:
            operationId: getAgentInstanceSubscribe
            parameters:
                -   in: context
                    name: sseEventSink
                    schema:
                        type: sseEventSink
            responses:
                200:
                    content:
                        text/event-stream: {}
            tags: ["AgentInstance"]
    "/chats/by-external-reference-code/{externalReferenceCode}/messages":
        post:
            operationId: postChatByExternalReferenceCodeMessage
            parameters:
                -   in: path
                    name: externalReferenceCode
                    required: true
                    schema:
                        type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Message"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/Message"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Message"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Message"
            tags: ["Message"]
    "/chats/subscribe":
        get:
            operationId: getChatSubscribe
            parameters:
                -   in: context
                    name: sseEventSink
                    schema:
                        type: sseEventSink
            responses:
                200:
                    content:
                        text/event-stream: {}
            tags: ["Chat"]
    "/content-retrievers":
        post:
            operationId: postContentRetriever
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/ContentRetriever"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/ContentRetriever"
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ContentRetriever"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/ContentRetriever"
            tags: ["ContentRetriever"]
    "/content-retrievers/by-external-reference-code/{externalReferenceCode}":
        delete:
            operationId: deleteContentRetrieverByExternalReferenceCode
            parameters:
                -   in: path
                    name: externalReferenceCode
                    required: true
                    schema:
                        type: string
            responses:
                204:
                    content:
                        application/json: {}
                        application/xml: {}
            tags: ["ContentRetriever"]
    "/sites/by-external-reference-code/{externalReferenceCode}/site-initializer":
        put:
            operationId: putSiteByExternalReferenceCodeSiteInitializer
            parameters:
                -   in: path
                    name: externalReferenceCode
                    required: true
                    schema:
                        type: string
            responses:
                204:
                    content:
                        application/json: {}
                        application/xml: {}
            tags: ["Site"]