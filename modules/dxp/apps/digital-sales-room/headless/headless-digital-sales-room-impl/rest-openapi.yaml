components:
    schemas:
        DigitalSalesRoom:
            properties:
                accountId:
                    format: int64
                    type: integer
                accountName:
                    readOnly: true
                    type: string
                banner:
                    $ref: "#/components/schemas/FileEntry"
                channelId:
                    format: int64
                    type: integer
                channelName:
                    type: string
                clientLogo:
                    $ref: "#/components/schemas/FileEntry"
                clientName:
                    type: string
                createDate:
                    format: date
                    readOnly: true
                    type: string
                description:
                    type: string
                externalReferenceCode:
                    type: string
                friendlyUrlPath:
                    type: string
                id:
                    format: int64
                    readOnly: true
                    type: integer
                modifiedDate:
                    format: date
                    readOnly: true
                    type: string
                name:
                    type: string
                ownerId:
                    format: int64
                    readOnly: true
                    type: integer
                ownerName:
                    readOnly: true
                    type: string
                primaryColor:
                    type: string
                secondaryColor:
                    type: string
        FileEntry:
            properties:
                fileBase64:
                    type: string
                fileName:
                    type: string
                fileURL:
                    readOnly: true
                    type: string
                id:
                    format: int64
                    readOnly: true
                    type: integer
info:
