    title: ""
    version: v1.0
openapi: 3.0.1
paths:
    "/digital-sales-rooms":
        get:
            operationId: getDigitalSalesRoomsPage
            parameters:
                -   in: query
                    name: page
                    schema:
                        type: integer
                -   in: query
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    name: search
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/DigitalSalesRoom"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/DigitalSalesRoom"
                                type: array
            tags: ["DigitalSalesRoom"]
        post:
            operationId: postDigitalSalesRoom
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/DigitalSalesRoom"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/DigitalSalesRoom"
            responses:
                201:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/DigitalSalesRoom"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/DigitalSalesRoom"
            tags: ["DigitalSalesRoom"]
    "/digital-sales-rooms/{digitalSalesRoomId}":
        get:
            operationId: getDigitalSalesRoom
            parameters:
                -   in: path
                    name: digitalSalesRoomId
                    required: true
                    schema:
                        format: int64
                        type: integer
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/DigitalSalesRoom"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/DigitalSalesRoom"
            tags: ["DigitalSalesRoom"]