liferay-releng-app-description=Aplikace ${liferay.releng.app.title.prefix} Enterprise Search Monitoring monitoruje váš cluster Elasticsearch v reálném čase tím, že poskytuje pohled na uživatelské rozhraní Kibana Monitoring prostřednictvím instance Liferay DXP.<br />Podle webových stránek společnosti Elastic: "Z uživatelského rozhraní Kibana Monitoring můžete na první pohled odhalit problémy a v průběhu času se ponořit do chování systému, abyste diagnostikovali provozní problémy."<br />Před použitím pluginu ${liferay.releng.app.title.prefix} Enterprise Search Monitoring musíte nainstalovat Kibanu. Další informace o monitorování Elasticsearch naleznete na adrese https://www.elastic.co/guide/en/kibana/current/xpack-monitoring.html.<br />Informace o kompatibilitě naleznete v matici kompatibility: https://help.liferay.com/hc/en-us/articles/360016511651#Liferay-Enterprise-Search.