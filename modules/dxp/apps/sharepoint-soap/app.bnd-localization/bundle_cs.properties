liferay-releng-app-description=Aplikace Liferay SOAP konektor pro SharePoint umožňuje uživatelům interagovat se soubory v knihovnách SharePointu z knihovny Dokumenty a média Liferay. Tato aplikace zpřístupňuje v knihovně Dokumenty a média typ úložiště SharePointu pro připojení knihoven SharePointu. V rámci takového úložiště mohou uživatelé prohlížet, přidávat, upravovat a přesouvat soubory a složky. Aplikace přenáší akce provedené v knihovně SharePointu do úložiště SharePointu v knihovně Dokumenty a média Liferay a naopak.<br /><br />Zde jsou některé z funkcí aplikace:<br /><br />* Čtení/zápis dokumentů a složek<br />* Získávání, vyzvedávání a vrácení dokumentů<br />* Stahování dokumentů<br />* Přesouvání složek a dokumentů v rámci úložiště<br />* Získávání historie revizí<br />* Návrat k revizi<br /><br />Aktuální verze aplikace funguje se SharePointem 2013.<br /><br />Propojte svou platformu Liferay Digital Experience Platform s knihovnami SharePointu ještě dnes!<br /><br />Důležitá změna: Název této aplikace byl nedávno změněn. Prosím navštivte adresu https://help.liferay.com/hc/en-us/articles/360018233992 pro další informace o postupu instalace.