liferay-releng-app-description=Propojte Salesforce Sales Cloud s Liferay DXP a zajistěte bezproblémový zákaznický servis. S Liferay Connector to Salesforce automaticky synchronizujte účty a kontakty ze Salesforce Sales Cloud do Liferay DXP pro bezproblémový onboarding zákazníků. Automaticky přenášejte produkty a ceny do Liferay DXP, takže je stačí spravovat pouze na jednom místě. Odesílejte objednávky z Liferay DXP do Salesforce Sales Cloud pro lepší reporting a přehled v rámci vaší prodejní sítě. Nakonec konfigurujte, plánujte a sledujte úlohy, a to vše v Liferay.<br /><br />Salesforce to Liferay:<br /><br />* Kontakty<br /> Produkty<br />* Ceníky<br />* Položky v ceníku<br /><br />Liferay do Salesforce a Salesforce do Liferay<br /><br />* Účty<br />* Adresy<br />* Objednávky<br />* Položky objednávky<br />* Poznámky k objednávce<br /><br />Liferay Connector to Salesforce je kompatibilní s Liferay DXP 7.4 a Salesforce API verze 44.0 (SOAP).