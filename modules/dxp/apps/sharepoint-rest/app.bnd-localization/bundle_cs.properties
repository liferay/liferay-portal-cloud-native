liferay-releng-app-description=Liferay REST Connector pro SharePoint umožňuje uživatelům interagovat se soubory v knihovnách SharePointu z knihovny Dokumenty a média Liferay. Tato aplikace zpřístupňuje v knihovně Dokumenty a média typ úložiště SharePointu pro připojení knihoven SharePointu. V rámci takového úložiště mohou uživatelé prohlížet, přidávat, upravovat a přesouvat soubory a složky. Aplikace šíří akce provedené v knihovně SharePointu do repozitáře SharePointu v knihovně dokumentů a médií Liferay a naopak.<br /><br />Zde jsou některé z funkcí aplikace:<br /><br />* Čtení/zápis dokumentů a složek<br />* Získávání, vyzvedávání a vrácení dokumentů zpět<br />* Stahování dokumentů<br />* Přesouvání složek a dokumentů v rámci repozitáře<br />* Získávání historie revizí<br />* Návrat k revizi<br /><br />Liferay REST Connector pro SharePoint:<br /><br />* Funguje se SharePointem 2016 a SharePointem Online<br />* Používá Azure ACS s OAuth 2 pro autorizaci na serveru SharePoint (proto musíte na svém aplikačním serveru povolit podporu HTTPS)<br /><br />Propojte svou platformu Liferay Digital Experience Platform s knihovnami SharePointu ještě dnes!<br /><br />Důležitá změna: Název této aplikace byl nedávno změněn. Další informace o postupu instalace naleznete na adrese https://help.liferay.com/hc/en-us/articles/360018233992.