liferay-releng-app-description=Aplikace ${liferay.releng.app.title.prefix} Enterprise Search Experiences obsahuje sadu funkcí, které odemykají plný potenciál vyhledávacího frameworku Liferay pro všechny uživatele Liferay. První verze představuje funkci "Search Blueprints". S Blueprints mohou administrátoři vyhledávání<br /><br />* Upravit výchozí chování vyhledávání Liferay nebo jej zcela přepsat<br />* Poskytovat kontextové výsledky vyhledávání na základě atributů uživatele vyhledávání<br /><br />Search Blueprints umožňuje administrátorům vyhledávání upřesnit výchozí chování vyhledávání Liferay nebo vytvořit zcela vlastní vyhledávací algoritmy pomocí vizuálního nástroje pro tvorbu dotazů bez kódu. Každý Blueprint se skládá z několika stavebních bloků nazývaných "prvky"; každý prvek nějakým způsobem ovlivňuje vyhledávací dotaz. Například můžete vytvořit Blueprint přidáním jednoho prvku, který skryje obsah označený štítkem "vypršela platnost", dalšího, který ignoruje komentáře, a dalšího, který obsahuje pole normálně ignorovaná výchozím vyhledávacím algoritmem.<br /><br />Každý prvek můžete konfigurovat pomocí známých ovládacích prvků uživatelského rozhraní, jako jsou vstupní pole, rozbalovací seznamy a výběry data. Aplikace Blueprints obsahuje několik praktických prvků (např. prvky pro vylepšení výsledků podle geolokace, aktuálnosti obsahu, časově podmíněné vylepšení atd.). Kromě toho si můžete vytvořit nové prvky, abyste využili všechny možnosti vyhledávacího frameworku Liferay.<br /><br />Vyhledávací plány jsou kontextově orientované. Můžete poskytovat personalizované výsledky vyhledávání na základě profilu uživatele, rolí, lokality, místního času, segmentu atd. Plán může například vylepšit případové studie z výrobního průmyslu na základě e-mailové adresy nebo pracovní pozice uživatele.<br /><br />Každá vyhledávací stránka může používat jiný plán, což umožňuje jedinečné vyhledávací algoritmy pro různé případy použití vyhledávání, jako jsou intranety, obchodní a marketingové weby.