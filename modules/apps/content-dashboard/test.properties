modified.files.includes[relevant][content-dashboard-java-rule]=\
    **/*.java,\
    **/test/**,\
    **/testIntegration/**

modules.includes.required.test.batch.class.names.includes[modules-integration-*][relevant][content-dashboard-java-rule]=\
    apps/content-dashboard/**/src/testIntegration/**/*Test.java

modules.includes.required.test.batch.class.names.includes[modules-unit][relevant][content-dashboard-java-rule]=\
    apps/content-dashboard/**/*Test.java

relevant.rule.names=content-dashboard-java-rule

test.batch.names[relevant][content-dashboard-java-rule]=\
    modules-integration-postgresql163,\
    modules-unit

test.batch.run.property.query[functional-tomcat-mysql*-jdk*][test-portal-hotfix-release]=\
    (portal.acceptance == true) AND \
    (testray.main.component.name ~ "Content Dashboard")

testray.main.component.name=Content Dashboard