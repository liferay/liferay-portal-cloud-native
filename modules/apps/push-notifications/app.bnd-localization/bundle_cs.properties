liferay-releng-app-description=Aplikace Liferay Push nabízí framework, který umožňuje vývojářům odesílat push notifikace z Liferay do nativních aplikací pro Android a iOS. Využitím Liferay Push můžete zajistit, aby vaši uživatelé věděli o nejnovějších informacích ve vaší instanci Liferay, bez ohledu na to, kde se nacházejí. Push funguje také bezproblémově s obrazovkami Liferay. Instalace aplikace Liferay Push automaticky zpřístupňuje její framework push notifikací. Tato aplikace také obsahuje portlet Ovládací panel, který můžete použít k odesílání testovacích push notifikací.