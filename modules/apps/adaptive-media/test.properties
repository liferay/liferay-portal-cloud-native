modified.files.includes[relevant][adaptive-media-java-rule]=\
    **/*.java,\
    **/test/**,\
    **/testIntegration/**

modules.includes.required.test.batch.class.names.includes[modules-integration-postgresql163][relevant][adaptive-media-java-rule]=\
    apps/adaptive-media/**/*Test.java

modules.includes.required.test.batch.class.names.includes[modules-unit][relevant][adaptive-media-java-rule]=\
    apps/adaptive-media/**/*Test.java

relevant.rule.names=adaptive-media-java-rule

test.batch.names[relevant][adaptive-media-java-rule]=\
    modules-integration-postgresql163,\
    modules-unit

test.batch.run.property.query[functional-tomcat-mysql*-jdk*][test-portal-hotfix-release]=\
    (portal.acceptance == true) AND \
    (\
        (testray.component.names ~ "Adaptive Media") OR \
        (testray.main.component.name ~ "Adaptive Media")\
    )

testray.main.component.name=Adaptive Media