modified.files.includes[relevant][portlet-configuration-java-rule]=\
    **/*.java,\
    **/test/**,\
    **/testIntegration/**

modules.includes.required.test.batch.class.names.includes[modules-integration-postgresql163][relevant][portlet-configuration-java-rule]=\
    apps/portlet-configuration/**/*Test.java

modules.includes.required.test.batch.class.names.includes[modules-unit][relevant][portlet-configuration-java-rule]=\
    apps/portlet-configuration/**/*Test.java

relevant.rule.names=portlet-configuration-java-rule

test.batch.names[relevant][portlet-configuration-java-rule]=\
    modules-integration-postgresql163,\
    modules-unit

test.batch.run.property.query[functional-tomcat-mysql*-jdk*][test-portal-hotfix-release]=\
    (portal.acceptance == true) AND \
    (\
        (testray.main.component.name ~ "Look And Feel") OR \
        (testray.main.component.name ~ "Web Search")\
    )

testray.main.component.name=Widget Configuration