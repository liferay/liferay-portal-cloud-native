cookies-consent-description=Kun vierailet millรค tahansa verkkosivustolla, se saattaa tallentaa tai noutaa tietoa selaimessasi, enimmรคkseen evรคsteiden muodossa. Nรคmรค tiedot voivat koskea sinua, asetuksiasi tai laitettasi, ja niitรค kรคytetรครคn enimmรคkseen saamaan sivusto toimimaan odotetulla tavalla. Nรคistรค tiedoista ei voi yleensรค tunnistaa sinua suoraan, mutta ne voivat antaa sinulle personoidumman verkkokokemuksen. Voit pรครคttรครค olla sallimatta joitakin evรคstetyyppejรค. Napsauta eri luokkien otsikoita lukeaksesi lisรครค ja muuttaaksesi oletusasetuksiasmme. Tietyn tyyppisten evรคsteiden estรคminen voi kuitenkin vaikuttaa kokemukseesi sivustolla ja palveluihin, joita voimme tarjota.
cookies-description[CONSENT_TYPE_FUNCTIONAL]=Nรคiden evรคsteiden avulla verkkosivusto voi tarjota parempia toimintoja ja personointia. Ne voivat olla meidรคn tai kolmansien osapuolten asettamia, joiden palveluita olemme lisรคnneet sivuillemme. Jos et salli nรคitรค evรคsteitรค, osa tai kaikki nรคistรค palveluista eivรคt vรคlttรคmรคttรค toimi oikein.
