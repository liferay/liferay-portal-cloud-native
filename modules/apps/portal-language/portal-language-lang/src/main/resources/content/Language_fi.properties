cookies-description[CONSENT_TYPE_PERFORMANCE]=Nรคiden evรคsteiden avulla voimme laskea vierailuja ja liikenteen lรคhteitรค, jotta voimme mitata ja parantaa sivustomme toimintaa. Niiden avulla tiedรคmme, mitkรค sivut ovat eniten ja vรคhiten suosittuja, ja nรคemme miten vierailijat liikkuvat sivustolla. Kaikki nรคiden evรคsteiden kerรครคmรคt tiedot ovat koottuja ja nรคin ollen anonyymeja. Jos et salli nรคitรค evรคsteitรค, me emme tiedรค milloin olet vieraillut sivustollamme.
cookies-description[CONSENT_TYPE_PERSONALIZATION]=Nรคmรค evรคsteet voivat olla sivustomme tai mainontakumppaneidemme kautta asetettuja. Nรคmรค yritykset voivat kรคyttรครค niitรค profiilin luomiseen kiinnostuksen kohteistasi ja olennaisten mainosten nรคyttรคmiseksi sinulle muilla sivustoilla. Ne eivรคt tallenna suoraan henkilรถtietoja, mutta ne perustuvat selaimesi ja internet-laitteesi tunnistamiseen. Jos et salli nรคitรค evรคsteitรค, saat vรคhemmรคn kohdennettua mainontaa.
