sandbox-description=Apple ໃຫ້ບໍລິການເຊີບເວີແຊນບັອກ. ເປີດໃຊ້ຕົວເລືອກນີ້ຫາກແອັບມືຖືຂອງທ່ານຍັງບໍ່ໄດ້ຢູ່ໃນຂັ້ນຕອນການໃຊ້ງານຈິງ (production).
