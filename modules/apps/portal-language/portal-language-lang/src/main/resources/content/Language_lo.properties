when-a-user-creates-a-publication,-liferay-automatically-gives-them-the-owner-role=ເມື່ອຜູ້ໃຊ້ສ້າງການເຜີຍແຜ່, Liferay ຈະໃຫ້ບົດບາດ {0}ເຈົ້າຂອງ{1} ແກ່ພວກເຂົາໂດຍອັດຕະໂນມັດ. ໂດຍມາດຕະຖານ, ເຈົ້າຂອງຈະມີສິດອະນຸຍາດເຕັມຮູບແບບ, ລວມທັງຄວາມສາມາດໃນການ {2}ເຜີຍແຜ່{3}. ຖ້າທ່ານຕ້ອງການປ່ຽນແປງສິ່ງນີ້, ໃຫ້ຄລິກທີ່ປຸ່ມລຸ່ມນີ້ເພື່ອແກ້ໄຂສິດອະນຸຍາດການເຜີຍແຜ່ຂອງເຈົ້າຂອງ ແລະ ບົດບາດອື່ນໆ.
when-activated-users-can-define-a-folder-within-cms-files-to-display-the-files-leave-it-unchecked-for-files-to-be-stored-individually-per-entry=ເມື່ອເປີດໃຊ້ງານ, ຜູ້ໃຊ້ສາມາດກຳນົດໂຟນເດີພາຍໃນໄຟລ໌ CMS ເພື່ອສະແດງໄຟລ໌. ປ່ອຍວ່າງໄວ້ (ບໍ່ຕ້ອງໝາຍຕິກ) ເພື່ອໃຫ້ໄຟລ໌ຖືກຈັດເກັບແຍກກັນຕາມແຕ່ລະລາຍການ.
when-activated-users-can-define-a-folder-within-documents-and-media-to-display-the-files-leave-it-unchecked-for-files-to-be-stored-individually-per-entry=ເມື່ອເປີດໃຊ້ງານ, ຜູ້ໃຊ້ສາມາດກຳນົດໂຟນເດີພາຍໃນ "ເອກະສານ ແລະ ສື່" ເພື່ອສະແດງໄຟລ໌. ປະວ່າງໄວ້ (ບໍ່ໝາຍຕິກ) ເພື່ອໃຫ້ໄຟລ໌ຖືກຈັດເກັບແຍກກັນແຕ່ລະລາຍການ.
when-an-object-or-a-cms-structure-is-added-to-this-list,-search-engines-will-be-notified-that-it-is-available-for-crawling=ເມື່ອວັດຖຸ ຫຼື ໂຄງສ້າງ CMS ຖືກເພີ່ມເຂົ້າໃນລາຍການນີ້, ເຄື່ອງມືຄົ້ນຫາ (search engines) ຈະໄດ້ຮັບການແຈ້ງເຕືອນວ່າຂໍ້ມູນນັ້ນພ້ອມສຳລັບການເກັບກຳຂໍ້ມູນ (crawling).
when-checked-the-control-menu-will-be-only-displayed-for-the-specified-roles=ເມື່ອໝາຍຕິກ, ເມນູຄວບຄຸມຈະຖືກສະແດງໃຫ້ສະເພາະບົດບາດທີ່ລະບຸໄວ້ເທົ່ານັ້ນ.
when-creating-a-new-page,-display-an-option-to-add-it-to-this-navigation-menu=ເມື່ອສ້າງໜ້າໃໝ່, ໃຫ້ສະແດງຕົວເລືອກເພື່ອເພີ່ມມັນເຂົ້າໃນເມນູນຳທາງນີ້.
when-do-you-want-to-publish=ເມື່ອໃດທີ່ທ່ານຕ້ອງການເຜີຍແຜ່?
when-enabled,-users-can-override-an-entry's-friendly-url=ເມື່ອເປີດໃຊ້ງານ, ຜູ້ໃຊ້ສາມາດຂຽນທັບ URL ທີ່ເປັນມິດ (friendly URL) ຂອງລາຍການໄດ້. ໂດຍມາດຕະຖານ, URL ທີ່ເປັນມິດຈະອີງຕາມຫົວຂໍ້ຂອງລາຍການ.
when-enabled-a-character-counter-will-be-shown-to-the-user=ເມື່ອເປີດໃຊ້ງານ, ຈະມີຕົວນັບຕົວອັກສອນສະແດງໃຫ້ຜູ້ໃຊ້ເຫັນ.
when-enabled-and-the-relationship-field-is-filled-permissions-are-inherited=ເມື່ອເປີດໃຊ້ງານ ແລະ ຫ້ອງຂໍ້ມູນສາຍພົວພັນຖືກປ້ອນຂໍ້ມູນ, ສິດອະນຸຍາດຈະຖືກສືບທອດ, ແລະ ທຸກຈຸດເຊື່ອມຕໍ່ API ຈະຖືກຈັດກຸ່ມໄວ້ພາຍໃຕ້ແມ່ແບບ.
when-enabled-nonadmin-users-will-see-a-maintenance-page-instead-of-the-site-content=ເມື່ອເປີດໃຊ້ງານ, ຜູ້ໃຊ້ທີ່ບໍ່ແມ່ນຜູ້ດູແລລະບົບຈະເຫັນໜ້າບຳລຸງຮັກສາແທນເນື້ອໃນຂອງເວັບໄຊ. ຜູ້ດູແລລະບົບ ແລະ ຜູ້ບໍລິຫານເວັບໄຊຍັງສາມາດເຂົ້າເຖິງເວັບໄຊໄດ້ຕາມປົກກະຕິ.
when-no-password-policy-is-assigned-to-a-user,-either-explicitly-or-through-an-organization,-the-default-password-policy-is-used=ເມື່ອບໍ່ມີນະໂຍບາຍລະຫັດຜ່ານຖືກກຳນົດໃຫ້ຜູ້ໃຊ້, ບໍ່ວ່າຈະໂດຍກົງ ຫຼື ຜ່ານອົງກອນ, ນະໂຍບາຍລະຫັດຜ່ານມາດຕະຖານຈະຖືກນຳໃຊ້.
when-this-configuration-is-enabled,-a-sitemap-index-is-created=ເມື່ອເປີດໃຊ້ການຕັ້ງຄ່ານີ້, ດັດຊະນີແຜນຜັງເວັບໄຊທ໌ (sitemap index) ຈະຖືກສ້າງຂຶ້ນ. ສິ່ງນີ້ຈະໃຫ້ລິ້ງໄປຫາໄຟລ໌ sitemap ຫຼາຍໄຟລ໌ ແທນທີ່ຈະເປັນໄຟລ໌ໃຫຍ່ໄຟລ໌ດຽວທີ່ລວມເອົາ urlsets ທັງໝົດ. ສິ່ງນີ້ຊ່ວຍປະຢັດແບນວິດ ແລະ ເພີ່ມປະສິດທິພາບ. ເບິ່ງ {0} ສຳລັບຂໍ້ມູນເພີ່ມເຕີມ. ປິດການຕັ້ງຄ່ານີ້ເພື່ອສ້າງໄຟລ໌ sitemap.xml ໂດຍອີງໃສ່ layout set.
when-this-configuration-is-enabled,-search-engines-will-be-notified-that-category-URLs-are-available-for-crawling=ເມື່ອເປີດໃຊ້ງານການກຳນົດຄ່ານີ້, ລະບົບຄົ້ນຫາຈະໄດ້ຮັບການແຈ້ງເຕືອນວ່າ URL ຂອງໝວດໝູ່ພ້ອມສຳລັບການຈັດເກັບຂໍ້ມູນ.
when-this-configuration-is-enabled,-search-engines-will-be-notified-that-child-page-urls-are-available-for-crawling=ເມື່ອເປີດໃຊ້ການຕັ້ງຄ່ານີ້, ເຄື່ອງມືຄົ້ນຫາຈະໄດ້ຮັບການແຈ້ງເຕືອນວ່າ URL ຂອງໜ້າຍ່ອຍພ້ອມສຳລັບການເກັບກຳຂໍ້ມູນ.
when-this-configuration-is-enabled,-search-engines-will-be-notified-that-page-URLs-are-available-for-crawling=ເມື່ອເປີດໃຊ້ການຕັ້ງຄ່ານີ້, ເຄື່ອງມືຄົ້ນຫາຈະໄດ້ຮັບການແຈ້ງເຕືອນວ່າ URL ຂອງໜ້າຕ່າງໆພ້ອມສຳລັບການເກັບກຳຂໍ້ມູນ. ການຕັ້ງຄ່ານີ້ມີຜົນຕໍ່ໜ້າວິດເຈັດ, ໜ້າເນື້ອຫາ, ໜ້າແຜງຄວບຄຸມ ແລະ ໜ້າທີ່ຝັງໄວ້.
when-this-configuration-is-enabled,-search-engines-will-be-notified-that-web-content-URLs-are-available-for-crawling=ເມື່ອເປີດໃຊ້ການຕັ້ງຄ່ານີ້, ເຄື່ອງມືຄົ້ນຫາຈະໄດ້ຮັບການແຈ້ງເຕືອນວ່າ URL ຂອງເນື້ອຫາເວັບພ້ອມສຳລັບການເກັບກຳຂໍ້ມູນ.
when-you-disable-inheritance-the-regular-relationship-is-restored=ເມື່ອທ່ານປິດການສືບທອດ, ສາຍພົວພັນປົກກະຕິຈະຖືກກັບຄືນມາ. ສິດອະນຸຍາດ, ຂັ້ນຕອນການເຮັດວຽກ, ໂຄງສ້າງ API ແລະ UI ຂອງແອັບພລິເຄຊັນສຳລັບລາຍການວັດຖຸຍ່ອຍໃໝ່ ຈະຖືກກຳນົດໂດຍຄຳນິຍາມຂອງວັດຖຸຍ່ອຍນັ້ນ.
