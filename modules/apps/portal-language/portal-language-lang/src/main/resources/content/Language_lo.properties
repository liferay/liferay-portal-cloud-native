product-analytics-banner-content=ພວກເຮົາໃຊ້ຄຸກກີ້ ແລະ ເຕັກໂນໂລຊີທີ່ຄ້າຍຄືກັນເພື່ອເພີ່ມປະສົບການຂອງທ່ານໃນແພລັດຟອມຂອງພວກເຮົາ, ສົ່ງເນື້ອຫາທີ່ປັບແຕ່ງສະເພາະຕົວ, ວິເຄາະແນວໂນ້ມ, ບໍລິຫານເວັບໄຊທ໌, ແລະ ເກັບກຳຂໍ້ມູນປະຊາກອນກ່ຽວກັບຖານຜູ້ໃຊ້ຂອງພວກເຮົາ. ນີ້ລວມມີການເກັບກຳຂໍ້ມູນທັງການເຄື່ອນໄຫວທົ່ວໄປຂອງເວັບໄຊທ໌ ແລະ ຂໍ້ມູນການເຄື່ອນໄຫວຂອງຜູ້ດູແລລະບົບ. ຍອມຮັບຄຸກກີ້ ແລະ ເຕັກໂນໂລຊີທີ່ຄ້າຍຄືກັນທັງໝົດເພື່ອປະສົບການທີ່ດີທີ່ສຸດໃນເວັບໄຊທ໌ ແລະ ແພລັດຟອມຂອງພວກເຮົາ ຫຼື ຈັດການການຕັ້ງຄ່າຂອງທ່ານ.
product-analytics-banner-title=ກ່ອນທີ່ທ່ານຈະດຳເນີນການຕໍ່ກັບ Liferay
product-analytics-configuration-description=ການຕັ້ງຄ່າເຫຼົ່ານີ້ມີຜົນກັບຄຸກກີ້ ແລະ ເຕັກໂນໂລຊີທີ່ຄ້າຍຄືກັນທີ່ໃຊ້ພາຍໃນພາກສ່ວນການບໍລິຫານເວັບໄຊທ໌ຂອງທ່ານ, ເຊັ່ນ: ພື້ນທີ່ສຳລັບການຈັດການ, ການຕັ້ງຄ່າ, ຫຼື ການແກ້ໄຂເວັບໄຊທ໌ຂອງທ່ານ. ພວກມັນບໍ່ກ່ຽວຂ້ອງກັບຄຸກກີ້ທີ່ໃຊ້ໃນເວັບໄຊທ໌ທີ່ຜູ້ໃຊ້ທົ່ວໄປເຫັນ. ຄຸກກີ້ບາງອັນແມ່ນມີຄວາມຈຳເປັນສຳລັບຟັງຊັນຫຼັກຂອງແພລັດຟອມ ແລະ ບໍ່ສາມາດປິດໃຊ້ງານໄດ້.
product-analytics-configuration-name=ການວິເຄາະຜະລິດຕະພັນ
product-analytics-consent-panel-description=ການຕັ້ງຄ່າເຫຼົ່ານີ້ມີຜົນກັບຄຸກກີ້ ແລະ ເຕັກໂນໂລຊີທີ່ຄ້າຍຄືກັນທີ່ໃຊ້ພາຍໃນພາກສ່ວນການບໍລິຫານເວັບໄຊທ໌ຂອງທ່ານ, ເຊັ່ນ: ພື້ນທີ່ສຳລັບການຈັດການ, ການຕັ້ງຄ່າ, ຫຼື ການແກ້ໄຂເວັບໄຊທ໌ຂອງທ່ານ. ພວກມັນບໍ່ມີຜົນຕໍ່ຄຸກກີ້ທີ່ໃຊ້ໃນເວັບໄຊທ໌ທີ່ຜູ້ໃຊ້ທົ່ວໄປເຫັນ. ເຕັກໂນໂລຊີເຫຼົ່ານີ້ອາດຈະເກັບຮັກສາ ຫຼື ເຂົ້າເຖິງຂໍ້ມູນໃນບຣາວເຊີຂອງທ່ານ, ເຊັ່ນ: ລາຍລະອຽດກ່ຽວກັບອຸປະກອນ, ການຕັ້ງຄ່າ, ຫຼື ເຊດຊັນຂອງທ່ານ. ເຖິງແມ່ນວ່າຂໍ້ມູນນີ້ໂດຍທົ່ວໄປແລ້ວຈະບໍ່ລະບຸຕົວຕົນຂອງທ່ານໂດຍກົງ, ແຕ່ມັນຊ່ວຍໃຫ້ພອດທໍເຮັດວຽກໄດ້ຢ່າງຖືກຕ້ອງ ແລະ ສາມາດເພີ່ມປະສົບການຂອງທ່ານໄດ້. ທ່ານສາມາດຈັດການເຕັກໂນໂລຊີເຫຼົ່ານີ້ໄດ້ໂດຍໃຊ້ການຕັ້ງຄ່າຂ້າງລຸ່ມນີ້, ແຕ່ການປິດບາງອັນອາດຈະສົ່ງຜົນກະທົບຕໍ່ວິທີທີ່ພອດທໍ ແລະ ບໍລິການຂອງພວກເຮົາເຮັດວຽກໃຫ້ທ່ານ.
product-analytics-consent-panel-title=ການຕັ້ງຄ່າການຍິນຍອມຂອງແພລັດຟອມ Liferay
