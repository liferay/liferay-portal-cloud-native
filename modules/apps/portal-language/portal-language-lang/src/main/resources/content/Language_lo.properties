staging-delete-temp-lar-on-failure-help=ຍົກເລີກການເລືອກເພື່ອຫຼີກເວັ້ນການລຶບໄຟລ໌ LAR ຊົ່ວຄາວ ເມື່ອຂັ້ນຕອນການເຜີຍແຜ່ສະເຕຈິ້ງຫຼົ້ມເຫຼວ. ໃນບໍລິບົດສະເຕຈິ້ງທາງໄກ, ສິ່ງນີ້ຈະມີຜົນສະເພາະກັບສະພາບແວດລ້ອມສະເຕຈິ້ງເທົ່ານັ້ນ.
staging-delete-temp-lar-on-success=ລຶບໄຟລ໌ LAR ຊົ່ວຄາວເມື່ອການເຜີຍແຜ່ສະເຕຈິ້ງສຳເລັດ.
staging-delete-temp-lar-on-success-help=ຍົກເລີກການເລືອກເພື່ອຫຼີກເວັ້ນການລຶບໄຟລ໌ LAR ຊົ່ວຄາວ ເມື່ອຂັ້ນຕອນການເຜີຍແຜ່ສະເຕຈິ້ງສຳເລັດ. ໃນບໍລິບົດສະເຕຈິ້ງທາງໄກ, ສິ່ງນີ້ຈະມີຜົນສະເພາະກັບສະພາບແວດລ້ອມສະເຕຈິ້ງເທົ່ານັ້ນ.
