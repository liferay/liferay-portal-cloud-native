detail-illegible-font-sizes=ຂະໜາດຕົວອັກສອນທີ່ອ່ານບໍ່ອອກ
detail-illegible-font-sizes-description=ເຄື່ອງມືຄົ້ນຫາຈຳນວນຫຼາຍຈັດອັນດັບໜ້າໂດຍອີງໃສ່ຄວາມເປັນມິດກັບມືຖື. ຂະໜາດຕົວອັກສອນທີ່ນ້ອຍກວ່າ 12px ມັກຈະອ່ານຍາກໃນອຸປະກອນມືຖື ແລະ ອາດຈະຕ້ອງການໃຫ້ຜູ້ໃຊ້ຊູມເຂົ້າເພື່ອສະແດງຂໍ້ຄວາມໃນຂະໜາດທີ່ອ່ານສະບາຍ. {0}
detail-illegible-font-sizes-tip=ບັນຫານີ້ເກີດຂຶ້ນເມື່ອ 60% ຫຼື ຫຼາຍກວ່າຂອງຂໍ້ຄວາມມີຂະໜາດຕົວອັກສອນນ້ອຍກວ່າ 12px. ກວດເບິ່ງຂະໜາດຕົວອັກສອນທີ່ຕັ້ງໄວ້ໃນຕົວແກ້ໄຂ web content, fragment, template ຫຼື style book ເພື່ອຊອກຫາກົດທີ່ເຮັດໃຫ້ຂໍ້ຄວາມອ່ານບໍ່ອອກ.
detail-incorrect-image-aspect-ratios=ອັດຕາສ່ວນຮູບພາບບໍ່ຖືກຕ້ອງ
detail-incorrect-image-aspect-ratios-description=ໜ້າສະແດງຮູບພາບທີ່ມີອັດຕາສ່ວນທີ່ບໍ່ຖືກຕ້ອງ. ຖ້າຮູບພາບທີ່ສະແດງຜົນມີອັດຕາສ່ວນທີ່ແຕກຕ່າງຢ່າງຫຼວງຫຼາຍຈາກອັດຕາສ່ວນໃນໄຟລ໌ຕົ້ນສະບັບ, ຮູບພາບທີ່ສະແດງຜົນອາດຈະເບິ່ງບິດບ້ຽວ, ເຊິ່ງອາດຈະສ້າງປະສົບການຜູ້ໃຊ້ທີ່ບໍ່ດີ. {0}
detail-incorrect-image-aspect-ratios-tip=ອັດຕາສ່ວນຮູບພາບທີ່ບໍ່ຖືກຕ້ອງອາດຈະເກີດຈາກຄວາມສູງ ແລະ ຄວາມກວ້າງຄົງທີ່ໃນເທັມເພລດທີ່ບໍ່ເໝາະສົມກັບອັດຕາສ່ວນຂອງຮູບພາບຕົ້ນສະບັບ.
detail-invalid-canonical-url=Canonical URL ບໍ່ຖືກຕ້ອງ
detail-invalid-canonical-url-description=ເມື່ອຫຼາຍໜ້າມີເນື້ອຫາຄ້າຍຄືກັນ, ເຄື່ອງມືຄົ້ນຫາຈະພິຈາລະນາວ່າມັນເປັນເວີຊັນທີ່ຊໍ້າກັນຂອງໜ້າດຽວກັນ. Canonical link ທີ່ຖືກຕ້ອງຊ່ວຍໃຫ້ເຈົ້າບອກເຄື່ອງມືຄົ້ນຫາວ່າເວີຊັນໃດຂອງໜ້າທີ່ຈະ crawl ແລະ ສະແດງໃຫ້ຜູ້ໃຊ້ເຫັນໃນຜົນການຄົ້ນຫາ. {0}
detail-invalid-canonical-url-failing-element=ຖ້າບັນຫາແມ່ນ canonical URL ບໍ່ກົງກັບ URL ຂອງໜ້າ, ລອງປ່ຽນການຕັ້ງຄ່າສຳລັບການໃຊ້ localized canonical URL ຈາກ {0}Instance Settings > Pages > SEO{1}.
detail-invalid-canonical-url-tip=ໃນເວັບໄຊ Liferay, canonical URL ຖືກສ້າງຂຶ້ນໂດຍອັດຕະໂນມັດ. ຖ້າມັນຂາດຫາຍໄປ, ບັນຫາອາດຈະເກີດຈາກທີມ. ຖ້າບັນຫາແມ່ນມັນບໍ່ກົງກັບ URL ຂອງໜ້າ, ເຈົ້າສາມາດປ່ຽນການຕັ້ງຄ່າສຳລັບການໃຊ້ localized canonical URL ທີ່ Instance Settings > Pages > SEO.
detail-invalid-hreflang=Hreflang ບໍ່ຖືກຕ້ອງ
detail-invalid-hreflang-description=ຫຼາຍເວັບໄຊໃຫ້ບໍລິການເວີຊັນຕ່າງໆຂອງໜ້າໂດຍອີງໃສ່ພາສາ ຫຼື ພາກພື້ນຂອງຜູ້ໃຊ້. Hreflang link ບອກເຄື່ອງມືຄົ້ນຫາ URL ສຳລັບທຸກເວີຊັນຂອງໜ້າ ເພື່ອໃຫ້ພວກເຂົາສາມາດສະແດງເວີຊັນທີ່ຖືກຕ້ອງສຳລັບແຕ່ລະພາສາ ຫຼື ພາກພື້ນ. {0}
detail-invalid-hreflang-tip=ໃນເວັບໄຊ Liferay, hreflang link ຖືກສ້າງຂຶ້ນໂດຍອັດຕະໂນມັດ. ຖ້າມັນຂາດຫາຍໄປ ຫຼື ບໍ່ຖືກຕ້ອງ, ບັນຫາອາດຈະເກີດຈາກທີມ ຫຼື ໃນ OpenGraph extension point.
detail-link-texts=Link Texts
detail-link-texts-description=Link text ແມ່ນຄຳ ຫຼື ວະລີທີ່ຄລິກໄດ້ໃນ hyperlink. ເມື່ອ link text ສື່ສານເປົ້າໝາຍຂອງ hyperlink ຢ່າງຊັດເຈນ, ທັງຜູ້ໃຊ້ ແລະ ເຄື່ອງມືຄົ້ນຫາສາມາດເຂົ້າໃຈເນື້ອຫາຂອງທ່ານໄດ້ງ່າຍຂຶ້ນ ແລະ ວິທີທີ່ມັນກ່ຽວຂ້ອງກັບໜ້າອື່ນໆ. {0}
detail-link-texts-tip=ເຮັດໃຫ້ link text ພັນລະນາໄດ້ດີຂຶ້ນໂດຍຫຼີກເວັ້ນສຳນວນເຊັ່ນ "ຄລິກບ່ອນນີ້", "ຄລິກນີ້" ຫຼື "ຮຽນຮູ້ເພີ່ມເຕີມ".
detail-low-contrast-ratio=ອັດຕາສ່ວນຄວາມຄົມຊັດຕໍ່າ
detail-low-contrast-ratio-description=ສີພື້ນຫຼັງ ແລະ ສີພື້ນໜ້າບໍ່ມີອັດຕາສ່ວນຄວາມຄົມຊັດທີ່ພຽງພໍ. ອັດຕາສ່ວນຄວາມຄົມຊັດຕໍ່າແມ່ນຍາກ ຫຼື ເປັນໄປບໍ່ໄດ້ສຳລັບຜູ້ໃຊ້ຈຳນວນຫຼາຍທີ່ຈະອ່ານ. {0}
detail-low-contrast-ratio-tip=ຂໍ້ຄວາມທີ່ມີຂະໜາດ 18pt, ຫຼື 14pt ແລະ ຕົວໜາ, ຕ້ອງການອັດຕາສ່ວນຄວາມຄົມຊັດ 3:1. ຂໍ້ຄວາມອື່ນໆທັງໝົດຕ້ອງການອັດຕາສ່ວນຄວາມຄົມຊັດ 4.5:1. ຄວາມຄົມຊັດລະຫວ່າງສີອາດຈະຖືກກຳນົດໃນ style book, page/fragment template ຫຼື fragment ເອງ.
detail-missing-img-alt-attributes=ຂາດ Img ALT Attribute
detail-missing-img-alt-attributes-description=ອົງປະກອບທີ່ໃຫ້ຂໍ້ມູນຄວນມີຂໍ້ຄວາມທາງເລືອກທີ່ສັ້ນ ແລະ ອະທິບາຍໄດ້ດີ. {0}
