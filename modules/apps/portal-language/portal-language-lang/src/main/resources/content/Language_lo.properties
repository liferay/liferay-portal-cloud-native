feature.flag.LPD-6368.description=ຜູ້ໃຊ້ສາມາດກຳນົດຂອບເຂດການຈັດອັນດັບຜົນການຄົ້ນຫາ (ເຊັ່ນ: ທຸກຢ່າງ, ເວັບໄຊ, ຫຼື blueprint). ການຈັດອັນດັບຈະມີຜົນກັບການຄົ້ນຫາທີ່ມີຂອບເຂດທີ່ກົງກັນເທົ່ານັ້ນ. ເມື່ອເປີດໃຊ້ງານ, ການຈັດອັນດັບທີ່ມີຢູ່ຈະມີຜົນກັບການຄົ້ນຫາຂອບເຂດ "ທຸກຢ່າງ". ເມື່ອປິດໃຊ້ງານ, ການຈັດອັນດັບຜົນລັດທີ່ມີຂອບເຂດເວັບໄຊ ຫຼື blueprint ຈະຫາຍໄປ.
