ds-lock-timeout-milliseconds=Lock Timeout Milliseconds
ds-lock-timeout-milliseconds-help=ກຳນົດເວລາດົນປານໃດທີ່ຈະຖື lock ກ່ອນທີ່ຈະປ່ອຍເນື່ອງຈາກສົງໄສວ່າເກີດ deadlock.
ds-loglevel=SCR Log Level
ds-loglevel-help=ກຳນົດລະດັບ log ເພື່ອຈຳກັດຈຳນວນຂໍ້ມູນ logging ທີ່ສົ່ງໄປຍັງ OSGi LogService. ຄ່າທີ່ຮອງຮັບແມ່ນ DEBUG, INFO, WARN, ແລະ ERROR. ຄຸນສົມບັດນີ້ບໍ່ຖືກໃຊ້ຖ້າມີການປະຕິບັດ R7 LogService ເນື່ອງຈາກລະດັບ log ສາມາດຖືກກຳນົດຄ່າຜ່ານບໍລິການນັ້ນ. ຄ່າເລີ່ມຕົ້ນແມ່ນ ERROR.
ds-stop-timeout-milliseconds=Stop Timeout Milliseconds
