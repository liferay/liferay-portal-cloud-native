oauth-client-as-local-well-known-uri-oauth-authorization-server-help=URI ທີ່ເປັນທີ່ຮູ້ຈັກດີຂອງເຊີເວີການອະນຸຍາດແມ່ນບ່ອນທີ່ພົບຂໍ້ມູນເມຕາດາຕ້າ (metadata) ກ່ຽວກັບເຊີເວີ. ເບິ່ງລາຍລະອຽດທີ່ RFC 8414 OAuth 2 Authorization Server. ໃນໜ້າການກຳນົດຄ່ານີ້, ຈະມີການສ້າງ URI ທີ່ເປັນທີ່ຮູ້ຈັກດີໂດຍອີງຕາມຜູ້ອອກ (issuer).
oauth-client-as-local-well-known-uri-openid-configuration=ການກຳນົດຄ່າ OpenId ຂອງ URI ທີ່ເປັນທີ່ຮູ້ຈັກດີໃນເຄື່ອງຂອງເຊີເວີການອະນຸຍາດ
oauth-client-as-local-well-known-uri-openid-configuration-help=URI ທີ່ເປັນທີ່ຮູ້ຈັກດີຂອງເຊີເວີການອະນຸຍາດແມ່ນບ່ອນທີ່ພົບຂໍ້ມູນເມຕາດາຕ້າ (metadata) ກ່ຽວກັບເຊີເວີ. ເບິ່ງລາຍລະອຽດທີ່ RFC 8414 ແລະ OpenID Connect Discovery 1.0. ໃນໜ້າການກຳນົດຄ່ານີ້, URI ທີ່ເປັນທີ່ຮູ້ຈັກດີທີ່ຖືກສ້າງຂຶ້ນ (ສຳລັບການລະບຸຕົວຕົນພາຍໃນເຄື່ອງ) ຈະຖືກກຳນົດໃຫ້ກັບລາຍການເມຕາດາຕ້າທີ່ກ່ຽວຂ້ອງ ເນື່ອງຈາກຂໍ້ມູນເມຕາດາຕ້າຢູ່ທີ່ນີ້ແມ່ນຖືກປ້ອນດ້ວຍຕົນເອງໂດຍບໍ່ມີ URI ທີ່ເປັນທີ່ຮູ້ຈັກດີແທ້ໆ.
