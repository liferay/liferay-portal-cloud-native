saml-idp-authn-request-signing-allows-dynamic-acs-url=ການລົງລາຍເຊັນການຮ້ອງຂໍ Authn ອະນຸຍາດໃຫ້ໃຊ້ URL ຂອງ ACS ແບບໄດນາມິກ
saml-idp-authn-request-signing-allows-dynamic-acs-url-description=ເມື່ອການຮ້ອງຂໍ Authn ຖືກລົງລາຍເຊັນ, ຜູ້ໃຫ້ບໍລິການ (SP) ສາມາດຮ້ອງຂໍໃຊ້ URL ຂອງ ACS (Assertion Consumer Service) ອື່ນໆ ທີ່ບໍ່ໄດ້ລະບຸໃນເມຕາເດຕາເພື່ອຮັບການຕອບສະໜອງ Authn.
saml-idp-role-configuration-enabled=ເປີດໃຊ້ການຕັ້ງຄ່າບົດບາດຜູ້ໃຫ້ບໍລິການຕົວຕົນ
saml-idp-role-configuration-enabled-description=ໃຫ້ການຕິດຕັ້ງນີ້ເປັນຜູ້ໃຫ້ບໍລິການຕົວຕົນ SAML (SAML identity provider).
saml-idp-session-maximum-age=ອາຍຸສູງສຸດຂອງເຊດຊັນ
saml-idp-session-maximum-age-description=ຂີດຈຳກັດເວລາເຊດຊັນ SSO ທີ່ຈັດການໂດຍ IdP (ເປັນວິນາທີ)
saml-idp-session-timeout=ໝົດເວລາເຊດຊັນທີ່ບໍ່ມີການເຄື່ອນໄຫວ
saml-idp-session-timeout-description=ເວລາ (ເປັນວິນາທີ) ຈົນກ່ວາເຊດຊັນທີ່ບໍ່ມີການເຄື່ອນໄຫວຈະໝົດອາຍຸ
saml-idp-sso-session-check-interval=ໄລຍະຫ່າງການກວດສອບເຊດຊັນ SSO
saml-idp-sso-session-check-interval-description=ໄລຍະເວລາທີ່ IdP ກວດສອບເຊດຊັນ SSO ທີ່ໝົດອາຍຸເນື່ອງຈາກອາຍຸສູງສຸດ ຫຼື ການໝົດເວລາ (ເປັນນາທີ).
saml-key-store-password=ລະຫັດຜ່ານບ່ອນເກັບຄີ (Key Store)
saml-key-store-path=ເສັ້ນທາງບ່ອນເກັບຄີ
saml-key-store-path-description=ເສັ້ນທາງໃນລະບົບໄຟລ໌ໄປຫາບ່ອນເກັບຄີ. ໃຊ້ສະເພາະເມື່ອໃຊ້ Filesystem Keystore Manager
saml-key-store-type=ປະເພດບ່ອນເກັບຄີ
saml-keystore-credential-password=ລະຫັດຜ່ານຂໍ້ມູນປະຈຳຕົວ Keystore
saml-keystore-credential-password-description=ຕັ້ງລະຫັດຜ່ານທີ່ໃຊ້ເພື່ອປ້ອງກັນລາຍການພາຍໃນ keystore.
saml-keystore-encryption-credential-password=ລະຫັດຜ່ານຂໍ້ມູນປະຈຳຕົວການເຂົ້າລະຫັດ Keystore
saml-keystore-encryption-credential-password-description=ລະຫັດຜ່ານທີ່ໃຊ້ເພື່ອປ້ອງກັນລາຍການການເຂົ້າລະຫັດພາຍໃນ keystore
saml-keystore-manager-configuration-name=ການຕັ້ງຄ່າການຕິດຕັ້ງ SAML KeyStoreManager
saml-keystore-manager-description=ກຳນົດວິທີການເກັບຮັກສາ ແລະ ເຂົ້າເຖິງ keystore
saml-max-saml-sso-request-contexts=ຈຳນວນສູງສຸດຂອງ Context ການຮ້ອງຂໍ SAML SSO
saml-max-saml-sso-request-contexts-description=ກຳນົດຈຳນວນສູງສຸດຂອງ context ການຮ້ອງຂໍ SAML SSO ທີ່ສາມາດມີໄດ້ໃນໜຶ່ງເຊດຊັນ.
saml-metadata-refresh-interval=ໄລຍະຫ່າງການຣີເຟຣດເມຕາເດຕາໃນເວລາເຮັດວຽກ
saml-metadata-refresh-interval-description=ໄລຍະເວລາທີ່ອົງກອນ SAML ອື່ນໆ ຈະຖືກຣີເຟຣດ (ເປັນວິນາທີ).
saml-must-be-disabled-before-changing-the-entity-id=ຕ້ອງປິດການໃຊ້ງານ SAML ກ່ອນທີ່ຈະປ່ຽນ Entity ID.
saml-must-be-disabled-before-changing-the-saml-role=ຕ້ອງປິດການໃຊ້ງານ SAML ກ່ອນທີ່ຈະປ່ຽນບົດບາດ SAML.
saml-provider-configuration-name=ການຕັ້ງຄ່າຜູ້ໃຫ້ບໍລິການ SAML
saml-replay-cache-duration=ໄລຍະເວລາ Replay Cache
saml-replay-cache-duration-description=ເວລາ (ເປັນມິນລິວິນາທີ) ຈົນກ່ວາລາຍການແຄຊຂໍ້ຄວາມ IdP ຈະໝົດອາຍຸ. ການເຮັດແຄຊຊ່ວຍປ້ອງກັນການສົ່ງຂໍ້ຄວາມຊ້ຳ (message replay)
saml-role=ບົດບາດ SAML
saml-sign-metadata=ລົງລາຍເຊັນເມຕາເດຕາຫຼືບໍ່?
saml-sign-metadata-description=ລົງລາຍເຊັນໃນເມຕາເດຕາທີ່ໃຫ້ແກ່ອົງກອນ SAML ອື່ນໆ
saml-sp-allow-showing-the-login-portlet=ອະນຸຍາດໃຫ້ສະແດງພອດເລັດເຂົ້າລະບົບ.
saml-sp-allow-showing-the-login-portlet-description=ອະນຸຍາດໃຫ້ສະແດງພອດເລັດເຂົ້າລະບົບ ເມື່ອບໍ່ມີ SAML IdP ທີ່ກົງກັບການຮ້ອງຂໍເຂົ້າລະບົບ.
saml-sp-assertion-signature-required=ຕ້ອງມີລາຍເຊັນ Assertion ຫຼືບໍ່?
saml-sp-assertion-signature-required-description=ເລືອກວ່າ assertions ຕ້ອງໄດ້ຮັບການລົງລາຍເຊັນໂດຍ IdP ຫຼືບໍ່
saml-sp-auth-request-check-interval=ໄລຍະຫ່າງການກວດສອບການຮ້ອງຂໍການຢືນຢັນຕົວຕົນ
saml-sp-auth-request-check-interval-description=ເວລາ (ເປັນນາທີ) ຈົນກ່ວາ SP ຈະເອົາການຮ້ອງຂໍ Authn ທີ່ໝົດອາຍຸອອກ ເນື່ອງຈາກຮອດອາຍຸສູງສຸດ.
saml-sp-auth-request-max-age=ອາຍຸສູງສຸດຂອງການຮ້ອງຂໍ Authn
saml-sp-auth-request-max-age-description=ໄລຍະເວລາທີ່ການຮ້ອງຂໍ Authn ມີຜົນໃຊ້ໄດ້ (ເປັນມິນລິວິນາທີ)
saml-sp-clock-skew-description=ຄວາມແຕກຕ່າງຂອງເວລາລະບົບ (ເປັນມິນລິວິນາທີ) ລະຫວ່າງ SP ນີ້ ແລະ IdP. ຈຳເປັນສຳລັບການກວດສອບຂໍ້ຄວາມທີ່ຖືກຕ້ອງ.
saml-sp-ldap-import-enabled=ເປີດໃຊ້ການນຳເຂົ້າ LDAP ແລ້ວ
saml-sp-ldap-import-enabled-description=ຫຼັງຈາກການຢືນຢັນຕົວຕົນຜ່ານ IdP, ໃຫ້ນຳເຂົ້າຄຸນລັກສະນະຜູ້ໃຊ້ຈາກເຊີບເວີ LDAP ທີ່ຕັ້ງຄ່າໄວ້ຜ່ານການຕັ້ງຄ່າອິນສະແຕນຊ໌ຂອງ SP ນີ້
saml-sp-message-check-interval=ໄລຍະຫ່າງການກວດສອບຂໍ້ຄວາມ
saml-sp-message-check-interval-description=ໄລຍະເວລາ (ເປັນນາທີ) ທີ່ SP ຈະເອົາລາຍການທີ່ໝົດອາຍຸອອກຈາກແຄຊຂໍ້ຄວາມ IdP.
saml-sp-sign-authn-request=ລົງລາຍເຊັນການຮ້ອງຂໍ Authn ຫຼືບໍ່?
saml-sp-sign-authn-request-description=ລົງລາຍເຊັນໃນການຮ້ອງຂໍ Authn ຈາກ SP ນີ້
