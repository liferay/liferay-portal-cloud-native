jakarta.portlet.description.com_liferay_message_boards_web_portlet_MBAdminPortlet=ກະດານຂໍ້ຄວາມຕ້ອງການຫ້ອງການສົນທະນາສຳລັບຜູ້ໃຊ້ກັບຫຼາຍໆລະດັບ ແລະຂັ້ນທີ່ຕ່າງກັນ. ຜູ້ບໍລິຫານສາມາດບໍລິຫານຄຸ້ມຄອງກະດານຂໍ້ຄວາມ, ກຳນົດຫຼັກການ ແລະສິດຕ່າງໆ ໃຫ້ກັບຜູ້ໃຊ້ ແລະລົງໂທດຜູ້ໃຊ້. ຜູ້ໃຊ້ສາມາດບໍລິຫານຊັບສກຣິບເຊີ້ນສົ່ງໄປຍັງກະດານຂໍ້ຄວາມ , ໝວດຕ່າງໆ ແລະການສະແດງສະຖິຄິຕ່າງໆ
