this-report-provides-a-breakdown-of-total-assets-by-categorization,-content-structure-type,-or-space=ລາຍງານນີ້ໃຫ້ລາຍລະອຽດຂອງແອສເຊັດທັງໝົດແຍກຕາມໝວດໝູ່, ປະເພດໂຄງສ້າງເນື້ອໃນ, ຫຼື ພື້ນທີ່.
