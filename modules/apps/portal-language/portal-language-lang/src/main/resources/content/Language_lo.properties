this-redirect-points-to-the-source-url-of-another-redirect=ການປ່ຽນທິດທາງນີ້ຊີ້ໄປຫາ URL ຕົ້ນທາງຂອງການປ່ຽນທິດທາງອື່ນ. ນີ້ຈະສ້າງຕ່ອງໂສ້ການປ່ຽນທິດທາງ ເຊິ່ງເຮັດໃຫ້ຜູ້ໃຊ້ຕ້ອງຖືກປ່ຽນທິດທາງຫຼາຍຄັ້ງກ່ອນຈະຮອດປາຍທາງ.
