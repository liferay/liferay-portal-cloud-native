staging-aware-description=ສະແດງສະເພາະເນື້ອຫາທີ່ເຜີຍແຜ່ແລ້ວໃນໄຊທ໌ Live. ສະແດງເນື້ອຫາທີ່ເຜີຍແຜ່ແລ້ວ ແລະ ເນື້ອຫາໃນສະເຕຈິ້ງໃນໄຊທ໌ສະເຕຈິ້ງ. ອົງປະກອບນີ້ເຮັດວຽກຄືກັບ query clause ຂອງ Liferay Search Framework.
