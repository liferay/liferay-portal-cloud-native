detail-missing-meta-description-description=Meta description ໃຫ້ບົດສະຫຼຸບຂອງເນື້ອຫາຂອງໜ້າທີ່ເຄື່ອງມືຄົ້ນຫາລວມຢູ່ໃນຜົນການຄົ້ນຫາ. Meta description ທີ່ມີຄຸນນະພາບສູງ ແລະ ເປັນເອກະລັກເຮັດໃຫ້ໜ້າຂອງທ່ານປາກົດວ່າມີຄວາມກ່ຽວຂ້ອງຫຼາຍຂຶ້ນ ແລະ ສາມາດເພີ່ມ traffic ການຄົ້ນຫາຂອງທ່ານ. {0}
