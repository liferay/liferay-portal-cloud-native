due-to-your-recent-selection,-the-previously-chosen-subtype-is-no-longer-valid=ເນື່ອງຈາກການເລືອກຫຼ້າສຸດຂອງທ່ານ, ປະເພດຍ່ອຍທີ່ເລືອກໄວ້ກ່ອນໜ້ານີ້ບໍ່ຖືກຕ້ອງອີກຕໍ່ໄປ. ຕອນນີ້ທ່ານສາມາດເລືອກຄ່າໃໝ່ ຫຼື ປ່ອຍວ່າງໄວ້. ກະລຸນາຮັບຊາບວ່າການປ່ຽນແປງນີ້ຈະຖືກນຳໃຊ້ກັບທີ່ຢູ່ເດີມ.
