staging-is-enabled-for-at-least-one-site-or-asset-library-in-the-current-virtual-instance=ສະເຕຈິ້ງຖືກເປີດໃຊ້ງານສຳລັບຢ່າງໜ້ອຍໜຶ່ງໄຊທ໌ ຫຼື ຄັງຊັບສິນໃນອິນສະແຕນສະເໝືອນ (Virtual Instance) ນີ້. ບໍ່ສາມາດໃຊ້ Publications ແລະ Staging ຮ່ວມກັນໄດ້.
