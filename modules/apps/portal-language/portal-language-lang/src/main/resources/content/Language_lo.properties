cookie-explicit-consent-mode-help=ຖ້າເລືອກຕົວເລືອກນີ້, ຈະບໍ່ມີການຕັ້ງຄ່າຄຸກກີ້ຈົນກວ່າຜູ້ໃຊ້ຈະຍິນຍອມການໃຊ້ງານຄຸກກີ້. ຖ້າບໍ່ດັ່ງນັ້ນ, ຄຸກກີ້ທັງໝົດຈະຖືກຕັ້ງຄ່າຈົນກວ່າຜູ້ໃຊ້ຈະເລືອກບໍ່ຮັບ. ຄວນຈື່ໄວ້ວ່າຟັງຊັນທີ່ອາໄສຄຸກກີ້, ເຊັ່ນ web analytics (ລວມທັງ Liferay Analytics Cloud) ແລະ ການປັບແຕ່ງສ່ວນຕົວ, ຈະບໍ່ໄດ້ຮັບຂໍ້ມູນຫາກຜູ້ໃຊ້ບໍ່ເປີດໃຊ້ຄຸກກີ້. ນອກຈາກນັ້ນ, ການປິດການໃຊ້ງານຕົວເລືອກນີ້ອາດຈະມີຄວາມສ່ຽງຕໍ່ການປະຕິບັດຕາມກົດໝາຍຄວາມເປັນສ່ວນຕົວຂອງຜູ້ໃຊ້.
cookie-explicit-consent-mode-help-deprecated=ຖ້າເລືອກຕົວເລືອກນີ້, ຈະບໍ່ມີການຕັ້ງຄ່າຄຸກກີ້ຈົນກວ່າຜູ້ໃຊ້ຈະຍິນຍອມການໃຊ້ງານຄຸກກີ້. ຖ້າບໍ່ດັ່ງນັ້ນ, ຄຸກກີ້ທັງໝົດຈະຖືກຕັ້ງຄ່າຈົນກວ່າຜູ້ໃຊ້ຈະເລືອກບໍ່ຮັບ.
