this-publication-was-created-on-a-previous-liferay-version.-you-cannot-publish,-revert,-or-make-additional-changes=ການເຜີຍແຜ່ນີ້ຖືກສ້າງຂຶ້ນໃນ Liferay ເວີຊັນກ່ອນໜ້າ. ທ່ານບໍ່ສາມາດເຜີຍແຜ່, ຍ້ອນກັບ, ຫຼື ປ່ຽນແປງເພີ່ມເຕີມໄດ້. ທ່ານສາມາດເບິ່ງ, ລຶບ, ຫຼື ຍ້າຍການປ່ຽນແປງໄປຍັງການເຜີຍແຜ່ອື່ນໄດ້ເທົ່ານັ້ນ.
