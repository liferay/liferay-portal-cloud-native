org-apache-felix-eventadmin-IgnoreTopic-help=ກຳນົດຫົວຂໍ້ (topics) ທີ່ໃຫ້ລະບົບຈັດການເຫດການເມີນເສີຍເພື່ອເພີ່ມປະສິດທິພາບ. ໃນກໍລະນີນີ, ເຫດການຈະບໍ່ຖືກສົ່ງໄປຫາຕົວຈັດການເຫດການທີ່ລົງທະບຽນໄວ້. ຄ່າແມ່ນລາຍການຂໍ້ຄວາມ (ແຍກດ້ວຍຈຸດ). ຫາກຂໍ້ຄວາມລົງທ້າຍດ້ວຍຈຸດ, ແພັກເກັດນັ້ນຈະຖືກເມີນເສີຍ. ຫາກລົງທ້າຍດ້ວຍດາວ (*), ທຸກແພັກເກັດຍ່ອຍຈະຖືກເມີນເສີຍ. ຫາກໃສ່ດາວດ່ຽວໆ ຈະເປັນການປິດການສົ່ງທັງໝົດ.
org-apache-felix-eventadmin-RequireTopic=ຕ້ອງການຫົວຂໍ້
org-apache-felix-eventadmin-RequireTopic-help=ກຳນົດວ່າຕົວຈັດການເຫດການຈຳເປັນຕ້ອງລົງທະບຽນດ້ວຍຫົວຂໍ້ໃດໜຶ່ງຫຼືບໍ່. ຄ່ານີ້ຖືກເປີດໃຊ້ໄວ້ເປັນຄ່າເລີ່ມຕົ້ນ. ການປິດການຕັ້ງຄ່ານີ້ຈະເຮັດໃຫ້ຕົວຈັດການທີ່ບໍ່ມີຫົວຂໍ້ສາມາດຮັບໄດ້ທຸກເຫດການ.
org-apache-felix-eventadmin-ThreadPoolSize=ຂະໜາດ Thread Pool
org-apache-felix-eventadmin-ThreadPoolSize-help=ກຳນົດຂະໜາດຂອງພູລເທຣດ (thread pool) ທີ່ໃຊ້ໃນການສົ່ງເຫດການ. ຄ່າເລີ່ມຕົ້ນແມ່ນ 20. ໃຫ້ເພີ່ມຂຶ້ນໃນກໍລະນີທີ່ມີເຫດການຈຳນວນຫຼາຍ. ຫາກຄ່າໜ້ອຍກວ່າ 2 ຈະຖືກປ່ຽນເປັນຄ່າເລີ່ມຕົ້ນໂດຍອັດຕະໂນມັດ.
org-apache-felix-eventadmin-Timeout=ເວລາໝົດອາຍຸ
org-apache-felix-eventadmin-Timeout-help=ກຳນົດເວລາໝົດອາຍຸຂອງບັນຊີດຳ (blacklist) ເປັນມິນລິວິນາທີ. ຄ່າເລີ່ມຕົ້ນແມ່ນ 5000. ຄ່າທີ່ໜ້ອຍກວ່າ 100 ຈະເປັນການປິດການໃຊ້ເວລາໝົດອາຍຸ.
org-apache-felix-eventadmin-ocd-help=ກຳນົດຄ່າສຳລັບ Apache Felix Event Admin. ການຕັ້ງຄ່ານີ້ຈະຂຽນທັບການຕັ້ງຄ່າທີ່ກຳນົດໄວ້ໃນຄຸນສົມບັດຂອງເຟຣມເວີກທີ່ມີຊື່ດຽວກັນ.
