check-if-a-date-range-begins-with-a-past-date-and-ends-with-a-future-date=ກວດສອບວ່າຊ່ວງວັນທີເລີ່ມຕົ້ນດ້ວຍວັນທີໃນອະດີດ ແລະ ສິ້ນສຸດດ້ວຍວັນທີໃນອະນາຄົດ. ຖ້າບໍ່ແມ່ນ, ຟັງຊັນຈະສົ່ງຄ່າ false.
check-if-a-field-contains-a-specific-value-and-return-a-boolean=ກວດສອບວ່າຟີວມີຄ່າທີ່ລະບຸ ແລະ ສົ່ງຄ່າບູລີນກັບມາ. ຖ້າຟີວບໍ່ມີຄ່ານັ້ນ, ມັນຈະສົ່ງຄ່າ false. ຟັງຊັນນີ້ສາມາດໃຊ້ໄດ້ກັບທັງຟີວຂໍ້ຄວາມ ແລະ ຕົວເລກ.
check-if-a-field-contains-a-specific-value-and-return-a-boolean-if-the-field-does-contain-the-value-it-is-invalid=ກວດສອບວ່າຟີວມີຄ່າທີ່ລະບຸ ແລະ ສົ່ງຄ່າບູລີນກັບມາ. ຖ້າຟີວມີຄ່ານັ້ນ, ມັນຈະສົ່ງຄ່າ false. ຟັງຊັນນີ້ສາມາດໃຊ້ໄດ້ກັບທັງຟີວຂໍ້ຄວາມ ແລະ ຕົວເລກ.
check-if-a-field-has-the-same-date-of-the-value=ກວດສອບວ່າຟີວມີວັນທີດຽວກັນກັບຄ່າທີ່ລະບຸ. ຖ້າຟີວບໍ່ມີຄ່າດຽວກັນ, ມັນຈະສົ່ງຄ່າ false.
check-if-a-field-is-equal-to-a-specific-value-and-return-a-boolean=ກວດສອບວ່າຟີວເທົ່າກັບຄ່າທີ່ລະບຸ ແລະ ສົ່ງຄ່າບູລີນກັບມາ. ຖ້າບໍ່ເທົ່າກັນ, ມັນຈະສົ່ງຄ່າ false. ຟັງຊັນນີ້ສາມາດໃຊ້ໄດ້ກັບທັງຟີວຂໍ້ຄວາມ ແລະ ຕົວເລກ.
check-if-a-field-is-not-equal-to-a-specific-value-and-return-a-boolean=ກວດສອບວ່າຟີວບໍ່ເທົ່າກັບຄ່າທີ່ລະບຸ ແລະ ສົ່ງຄ່າບູລີນກັບມາ. ຖ້າບໍ່ແມ່ນ, ຟັງຊັນຈະສົ່ງຄ່າ false. ຟັງຊັນນີ້ສາມາດໃຊ້ໄດ້ກັບທັງຟີວຂໍ້ຄວາມ ແລະ ຕົວເລກ.
check-if-a-numeric-field-is-a-decimal-and-return-a-boolean=ກວດສອບວ່າຟີວຕົວເລກເປັນເລກທົດສະນິຍົມ ແລະ ສົ່ງຄ່າບູລີນກັບມາ. ຖ້າບໍ່ແມ່ນ, ຟັງຊັນຈະສົ່ງຄ່າ false.
check-if-a-numeric-field-is-an-integer-and-return-a-boolean=ກວດສອບວ່າຟີວຕົວເລກເປັນຈຳນວນຖ້ວນ (Integer) ແລະ ສົ່ງຄ່າບູລີນກັບມາ. ຖ້າບໍ່ແມ່ນ, ຟັງຊັນຈະສົ່ງຄ່າ false.
check-if-a-numeric-field-is-greater-than-a-specific-numeric-value-and-return-a-boolean=ກວດສອບວ່າຟີວຕົວເລກມີຄ່າຫຼາຍກວ່າຄ່າຕົວເລກທີ່ລະບຸ ແລະ ສົ່ງຄ່າບູລີນກັບມາ. ຖ້າບໍ່ແມ່ນ, ຟັງຊັນຈະສົ່ງຄ່າ false.
check-if-a-numeric-field-is-greater-than-or-equal-to-a-specific-numeric-value-and-return-a-boolean=ກວດສອບວ່າຟີວຕົວເລກມີຄ່າຫຼາຍກວ່າ ຫຼື ເທົ່າກັບຄ່າຕົວເລກທີ່ລະບຸ ແລະ ສົ່ງຄ່າບູລີນກັບມາ. ຖ້າບໍ່ແມ່ນ, ຟັງຊັນຈະສົ່ງຄ່າ false.
check-if-a-numeric-field-is-less-than-a-specific-numeric-value-and-return-a-boolean=ກວດສອບວ່າຟີວຕົວເລກມີຄ່ານ້ອຍກວ່າຄ່າຕົວເລກທີ່ລະບຸ ແລະ ສົ່ງຄ່າບູລີນກັບມາ. ຖ້າບໍ່ແມ່ນ, ຟັງຊັນຈະສົ່ງຄ່າ false.
check-if-a-numeric-field-is-less-than-or-equal-to-a-specific-numeric-value-and-return-a-boolean=ກວດສອບວ່າຟີວຕົວເລກມີຄ່ານ້ອຍກວ່າ ຫຼື ເທົ່າກັບຄ່າຕົວເລກທີ່ລະບຸ ແລະ ສົ່ງຄ່າບູລີນກັບມາ. ຖ້າບໍ່ແມ່ນ, ຟັງຊັນຈະສົ່ງຄ່າ false.
check-if-a-text-field-is-a-URL-and-return-a-boolean=ກວດສອບວ່າຟີວຂໍ້ຄວາມເປັນ URL ແລະ ສົ່ງຄ່າບູລີນກັບມາ. ຖ້າຟີວບໍ່ົງກັບຮູບແບບ URL, ມັນຈະສົ່ງຄ່າ false. ຂໍ້ມູນທີ່ປ້ອນຕ້ອງໃຊ້ອົງປະກອບ URL ມາດຕະຖານ (ເຊັ່ນ: http, ://, .com)
