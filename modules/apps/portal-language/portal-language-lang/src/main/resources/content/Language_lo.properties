staged=Staged
staged-applications-alert=ເມື່ອແອັບພລິເຄຊັນຖືກເລືອກ, ຂໍ້ມູນຂອງມັນຈະຖືກກັອບປີ້ໄປຍັງສະເຕຈິ້ງ (Staging) ແລະ ອາດຈະບໍ່ສາມາດແກ້ໄຂໄດ້ໂດຍກົງໃນ Live. ເມື່ອຍົກເລີກການເລືອກແອັບພລິເຄຊັນ, ໃຫ້ແນ່ໃຈວ່າການປ່ຽນແປງໃດໆໃນສະເຕຈິ້ງໄດ້ຖືກເຜີຍແຜ່ກ່ອນ, ຖ້າບໍ່ດັ່ງນັ້ນຂໍ້ມູນອາດຈະສູນຫາຍ.
staged-applications-help=ແອັບພລິເຄຊັນທີ່ຖືກເລືອກຈະເຂົ້າສູ່ຂັ້ນຕອນສະເຕຈິ້ງ. ນີ້ໝາຍຄວາມວ່າຂໍ້ມູນຂອງພວກມັນຈະຖືກເຜີຍແຜ່ໂດຍອັດຕະໂນມັດທຸກຄັ້ງທີ່ໜ້າທີ່ມີແອັບພລິເຄຊັນເຫຼົ່ານັ້ນຖືກເຜີຍແຜ່. ແອັບພລິເຄຊັນທີ່ຖືກປິດໃຊ້ງານແຕ່ຖືກເລືອກໄວ້ ຈະຖືກສົ່ງອອກໂດຍອັດຕະໂນມັດສະເໝີ ເຖິງວ່າຈະບໍ່ມີຢູ່ໃນໜ້າກໍຕາມ. ແອັບພລິເຄຊັນສຳລັບການເຮັດວຽກຮ່ວມກັນ ເຊັ່ນ <em>Blogs, Message Boards, ແລະ Wiki</em> ຈະບໍ່ຖືກລວມເຂົ້າໃນສະເຕຈິ້ງໂດຍເລີ່ມຕົ້ນ ເນື່ອງຈາກຂໍ້ມູນມັກຈະເກີດຂຶ້ນໃນ Live. ເວົ້າງ່າຍໆຄື ເມື່ອແອັບພລິເຄຊັນບໍ່ໄດ້ເຂົ້າສູ່ສະເຕຈິ້ງ, ສະພາບແວດລ້ອມ Live ຈະເປັນບ່ອນດຽວທີ່ມີຂໍ້ມູນສຳຄັນ.
