product-analytics-enable-user-preference-handling-help=ການເປີດໃຊ້ງານການຕັ້ງຄ່ານີ້ຈະເປີດການຈັດການການຕັ້ງຄ່າຄຸກກີ້ສຳລັບຜູ້ໃຊ້, ອະນຸຍາດໃຫ້ພວກເຂົາເລືອກວ່າຈະຍິນຍອມໃຫ້ມີການເກັບກຳ ແລະ ແບ່ງປັນຂໍ້ມູນການນຳໃຊ້ການເຄື່ອນໄຫວຂອງຜູ້ດູແລລະບົບກັບ Pendo ໃນຖານະຜູ້ປະມວນຜົນຫຼືບໍ່. ການຕັ້ງຄ່ານີ້ຍັງເປີດໃຊ້ການສະແດງແຖບຄຸກກີ້ ແລະ ແຜງການຍິນຍອມສຳລັບການຈັດການການຕັ້ງຄ່າເຫຼົ່ານີ້.
