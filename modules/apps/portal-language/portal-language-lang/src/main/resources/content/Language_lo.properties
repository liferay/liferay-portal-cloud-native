ds-delayed-keepInstances=Keep Component Instances
ds-delayed-keepInstances-help=ກຳນົດວ່າຈະເກັບ instance ຂອງ delayed components ໄວ້ຫຼືບໍ່ ເມື່ອພວກມັນບໍ່ໄດ້ຖືກອ້າງອີງອີກຕໍ່ໄປ. ຂໍ້ມູນຈຳເພາະຂອງ Declarative Services ແນະນຳວ່າ instance ຂອງ delayed components ຄວນຖືກກຳຈັດຖິ້ມຖ້າບໍ່ໄດ້ໃຊ້ແລ້ວ. ການຕັ້ງຄ່າ flag ນີ້ເຮັດໃຫ້ components ບໍ່ຖືກກຳຈັດຖິ້ມ, ແລະ ດັ່ງນັ້ນຈຶ່ງປ້ອງກັນບໍ່ໃຫ້ພວກມັນຖືກສ້າງຂຶ້ນໃໝ່ຢ່າງຕໍ່ເນື່ອງຫາກຖືກໃຊ້ເລື້ອຍໆ. ຕົວຢ່າງຂອງ components ດັ່ງກ່າວອາດຈະແມ່ນບໍລິການ EventHandler. ຄ່າເລີ່ມຕົ້ນແມ່ນການກຳຈັດ components ທີ່ບໍ່ໄດ້ໃຊ້.
ds-factory-enabled=Extended Factory Components
ds-factory-enabled-help=ກຳນົດວ່າຈະເປີດໃຊ້ການຮອງຮັບການສ້າງ instance ຂອງ Factory Component ໂດຍອີງໃສ່ການຕັ້ງຄ່າ factory ຫຼືບໍ່. ນີ້ແມ່ນສ່ວນຂະຫຍາຍສະເພາະຂອງ Apache Felix SCR, ເຊິ່ງບໍ່ໄດ້ຮັບການຮອງຮັບຢ່າງຊັດເຈນໂດຍຂໍ້ມູນຈຳເພາະຂອງ Declarative Services. ການເພິ່ງພາຄຸນສົມບັດນີ້ປ້ອງກັນບໍ່ໃຫ້ component ຖືກໃຊ້ກັບການປະຕິບັດ Declarative Services ອື່ນໆ. ຄ່າເລີ່ມຕົ້ນແມ່ນ false ເພື່ອປິດໃຊ້ງານຄຸນສົມບັດນີ້.
