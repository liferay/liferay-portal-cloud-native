cookie-store-consent-help=ຖ້າເລືອກຕົວເລືອກນີ້, ຄວາມຕ້ອງການການຍິນຍອມຈະຖືກເກັບໄວ້ໃນຖານຂໍ້ມູນເມື່ອມີການໃຫ້ການຍິນຍອມ. ສິ່ງນີ້ຊ່ວຍໃຫ້ຕົວເລືອກການຍິນຍອມຄົງຢູ່ຕະຫຼອດໃນເຄື່ອງຄອມພິວເຕີ ແລະ ເວັບບຣາວເຊີທີ່ແຕກຕ່າງກັນ.
cookies-allowed=ອະນຸຍາດຄຸກກີ້
cookies-banner-content=ພວກເຮົາໃຊ້ຄຸກກີ້ ແລະ ເທັກໂນໂລຊີທີ່ຄ້າຍຄືກັນເພື່ອສົ່ງເນື້ອຫາທີ່ປັບແຕ່ງສະເພາະຕົວ, ວິເຄາະແນວໂນ້ມ, ບໍລິຫານເວັບໄຊທ໌, ຕິດຕາມການເຄື່ອນໄຫວຂອງຜູ້ໃຊ້ໃນເວັບໄຊທ໌, ແລະ ເກັບກຳຂໍ້ມູນປະຊາກອນກ່ຽວກັບຖານຜູ້ໃຊ້ຂອງພວກເຮົາໂດຍລວມ. ຍອມຮັບຄຸກກີ້ທັງໝົດເພື່ອປະສົບການທີ່ດີທີ່ສຸດໃນເວັບໄຊທ໌ຂອງພວກເຮົາ ຫຼື ຈັດການການຕັ້ງຄ່າຂອງທ່ານ.
cookies-banner-title=ເວັບໄຊທ໌ນີ້ໃຊ້ຄຸກກີ້
cookies-configuration=ການກຳນົດຄ່າຄຸກກີ້
cookies-consent-description=ເມື່ອທ່ານເຂົ້າເບິ່ງເວັບໄຊທ໌ໃດໜຶ່ງ, ມັນອາດຈະເກັບຮັກສາ ຫຼື ດຶງຂໍ້ມູນໃນບຣາວເຊີຂອງທ່ານ, ສ່ວນຫຼາຍແມ່ນຢູ່ໃນຮູບແບບຂອງຄຸກກີ້. ຂໍ້ມູນນີ້ອາດຈະກ່ຽວກັບທ່ານ, ການຕັ້ງຄ່າຂອງທ່ານ, ຫຼື ອຸປະກອນຂອງທ່ານ ແລະ ສ່ວນຫຼາຍແມ່ນໃຊ້ເພື່ອໃຫ້ເວັບໄຊທ໌ເຮັດວຽກຕາມທີ່ທ່ານຄາດຫວັງ. ຂໍ້ມູນນີ້ມັກຈະບໍ່ລະບຸຕົວຕົນຂອງທ່ານໂດຍກົງ, ແຕ່ມັນສາມາດໃຫ້ປະສົບການເວັບທີ່ເປັນສ່ວນຕົວຫຼາຍຂຶ້ນ. ທ່ານສາມາດເລືອກທີ່ຈະບໍ່ອະນຸຍາດຄຸກກີ້ບາງປະເພດ. ຄິກທີ່ຫົວຂໍ້ໝວດໝູ່ຕ່າງໆເພື່ອຊອກຫາຂໍ້ມູນເພີ່ມເຕີມ ແລະ ປ່ຽນການຕັ້ງຄ່າເລີ່ມຕົ້ນຂອງພວກເຮົາ. ແນວໃດກໍ່ຕາມ, ການບລັອກຄຸກກີ້ບາງປະເພດອາດຈະສົ່ງຜົນກະທົບຕໍ່ປະສົບການຂອງທ່ານໃນເວັບໄຊທ໌ ແລະ ການບໍລິການທີ່ພວກເຮົາສາມາດສະເໜີໄດ້.
cookies-description[CONSENT_TYPE_FUNCTIONAL]=ຄຸກກີ້ເຫຼົ່ານີ້ຊ່ວຍໃຫ້ເວັບໄຊທ໌ສາມາດໃຫ້ຟັງຊັນທີ່ປັບປຸງດີຂຶ້ນ ແລະ ການປັບແຕ່ງສ່ວນຕົວ. ພວກມັນອາດຈະຖືກຕັ້ງຄ່າໂດຍພວກເຮົາ ຫຼື ໂດຍຜູ້ໃຫ້ບໍລິການພາກສ່ວນທີສາມທີ່ພວກເຮົາໄດ້ເພີ່ມການບໍລິການເຂົ້າໃນໜ້າຂອງພວກເຮົາ. ຖ້າທ່ານບໍ່ອະນຸຍາດຄຸກກີ້ເຫຼົ່ານີ້, ບາງບໍລິການ ຫຼື ທັງໝົດອາດຈະບໍ່ເຮັດວຽກຢ່າງຖືກຕ້ອງ.
cookies-description[CONSENT_TYPE_NECESSARY]=ຄຸກກີ້ເຫຼົ່ານີ້ມີຄວາມຈຳເປັນສຳລັບເວັບໄຊທ໌ເພື່ອໃຫ້ເຮັດວຽກໄດ້ ແລະ ບໍ່ສາມາດປິດໃນລະບົບຂອງພວກເຮົາໄດ້. ປົກກະຕິແລ້ວພວກມັນຈະຖືກຕັ້ງຄ່າເພື່ອຕອບສະໜອງຕໍ່ການກະທຳຂອງທ່ານທີ່ເທົ່າກັບການຮ້ອງຂໍການບໍລິການ, ເຊັ່ນ: ການຕັ້ງຄ່າຄວາມເປັນສ່ວນຕົວ, ການເຂົ້າສູ່ລະບົບ ຫຼື ການຕື່ມແບບຟອມ. ທ່ານສາມາດຕັ້ງຄ່າບຣາວເຊີຂອງທ່ານໃຫ້ບລັອກ ຫຼື ແຈ້ງເຕືອນກ່ຽວກັບຄຸກກີ້ເຫຼົ່ານີ້, ແຕ່ບາງສ່ວນຂອງເວັບໄຊທ໌ຈະບໍ່ເຮັດວຽກ. ຄຸກກີ້ເຫຼົ່ານີ້ບໍ່ໄດ້ເກັບກຳຂໍ້ມູນທີ່ລະບຸຕົວຕົນສ່ວນບຸກຄົນ.
cookies-description[CONSENT_TYPE_PERFORMANCE]=ຄຸກກີ້ເຫຼົ່ານີ້ອະນຸຍາດໃຫ້ພວກເຮົານັບຈຳນວນການເຂົ້າຊົມ ແລະ ແຫຼ່ງທີ່ມາຂອງການຈະລາຈອນ ເພື່ອໃຫ້ພວກເຮົາສາມາດວັດແທກ ແລະ ປັບປຸງປະສິດທິພາບຂອງເວັບໄຊທ໌ຂອງພວກເຮົາ. ພວກມັນຊ່ວຍໃຫ້ພວກເຮົາຮູ້ວ່າໜ້າໃດໄດ້ຮັບຄວາມນິຍົມຫຼາຍທີ່ສຸດ ແລະ ໜ້ອຍທີ່ສຸດ ແລະ ເບິ່ງວ່າຜູ້ເຂົ້າຊົມເຄື່ອນຍ້າຍໄປມາແນວໃດໃນເວັບໄຊທ໌. ຂໍ້ມູນທັງໝົດທີ່ຄຸກກີ້ເຫຼົ່ານີ້ເກັບກຳແມ່ນເປັນການຮວບຮວມ ແລະ ດັ່ງນັ້ນຈຶ່ງບໍ່ລະບຸຕົວຕົນ. ຖ້າທ່ານບໍ່ອະນຸຍາດຄຸກກີ້ເຫຼົ່ານີ້, ພວກເຮົາຈະບໍ່ຮູ້ເມື່ອທ່ານໄດ້ເຂົ້າເບິ່ງເວັບໄຊທ໌ຂອງພວກເຮົາ.
cookies-description[CONSENT_TYPE_PERSONALIZATION]=ຄຸກກີ້ເຫຼົ່ານີ້ອາດຈະຖືກຕັ້ງຄ່າຜ່ານເວັບໄຊທ໌ຂອງພວກເຮົາໂດຍຄູ່ຮ່ວມງານໂຄສະນາຂອງພວກເຮົາ. ພວກມັນອາດຈະຖືກໃຊ້ໂດຍບໍລິສັດເຫຼົ່ານັ້ນເພື່ອສ້າງໂປຣໄຟລ໌ຄວາມສົນໃຈຂອງທ່ານ ແລະ ສະແດງໂຄສະນາທີ່ກ່ຽວຂ້ອງໃນເວັບໄຊທ໌ອື່ນ. ພວກມັນບໍ່ໄດ້ເກັບກຳຂໍ້ມູນສ່ວນຕົວໂດຍກົງ, ແຕ່ອີງໃສ່ການລະບຸບຣາວເຊີ ແລະ ອຸປະກອນອິນເທີເນັດຂອງທ່ານຢ່າງຊັດເຈນ. ຖ້າທ່ານບໍ່ອະນຸຍາດຄຸກກີ້ເຫຼົ່ານີ້, ທ່ານຈະເຫັນໂຄສະນາທີ່ກ່ຽວຂ້ອງໜ້ອຍລົງ.
cookies-description[PRODUCT_ANALYTICS_CONSENT_TYPE_FUNCTIONAL]=ຈື່ການຕັ້ງຄ່າ ແລະ ຄວາມມັກຂອງທ່ານ, ເຊັ່ນ: ການເລືອກພາສາ.
cookies-description[PRODUCT_ANALYTICS_CONSENT_TYPE_NECESSARY]=ເປີດໃຊ້ຟັງຊັນຫຼັກຂອງແພລັດຟອມ ແລະ ຄຸນສົມບັດຄວາມປອດໄພ.
cookies-description[PRODUCT_ANALYTICS_CONSENT_TYPE_PERFORMANCE]=ເປີດໃຊ້ການຕິດຕາມ Liferay Analytics Cloud ແລະ ການຕິດຕາມເວັບໄຊທ໌.
cookies-description[PRODUCT_ANALYTICS_CONSENT_TYPE_PERSONALIZATION]=ຈື່ຄວາມມັກຂອງການໂຕ້ຕອບ, ເຊັ່ນ: ການຕັ້ງຄ່າເຄື່ອງມື; ແລະ ເປີດໃຊ້ການທົດສອບ A/B ໃນເວັບໄຊທ໌ທີ່ຊິງຄ໌ກັບ Liferay Analytics Cloud.
cookies-description[PRODUCT_ANALYTICS_CONSENT_TYPE_PRODUCT_ANALYTICS]=ຊ່ວຍໃຫ້ພວກເຮົາເຂົ້າໃຈວິທີທີ່ທ່ານໃຊ້ຜະລິດຕະພັນຂອງພວກເຮົາເພື່ອປັບປຸງຄຸນສົມບັດຕ່າງໆ.
