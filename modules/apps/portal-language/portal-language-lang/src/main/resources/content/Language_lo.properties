this-page-is-using-a-different-theme-than-the-one-set-for-all-pages=ໜ້ານີ້ກຳລັງໃຊ້ທິມ (Theme) ທີ່ແຕກຕ່າງຈາກທິມທີ່ຕັ້ງໄວ້ສຳລັບທຸກໜ້າ. ໝາຍເຫດ: Style Books ຈະມີໃຫ້ໃຊ້ສະເພາະໜ້າເວັບທີ່ໃຊ້ທິມດຽວກັນກັບທີ່ຕັ້ງໄວ້ໃນທຸກໜ້າເທົ່ານັ້ນ.
this-page-is-using-a-different-theme-than-the-one-set-for-public-pages=ໜ້ານີ້ກຳລັງໃຊ້ທິມທີ່ແຕກຕ່າງຈາກທິມທີ່ຕັ້ງໄວ້ສຳລັບໜ້າສາທາລະນະ. ໝາຍເຫດ: Style Books ຈະມີໃຫ້ໃຊ້ສະເພາະໜ້າເວັບທີ່ໃຊ້ທິມດຽວກັນກັບທີ່ຕັ້ງໄວ້ໃນໜ້າສາທາລະນະເທົ່ານັ້ນ.
this-page-uses-a-custom-page-layout.-a-best-effort-conversion-has-been-performed.-verify-the-conversion-draft-before-publishing-it=ໜ້ານີ້ໃຊ້ເລເອົ້າ (Layout) ແບບພິເສດ. ລະບົບໄດ້ພະຍາຍາມແປງຂໍ້ມູນໃຫ້ດີທີ່ສຸດແລ້ວ. ກະລຸນາກວດສອບສະບັບຮ່າງກ່ອນການເຜີຍແຜ່.
this-page-uses-a-custom-page-layout.-all-widgets-have-been-placed-in-a-single-column-and-will-require-manual-reorganization=ໜ້ານີ້ໃຊ້ເລເອົ້າແບບພິເສດ. ວິດເຈັດທັງໝົດໄດ້ຖືກຈັດວາງໄວ້ໃນຖັນດຽວ ແລະ ທ່ານອາດຈຳເປັນຕ້ອງຈັດຮຽງໃໝ່ດ້ວຍຕົນເອງ.
this-page-uses-nested-applications-widgets.-they-have-been-placed-in-a-single-column-and-may-require-manual-reorganization=ໜ້ານີ້ໃຊ້ວິດເຈັດແອັບພລິເຄຊັນແບບຊ້ອນກັນ. ວິດເຈັດທັງໝົດທີ່ເຄີຍຢູ່ພາຍໃນນັ້ນໄດ້ຖືກຈັດວາງໄວ້ໃນຖັນດຽວ ແລະ ອາດຈຳເປັນຕ້ອງຈັດຮຽງໃໝ່ດ້ວຍຕົນເອງ.
this-parent-item-does-not-belong-to-the-user-but-contains-children-items-belonging-to-the-user=ລາຍການຫຼັກນີ້ບໍ່ໄດ້ເປັນຂອງຜູ້ໃຊ້ ແຕ່ມີລາຍການຍ່ອຍທີ່ເປັນຂອງຜູ້ໃຊ້.
this-portlet-could-not-be-found.-please-redeploy-it-or-remove-it-from-the-page=ບໍ່ພົບພອດເລັດ (Portlet) ນີ້. ກະລຸນາຕິດຕັ້ງໃໝ່ ຫຼື ຖອນມັນອອກຈາກໜ້າເວັບ.
this-portlet-is-inactive=ພ໋ອດເລ໋ດນີ້ອີນແອັກຕິບ
this-portlet-is-not-staged-local-alert=ຂໍ້ມູນຂອງພ໋ອດເລ໋ດນີ້ຍັງບໍ່ທັນສເຕ໋ກ. ການປ່ຽນແປງຂໍ້ມູນທັງທີ່ນັ້ນຈະສາມາດເພື່ອ <em>ໂລໂຄລາຍ</em>ໄຊທ໌. ພ່ອດເລ໋ດຍັງຮັກສາການກຳນົດຄ່າຂອງເວີດໂຟຣຈາກການບໍລິຫານສແຕ໋ກກິ້ງ
this-portlet-is-not-staged-remote-alert=ຂໍ້ມູນຂອງພອດເລັດນີ້ບໍ່ໄດ້ຖືກເຮັດສະເຕຈິງ. ເນື່ອງຈາກກຳລັງໃຊ້ Remote Staging ຢູ່, ການປ່ຽນແປງຂໍ້ມູນຕ້ອງເຮັດຜ່ານໄຊທ໌ <em>Remote Live</em>. ເວກໂຟລຂອງພອດເລັດຈະມີຜົນຈາກໄຊທ໌ Remote Live ເທົ່ານັ້ນ. ການປ່ຽນແປງໃດໆໃນສະເຕຈິງຈະຖືກລະເລີຍ. ການຕັ້ງຄ່າພອດເລັດຍັງຖືກຈັດການຈາກສະເຕຈິງ.
