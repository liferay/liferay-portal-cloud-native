jakarta.portlet.description.com_liferay_layout_admin_web_portlet_GroupPagesPortlet=ເພ໋ກແມ່ນໜ້າເມວທີ່ສາມາດແກ້ໄຂເມື່ອໄດ້ຮັບການສ້າງໃນພ໋ອດອອນ, ຂື້ນກັບຫຼັກເກນທີ່ທ່ານໄດ້ຮັບ, ທ່ານສາມາດແກ້ໄຂໜ້າເຫຼົ່ານີ້, ເພີ່ມ ຫຼື ປ່ຽນການສະແດງ ຫຼື ເພີ່ມເຕີມໜ້າໃດໆ
