org-apache-felix-eventadmin-AsyncToSyncThreadRatio-help=ກຳນົດອັດຕາສ່ວນຂອງເທຣດອາຊິງໂຄຣນັດ (asynchronous) ຕໍ່ ຊິງໂຄຣນັດ (synchronous) ໃນພູລເທຣດພາຍໃນ. ອັດຕາສ່ວນຕ້ອງເປັນຄ່າບວກ ແລະ ສາມາດປັບປ່ຽນເພື່ອສະແດງເຖິງການກະຈາຍຂອງການດຳເນີນການສົ່ງ. ແອັບພລິເຄຊັນທີ່ມີການສົ່ງໂພສຈຳນວນຫຼາຍຄວນມີອັດຕາສ່ວນທີ່ສູງກວ່າ.
