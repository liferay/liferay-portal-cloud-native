org-apache-felix-eventadmin-IgnoreTimeout-help=ກຳນົດໃຫ້ຕົວຈັດການເຫດການຖືກຮຽກໃຊ້ໂດຍບໍ່ມີການກຳນົດເວລາໝົດອາຍຸ. ຫາກມີການກຳນົດເວລາໝົດອາຍຸໄວ້ເປັນຄ່າເລີ່ມຕົ້ນ, ຕົວຈັດການເຫດການທັງໝົດຈະຖືກຮຽກໃຊ້ຕາມເວລານັ້ນ. ເພື່ອເພີ່ມປະສິດທິພາບ, ສາມາດກຳນົດໃຫ້ຕົວຈັດການເຫດການບາງຕົວບໍ່ໃຊ້ການກຳນົດເວລາໝົດອາຍຸໄດ້. ນີ້ຈະຊ່ວຍຫຼຸດການໃຊ້ເທຣດຈາກພູລເນື່ອງຈາກການຈັດການເວລາໝົດອາຍຸຕ້ອງໃຊ້ເທຣດເພີ່ມເຕີມ.
