this-question-is-closed-new-answers-and-comments-are-disabled=ຄຳຖາມນີ້ຖືກປິດແລ້ວ. ບໍ່ສາມາດເພີ່ມຄຳຕອບ ຫຼື ຄຳຄິດເຫັນໃໝ່ໄດ້.
this-ranking-is-no-longer-applicable-to-searches-because-the-blueprint-it-was-associated-with-was-deleted=ການຈັດອັນດັບນີ້ບໍ່ສາມາດໃຊ້ກັບການຄົ້ນຫາໄດ້ອີກ ເພາະວ່າ Blueprint ທີ່ກ່ຽວຂ້ອງໄດ້ຖືກລຶບໄປແລ້ວ.
