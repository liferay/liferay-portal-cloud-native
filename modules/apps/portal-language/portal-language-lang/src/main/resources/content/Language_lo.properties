feature.flag.type.description.dev=ຄຸນສົມບັດສຳລັບນັກພັດທະນາແມ່ນຢູ່ໃນລະຫວ່າງການພັດທະນາຢ່າງຫ້າວຫັນ. ຢ່າເປີດໃຊ້ງານເວັ້ນເສຍແຕ່ວ່າທ່ານຢູ່ໃນ development instance ຂອງ DXP.
feature.flag.type.description.release=ຄຸນສົມບັດ Release ສະໜອງວິທີທີ່ງ່າຍໃນການນຳໃຊ້ຟັງຊັນໃໝ່ໃນ DXP. ພວກມັນໄດ້ຮັບການສະໜັບສະໜູນຢ່າງເຕັມທີ່ ແລະ ສາມາດເປີດໃຊ້ງານເປັນລາຍບຸກຄົນ ແລະ ຕາມຄວາມຄືບໜ້າໄດ້.
