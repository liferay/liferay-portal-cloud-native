feature.flag.LPS-122920.description=ສ້າງປະສົບການຄົ້ນຫາທີ່ເຂົ້າໃຈຄວາມໝາຍ ແລະ ບໍລິບົດຂອງເນື້ອຫາທີ່ຖືກ indexed ຂອງທ່ານ ແລະ ວະລີຄົ້ນຫາຂອງຜູ້ໃຊ້. ໃຊ້ປະໂຫຍດຈາກ language ML models ຜ່ານ third-party text embedding providers ແລະ Search Blueprints. ເມື່ອເປີດໃຊ້ງານແລ້ວ, ໃຫ້ເລີ່ມການຕັ້ງຄ່າໃນ Instance Settings > Search > Semantic Search.
