saml-ssl-required-description=ຕ້ອງການໃຫ້ຂໍ້ຄວາມ SAML ຖືກແລກປ່ຽນຜ່ານ SSL. URL ໃນເມຕາເດຕາທີ່ໃຫ້ແກ່ອົງກອນ SAML ອື່ນໆ ຈະກາຍເປັນ https.
