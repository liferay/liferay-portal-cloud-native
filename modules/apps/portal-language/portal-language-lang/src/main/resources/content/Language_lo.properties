feature.flag.LPD-51356.description=ເກັບກຳ ແລະ ແບ່ງປັນຂໍ້ມູນການວິເຄາະກ່ຽວກັບວິທີທີ່ຜູ້ດູແລລະບົບນຳໃຊ້ແພລັດຟອມ. ຂໍ້ມູນນີ້ຊ່ວຍໃຫ້ Liferay ມີຂໍ້ມູນວິເຄາະເພື່ອຈັດລຳດັບຄວາມສຳຄັນໃນການປັບປຸງຜະລິດຕະພັນ ແລະ ເພີ່ມປະສົບການຂອງຜູ້ໃຊ້. ຄຸນສົມບັດນີ້ຕ້ອງມີການຍອມຮັບ (opt-in) ຢ່າງຊັດເຈນ ແລະ ເປັນໄປຕາມມາດຕະຖານ GDPR ຢ່າງຄົບຖ້ວນ.
feature.flag.LPD-51356.title=ການວິເຄາະຂໍ້ມູນການນຳໃຊ້ຂອງຜູ້ດູແລລະບົບ Liferay ແບບຕິດຕັ້ງເອງ ແລະ ການຍອມຮັບຢ່າງຊັດເຈນສຳລັບການປະຕິບັດຕາມ GDPR
feature.flag.LPD-58677.description=ນັກການຕະຫຼາດສາມາດວາງແຜນ, ສ້າງ, ປະສານງານ ແລະ ຕິດຕາມແຜນງານການຕະຫຼາດ ເຊັ່ນ: ໂຄງການ, ໜ້າວຽກ ແລະ ການຜະລິດເນື້ອຫາ. CMP ເຮັດວຽກຮ່ວມກັບ CMS ເພື່ອປັບປຸງຂັ້ນຕອນການຈັດການເນື້ອຫາ, ການຜະລິດ ແລະ ການສົ່ງມອບຜ່ານຊ່ອງທາງຕ່າງໆໃຫ້ມີປະສິດທິພາບ. CMP ຕ້ອງມີໃບອະນຸຍາດນຳໃຊ້ແຍກຕ່າງຫາກ.
feature.flag.LPD-58677.title=ແພລັດຟອມການຈັດການການຕະຫຼາດເນື້ອຫາ (CMP)
feature.flag.LPD-60546.description=ຄຸນສົມບັດ 1:1 nested object entry ທີ່ມີຢູ່ໃນ Page Builder ຖືກເລີກໃຊ້ແລ້ວ ເນື່ອງຈາກວິທີການ CMS ໃໝ່ສຳລັບການຈັດການ object entries ແລະ ຈະຖືກລຶບອອກໃນລຸ້ນໃນອະນາຄົດ.
feature.flag.LPD-60546.title=One to One Object Relationships ໃນ Page Builder
feature.flag.LPD-63311.description=ເປີດໃຊ້ Liferay Model Context Protocol (MCP) server. ສິ່ງນີ້ສະໜອງກົນໄກທີ່ປອດໄພສຳລັບ large language models (LLMs) ໃນການເຂົ້າເຖິງຂໍ້ມູນບໍລິບົດ ແລະ ພົວພັນກັບ Liferay entities ຜ່ານ Liferay headless APIs, ເຮັດໃຫ້ສາມາດພັດທະນາຄຸນສົມບັດຕ່າງໆ ເຊັ່ນ ການສ້າງເນື້ອຫາດ້ວຍ AI ແລະ ການອັດຕະໂນມັດຂະບວນການ.
feature.flag.LPD-63311.title=MCP Server
feature.flag.LPD-63415.description=ຈັດຕັ້ງປະຕິບັດ RFC 8414 ເພື່ອໃຫ້ Liferay ສາມາດສະແດງຂໍ້ມູນ Metadata ຂອງເຊີເວີການອະນຸຍາດ OAuth 2 ຜ່ານຈຸດເຊື່ອມຕໍ່ (endpoint) ມາດຕະຖານ .well-known.
feature.flag.LPD-63415.title=RFC 8414: ຂໍ້ມູນ Metadata ຂອງເຊີເວີການອະນຸຍາດ
feature.flag.LPD-63416.description=RFC 7591 ຊ່ວຍໃຫ້ໄຄເອັນ (Client) ຂອງ OAuth 2 ສາມາດລົງທະບຽນແບບໄດນາມິກກັບເຊີເວີການອະນຸຍາດຂອງ Liferay ເຊິ່ງຊ່ວຍຫຼຸດຜ່ອນຂັ້ນຕອນການຕັ້ງຄ່າໄຄເອັນດ້ວຍຕົນເອງ. ມັນກຳນົດວິທີທີ່ Liferay ຮັບເອົາ Metadata ຂອງໄຄເອັນ, ຈຸດເຊື່ອມຕໍ່ ແລະ ຂໍ້ມູນການຢືນຢັນຕົວຕົນ (credentials) ແບບອັດຕະໂນມັດໃນທັນທີຢ່າງປອດໄພ. ສິ່ງນີ້ຊ່ວຍໃຫ້ແອັບຯ, ໂມດູນ ຫຼື ບໍລິການພາຍນອກຂອງ Liferay ສາມາດເຊື່ອມຕໍ່ກັນໄດ້ຢ່າງຕໍ່ເນື່ອງ ແລະ ຂະຫຍາຍຕົວຢ່າງມີປະສິດທິພາບ. ດ້ວຍການເຮັດໃຫ້ການນຳໄຄເອັນເຂົ້າສູ່ລະບົບເປັນແບບອັດຕະໂນມັດ, ມັນຈຶ່ງຊ່ວຍເພີ່ມຂີດຄວາມສາມາດໃນການຈັດການອັດຕະລັກ ແລະ ການເຂົ້າເຖິງຂອງ Liferay.
