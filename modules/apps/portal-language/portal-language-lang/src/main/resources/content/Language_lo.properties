sandbox-only-help=ເປີດໃຊ້ໂໝດນີ້ເພື່ອໃຫ້ຜູ້ໃຊ້ການເຜີຍແຜ່ທັງໝົດຢູ່ໃນການເຜີຍແຜ່ຫຼ້າສຸດທີ່ພວກເຂົາເຮັດວຽກຢູ່ໂດຍອັດຕະໂນມັດເມື່ອເຂົ້າລະບົບ. ຫາກພວກເຂົາບໍ່ເຄີຍເຮັດວຽກໃນອັນໃດມາກ່ອນ, ການເຜີຍແຜ່ຈະຖືກສ້າງຂຶ້ນໃຫ້ພວກເຂົາ. ໃຊ້ໂໝດນີ້ເພື່ອຮັບປະກັນວ່າສະພາບການໃຊ້ງານຈິງຈະບໍ່ຖືກປ່ຽນແປງໂດຍຄວາມຜິດພາດ.
