modified.files.includes[relevant][segments-java-rule]=\
    **/*.java,\
    **/test/**,\
    **/testIntegration/**

modules.includes.required.test.batch.class.names.includes[modules-integration-postgresql163][relevant][segments-java-rule]=\
    apps/asset/asset-list-web/**/*Test.java,\
    apps/fragment/fragment-entry-processor/fragment-entry-processor-editable/**/*Test.java,\
    apps/headless/headless-admin-user/**/*Test.java,\
    apps/layout/layout-content-page-editor-web/**/*Test.java,\
    apps/segments/**/*Test.java

modules.includes.required.test.batch.class.names.includes[modules-unit][relevant][segments-java-rule]=\
    apps/asset/asset-list-web/**/*Test.java,\
    apps/fragment/fragment-entry-processor/fragment-entry-processor-editable/**/*Test.java,\
    apps/headless/headless-admin-user/**/*Test.java,\
    apps/layout/layout-content-page-editor-web/**/*Test.java,\
    apps/segments/**/*Test.java

relevant.rule.names=segments-java-rule

test.batch.names[relevant][segments-java-rule]=\
    modules-integration-postgresql163,\
    modules-unit

test.batch.run.property.query[functional-tomcat-mysql*-jdk*][test-portal-hotfix-release]=\
    (portal.acceptance == true) AND \
    (\
        (testray.component.names ~ "Personalization") OR \
        (testray.component.names ~ "Segmentation") OR \
        (testray.main.component.name ~ "Headless USM") OR \
        (testray.main.component.name ~ "Personalization") OR \
        (testray.main.component.name ~ "Segmentation")\
    )

testray.main.component.name=Segmentation