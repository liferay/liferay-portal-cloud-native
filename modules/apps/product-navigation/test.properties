modified.files.includes[relevant][product-navigation-java-rule]=\
    **/*.java,\
    **/test/**,\
    **/testIntegration/**

modules.includes.required.test.batch.class.names.includes[modules-integration-postgresql163][relevant][product-navigation-java-rule]=\
    apps/product-navigation/**/*Test.java

modules.includes.required.test.batch.class.names.includes[modules-unit][relevant][product-navigation-java-rule]=\
    apps/product-navigation/**/*Test.java

relevant.rule.names=product-navigation-java-rule

test.batch.names[relevant][product-navigation-java-rule]=\
    modules-integration-postgresql163,\
    modules-unit

test.batch.run.property.query[functional-tomcat-mysql*-jdk*][test-portal-hotfix-release]=\
    (portal.acceptance == true) AND \
    (\
        (testray.component.names ~ "Simulation") OR \
        (testray.main.component.name ~ "Control Menu") OR \
        (testray.main.component.name ~ "Sites Administration")\
    )

testray.main.component.name=Control Menu