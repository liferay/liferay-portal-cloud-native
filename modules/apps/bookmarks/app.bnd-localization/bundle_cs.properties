liferay-releng-app-description=Aplikace Záložky přidává widget, který lze použít k zobrazení a uspořádání záložek. Umístěním widgetu Záložky na stránku webu mohou administrátoři spravovat záložky, které jsou zajímavé pro celou komunitu. Widget může ukládat do záložek interní stránky portálu i externí adresy URL.<br /><br />Po instalaci této aplikace máte přístup k widgetu Záložky z nabídky Widgety.