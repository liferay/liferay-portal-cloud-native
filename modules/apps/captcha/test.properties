##
## Test Suites
##

    modified.files.includes[relevant][captcha-rule]=**

    relevant.rule.names=\
        captcha-rule

    test.batch.names[relevant][captcha-rule]=\
        functional-tomcat90-mysql57,\
        modules-integration-mysql57,\
        modules-unit

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*][relevant][captcha-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57][relevant][captcha-rule]=\
        apps/captcha/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit][relevant][captcha-rule]=\
        apps/captcha/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*][relevant][captcha-rule]=\
        (portal.acceptance == true) AND \
        (testray.main.component.name ~ "CAPTCHA")

##
## Testray
##

    testray.main.component.name=CAPTCHA