liferay-releng-app-description=Plugin Liferay pro OAuth 2.0 je standardní autorizační protokol. Uživatelé mohou bez problémů sdílet vybrané přihlašovací údaje z jiných webových stránek a přihlásit se k vašemu. Funguje tak, že autorizuje přístup bez hesla k částem zdrojů vlastněných uživateli (jako je e-mailová adresa, profilový obrázek uživatele nebo něco jiného z vašeho účtu) a k dalším zdrojům s povolením.