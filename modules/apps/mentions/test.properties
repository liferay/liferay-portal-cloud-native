modified.files.includes[relevant][mentions-java-rule]=\
    **/*.java,\
    **/test/**,\
    **/testIntegration/**

modules.includes.required.test.batch.class.names.includes[modules-integration-postgresql163][relevant][mentions-java-rule]=\
    apps/mentions/**/*Test.java

modules.includes.required.test.batch.class.names.includes[modules-unit][relevant][mentions-java-rule]=\
    apps/mentions/**/*Test.java

relevant.rule.names=mentions-java-rule

test.batch.names[relevant][mentions-java-rule]=\
    modules-integration-postgresql163,\
    modules-unit

test.batch.run.property.query[functional-tomcat-mysql*-jdk*][test-portal-hotfix-release]=\
    (portal.acceptance == true) AND \
    (\
        (testray.component.names ~ "Mentions") OR \
        (testray.main.component.name ~ "Mentions")\
    )

testray.main.component.name=Mentions