liferay-releng-app-description=Bean Portlet poskytuje CDI funkce "bean portletů". Umožňuje registrovat portlety pomocí anotací, jako je @PortletConfiguration, a jeho anotace @Inject získává závislosti prostřednictvím kontextů a vkládání závislostí (CDI). Bean portlety jsou funkcí specifikace Portlet 3.0, jak je definováno v JSR 362.<br /><br />Moduly Bean Portletu se instalují do LIFERAY_HOME/osgi/modules/static.