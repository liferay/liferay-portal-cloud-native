modified.files.includes[relevant][portal-reports-engine-java-rule]=\
    **/*.java,\
    **/test/**,\
    **/testIntegration/**

modules.includes.required.test.batch.class.names.includes[modules-integration-postgresql163][relevant][portal-reports-engine-java-rule]=\
    apps/portal-reports-engine/**/*Test.java

modules.includes.required.test.batch.class.names.includes[modules-unit][relevant][portal-reports-engine-java-rule]=\
    apps/portal-reports-engine/**/*Test.java

relevant.rule.names=portal-reports-engine-java-rule

test.batch.names[relevant][portal-reports-engine-java-rule]=\
    modules-integration-postgresql163,\
    modules-unit

test.batch.run.property.query[functional-tomcat-mysql*-jdk*][test-portal-hotfix-release]=\
    (portal.acceptance == true) AND \
    (testray.main.component.name ~ "Reports")

testray.main.component.name=Reports