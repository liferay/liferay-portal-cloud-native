        description:
            Retrieves the import process entries for the specified asset library.
        get:
            operationId: getAssetLibraryImportProcessesPage
            parameters:
                -   in: path
                    name: assetLibraryId
                    required: true
                    schema:
                        format: int64
                        type: integer
                -   in: query
                    name: creatorId
                    schema:
                        format: int64
                        type: integer
                -   in: query
                    name: fields
                    schema:
                        type: string
                -   in: query
                    name: nestedFields
                    schema:
                        type: string
                -   in: query
                    name: page
                    schema:
                        type: integer
                -   in: query
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    name: restrictFields
                    schema:
                        type: string
                -   in: query
                    name: search
                    schema:
                        type: string
                -   in: query
                    name: sort
                    schema:
                        type: string
                -   in: query
                    name: status
                    schema:
                        type: integer
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/ImportProcess"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/ImportProcess"
                                type: array
            tags: ["ImportProcess"]
    "/import-processes":
