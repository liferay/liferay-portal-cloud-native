components:
    schemas:
        ImportProcess:
            properties:
                creator:
                    $ref: ../../headless/headless-delivery/headless-delivery-impl/rest-openapi.yaml#Creator
                    readOnly: true
                dateCreated:
                    description:
                        The import process's creation date.
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    description:
                        The import process's last modification date.
                    format: date-time
                    readOnly: true
                    type: string
                id:
                    description:
                        The import process's ID.
                    format: int64
                    readOnly: true
                    type: integer
                status:
                    $ref: "#/components/schemas/Status"
                    description:
                        The import process's end status.
                    readOnly: true
                title:
                    description:
                        The import process's title.
                    readOnly: true
                    type: string
            type: object
        Origin:
            properties:
                code:
                    format: int32
                    type: integer
                label:
                    type: string
            type: object
        ReportEntry:
            properties:
                classExternalReferenceCode:
                    description:
                        The reported item's external reference code.
                    readOnly: true
                    type:
                        string
                classNameId:
                    description:
                        The reported item's class name id.
                    format: int64
                    readOnly: true
                    type: integer
                classPK:
                    description:
                        The reported item's class primary key.
                    format: int64
                    readOnly: true
                    type: integer
                configurationId:
                    description:
                        The report entry's configuration ID.
                    format: int64
                    readOnly: true
                    type: integer
                creator:
                    $ref: ../../headless/headless-delivery/headless-delivery-impl/rest-openapi.yaml#Creator
                    readOnly: true
                dateCreated:
                    description:
                        The report entry's creation date.
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    description:
                        The report entry's latest modification date.
                    format: date-time
                    readOnly: true
                    type: string
                errorMessage:
                    description:
                        The error message.
                    readOnly: true
                    type: string
                errorStacktrace:
                    description:
                        Optional field with the full stack trace of the error, can be embedded with nestedFields.
                    readOnly: true
                    type: string
                id:
                    description:
                        The report entry's ID.
                    format: int64
                    readOnly: true
                    type: integer
                modelName:
                    description:
                        The reported item's model name.
                    readOnly: true
                    type: string
                origin:
                    $ref: "#/components/schemas/Origin"
                    description:
                        The report entry's origin.
                    readOnly: true
                scope:
                    description:
                        The reported item's scope.
                    readOnly: true
                    type: scope
                status:
                    $ref: "#/components/schemas/Status"
                    description:
                        The report entry's 's status.
                    readOnly: true
                type:
                    $ref: "#/components/schemas/Type"
                    description:
                        The report entry's type.
                    readOnly: true
            type: object
        Status:
            properties:
                code:
                    format: int32
                    type: integer
                label:
                    type: string
        Type:
            properties:
                code:
                    format: int32
                    type: integer
                label:
                    type: string
            type: object
        ValidationRequest:
            properties:
                file:
                    description:
                        .lar file to validate
                    format: binary
                    type: string
            type: object
        ValidationResponse:
            properties:
                errorMessages:
                    description:
                        List of error messages.
                    items:
                        type: string
                    type: array
                fileEntryId:
                    description:
                        Identifier of the temporary lar file created.
                    format: int64
                    type: integer
                success:
                    description:
                        Shows if the file can be imported without critical errors.
                    type: boolean
            type: object
