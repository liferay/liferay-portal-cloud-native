modified.files.includes[relevant][export-import-java-rule]=\
    **/*.java,\
    **/test/**,\
    **/testIntegration/**

modules.includes.required.test.batch.class.names.includes[modules-integration-*][relevant][export-import-java-rule]=\
    **/src/testIntegration/**/exportimport/**/*Test.java,\
    apps/export-import/**/*Test.java

modules.includes.required.test.batch.class.names.includes[modules-unit][relevant][export-import-java-rule]=\
    **/portal-security-ldap-impl/**/LDAPUserImporterImplTest.java,\
    apps/export-import/**/*Test.java

relevant.rule.names=export-import-java-rule

test.batch.names[relevant][export-import-java-rule]=\
    modules-integration-postgresql163,\
    modules-unit

test.batch.run.property.query[functional-tomcat-mysql*-jdk*][test-portal-hotfix-release]=\
    (portal.acceptance == true) AND \
    (\
        (testray.main.component.name ~ "Export/Import") OR \
        (testray.main.component.name ~ "Staging")\
    )

testray.main.component.name=Export/Import