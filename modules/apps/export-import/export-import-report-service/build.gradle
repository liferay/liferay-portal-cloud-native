buildService {
	apiDir = "../export-import-report-api/src/main/java"
	testDir = "../export-import-report-test/src/testIntegration/java"
}

dependencies {
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "default"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.4.0"
	compileOnly project(":apps:batch-engine:batch-engine-api")
	compileOnly project(":apps:export-import:export-import-api")
	compileOnly project(":apps:export-import:export-import-report-api")
	compileOnly project(":apps:object:object-api")
	compileOnly project(":apps:portal-vulcan:portal-vulcan-api")
	compileOnly project(":apps:portal:portal-aop-api")
	compileOnly project(":apps:staging:staging-api")
	compileOnly project(":apps:static:portal:portal-upgrade-api")
	compileOnly project(":core:petra:petra-function")
	compileOnly project(":core:petra:petra-lang")
	compileOnly project(":core:petra:petra-sql-dsl-api")
	compileOnly project(":core:petra:petra-string")
}