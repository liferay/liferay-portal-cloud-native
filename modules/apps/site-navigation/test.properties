modified.files.includes[relevant][site-navigation-java-rule]=\
    **/*.java,\
    **/test/**,\
    **/testIntegration/**

modules.includes.required.test.batch.class.names.includes[modules-integration-postgresql163][relevant][site-navigation-java-rule]=\
    apps/site-navigation/**/*Test.java

modules.includes.required.test.batch.class.names.includes[modules-unit][relevant][site-navigation-java-rule]=\
    apps/site-navigation/**/*Test.java

relevant.rule.names=site-navigation-java-rule

test.batch.names[relevant][site-navigation-java-rule]=\
    modules-integration-postgresql163,\
    modules-unit

test.batch.run.property.query[functional-tomcat-mysql*-jdk*][test-portal-hotfix-release]=\
    (portal.acceptance == true) AND \
    (\
        (testray.main.component.name ~ "Breadcrumb Widget") OR \
        (testray.main.component.name ~ "Localization") OR \
        (testray.main.component.name ~ "Navigation Menus") OR \
        (testray.main.component.name ~ "Sitemap Protocol")\
    )

testray.main.component.name=Navigation Menus