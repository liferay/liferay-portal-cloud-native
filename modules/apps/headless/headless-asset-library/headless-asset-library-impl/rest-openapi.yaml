components:
    schemas:
        AssetLibrary:
            description:
                Represents an Asset Library
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    # @review
                    description:
                        Block of actions allowed by the user making the request.
                    readOnly: true
                    type: object
                assetLibraryKey:
                    description:
                        The asset library's key.
                    type: string
                connectedSites:
                    description:
                        The asset library's connected sites.
                    items:
                        $ref: "#/components/schemas/ConnectedSite"
                    readOnly: true
                    type: array
                creatorUserId:
                    description:
                        The asset library's creator user ID.
                    format: int64
                    readOnly: true
                    type: integer
                dateCreated:
                    description:
                        The asset library's creation date.
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    description:
                        The last time a field of the asset library changed.
                    format: date-time
                    readOnly: true
                    type: string
                description:
                    description:
                        The asset library's description.
                    type: string
                description_i18n:
                    additionalProperties:
                        type: string
                    description:
                        The localized asset library's description.
                    type: object
                externalReferenceCode:
                    description:
                        The asset library's external reference code.
                    type: string
                id:
                    description:
                        The asset library's ID.
                    format: int64
                    readOnly: true
                    type: integer
                name:
                    description:
                        The asset library's name.
                    type: string
                name_i18n:
                    additionalProperties:
                        type: string
                    description:
                        The localized asset library's name.
                    type: object
                numberOfConnectedSites:
                    description:
                        The number of this asset library's connected sites.
                    readOnly: true
                    type: integer
                numberOfUserAccounts:
                    description:
                        The number of this asset library's associated users.
                    readOnly: true
                    type: integer
                numberOfUserGroups:
                    description:
                        The number of this asset library's associated user groups.
                    readOnly: true
                    type: integer
                permissions:
                    items:
                        type: permission
                    type: array
                settings:
                    $ref: "#/components/schemas/Settings"
                    description:
                        The asset library's settings.
                siteId:
                    description:
                        The asset library's site ID.
                    format: int64
                    readOnly: true
                    type: integer
                type:
                    default: AssetLibrary
                    enum: [AssetLibrary, Project, Space]
                    type: string
                userAccounts:
                    description:
                        The asset library's associated users.
                    items:
                        $ref: "#/components/schemas/UserAccount"
                    readOnly: true
                    type: array
                userGroups:
                    description:
                        The asset library's associated user groups.
                    items:
                        $ref: "#/components/schemas/UserGroup"
                    readOnly: true
                    type: array
        ConnectedSite:
            description:
                Represents a connected site.
            properties:
                descriptiveName:
                    description:
                        The connected site's descriptive name.
                    readOnly: true
                    type: string
                descriptiveName_i18n:
                    additionalProperties:
                        type: string
                    readOnly: true
                    type: object
                externalReferenceCode:
                    description:
                        The connected site's external reference code.
                    readOnly: true
                    type: string
                id:
                    description:
                        The connected site's ID.
                    format: int64
                    readOnly: true
                    type: integer
                logo:
                    description:
                        The connected site's logo.
                    readOnly: true
                    type: string
                name:
                    description:
                        The connected site's name.
                    readOnly: true
                    type: string
                name_i18n:
                    additionalProperties:
                        type: string
                    readOnly: true
                    type: object
                searchable:
                    default: true
                    type: boolean
            type: object
        MimeTypeLimit:
            description:
                Represents the maximum size of an asset library's associated mime type.
            properties:
                maximumSize:
                    type: integer
                mimeType:
                    type: string
        Role:
            description:
                Represents a role.
            properties:
                externalReferenceCode:
                    description:
                        The role's external reference code.
                    readOnly: true
                    type: string
                id:
                    description:
                        The role's ID.
                    format: int64
                    readOnly: true
                    type: integer
                name:
                    description:
                        The role's name.
                    type: string
                name_i18n:
                    additionalProperties:
                        type: string
                    description:
                        The localized role's name.
                    readOnly: true
                    type: object
                roleType:
                    description:
                        The role's type.
                    readOnly: true
                    type: integer
        Settings:
            description:
                Represents the settings of an asset library.
            properties:
                autoTaggingEnabled:
                    default: false
                    type: boolean
                availableLanguageIds:
                    items:
                        type: string
                    type: array
                defaultLanguageId:
                    type: string
                logoColor:
                    type: string
                mimeTypeLimits:
                    items:
                        $ref: "#/components/schemas/MimeTypeLimit"
                    type: array
                sharingEnabled:
                    default: false
                    type: boolean
                trashEnabled:
                    default: true
                    type: boolean
                trashEntriesMaxAge:
                    type: integer
                useCustomLanguages:
                    default: false
                    type: boolean
        UserAccount:
            description:
                Represents a user.
            properties:
                externalReferenceCode:
                    description:
                        The user's external reference code
                    readOnly: true
                    type: string
                id:
                    description:
                        The user's ID.
                    format: int64
                    readOnly: true
                    type: integer
                image:
                    description:
                        A relative URL to the user's profile image.
                    format: uri
                    readOnly: true
                    type: string
                name:
                    description:
                        The user's full name.
                    readOnly: true
                    type: string
                roles:
                    description:
                        A list of the user's roles.
                    items:
                        $ref: "#/components/schemas/Role"
                    readOnly: true
                    type: array
        UserGroup:
            description:
                Represents a user group.
            properties:
                externalReferenceCode:
                    description:
                        The user group's external reference code.
                    readOnly: true
                    type: string
                id:
                    description:
                        The user group's ID.
                    format: int64
                    readOnly: true
                    type: integer
                name:
                    description:
                        The user group's  name.
                    readOnly: true
                    type: string
                name_i18n:
                    additionalProperties:
                        type: string
                    readOnly: true
                    type: object
                numberOfUserAccounts:
                    description:
                        The number of this user group's associated users.
                    readOnly: true
                    type: integer
                roles:
                    description:
                        The list of roles associated with this user group.
                    items:
                        $ref: "#/components/schemas/Role"
                    readOnly: true
                    type: array
