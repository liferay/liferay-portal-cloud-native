components:
    schemas:
        TaskAssignee:
            properties:
                externalReferenceCode:
                    readOnly: true
                    type: string
                id:
                    format: int64
                    type: integer
                name:
                    readOnly: true
                    type: string
                portrait:
                    readOnly: true
                    type: string
                type:
                    readOnly: true
                    type: string
        TaskStatistics:
            properties:
                blockedCount:
                    format: int64
                    readOnly: true
                    type: integer
                inProgressCount:
                    format: int64
                    readOnly: true
                    type: integer
                overdueCount:
                    format: int64
                    readOnly: true
                    type: integer
                totalCount:
                    format: int64
                    readOnly: true
                    type: integer
info:
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: ""
    version: v1.0
openapi: 3.0.1
paths:
    "/projects/{projectId}/task-statistics":
        get:
            operationId: getProjectTaskStatistics
            parameters:
                -   in: path
                    name: projectId
                    required: true
                    schema:
                        format: int64
                        type: integer
                -   in: query
                    name: filter
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/TaskStatistics"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/TaskStatistics"
            tags: ["TaskStatistics"]
    "/task-assignees":
        get:
            operationId: getTaskAssigneesPage
            parameters:
                -   in: query
                    name: search
                    schema:
                        type: string
                -   in: query
                    name: type
                    schema:
                        enum: [Role, User]
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/TaskAssignee"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/TaskAssignee"
                                type: array
            tags: ["TaskAssignee"]
    "/task-statistics":
        get:
            operationId: getTaskStatistics
            parameters:
                -   in: query
                    name: filter
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/TaskStatistics"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/TaskStatistics"
            tags: ["TaskStatistics"]