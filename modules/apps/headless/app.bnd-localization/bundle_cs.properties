liferay-releng-app-description=Aplikace Liferay REST APIs zpřístupňuje novou generaci RESTful API, která interagují se službami Liferay. Tato API umožňují vývojářům využívat služby Liferay přímočarým a flexibilním způsobem. Vývojáři mohou například využívat portálové zdroje, jako jsou dokumenty, blogy nebo strukturovaný obsah, prostřednictvím plně RESTful API, která podporují několik formátů odpovědí, jako je JSON nebo XML. <br /><br />Tato aplikace nemá v portálu žádnou vizuální komponentu. Po její instalaci můžete začít přistupovat k API na odpovídajících URL adresách, které si můžete prohlédnout na adrese http://[host]:[port]/o/api.