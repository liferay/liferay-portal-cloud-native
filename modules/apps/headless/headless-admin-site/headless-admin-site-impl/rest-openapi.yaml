paths:
    "/sites/{siteExternalReferenceCode}/display-page-template-folders":
        get:
            # @review
            description:
                Retrieves the display page template folders of the site.
            operationId: getSiteDisplayPageTemplateFoldersPage
            parameters:
                -   in: path
                    name: siteExternalReferenceCode
                    required: true
                    schema:
                        type: string
                -   in: query
                    name: aggregationTerms
                    schema:
                        items:
                            type: string
                        type: array
                -   in: query
                    name: fields
                    schema:
                        type: string
                -   in: query
                    name: filter
                    schema:
                        type: string
                -   in: query
                    name: nestedFields
                    schema:
                        type: string
                -   in: query
                    name: page
                    schema:
                        type: integer
                -   in: query
                    name: pageSize
                    schema:
                        type: integer
                -   in: query
                    name: restrictFields
                    schema:
                        type: string
                -   in: query
                    name: search
                    schema:
                        type: string
                -   in: query
                    name: sort
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/DisplayPageTemplateFolder"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/DisplayPageTemplateFolder"
                                type: array
            tags: ["DisplayPageTemplateFolder"]
        post:
            # @review
            description:
                Adds a new display page template folder.
            operationId: postSiteDisplayPageTemplateFolder
            parameters:
                -   in: path
                    name: siteExternalReferenceCode
                    required: true
                    schema:
                        type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/DisplayPageTemplateFolder"
                    application/xml:
                        schema:
                            $ref: "#/components/schemas/DisplayPageTemplateFolder"
            responses:
                200:
                    content:
