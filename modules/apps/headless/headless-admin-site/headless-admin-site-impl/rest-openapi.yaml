components:
    schemas:
        ActionFragmentEditableElementValue:
            allOf:
                -   $ref: "#/components/schemas/FragmentEditableElementValue"
                -   properties:
                        action:
                            # @review
                            description:
                                The fragment editable element's action. Must be mapped to an external value.
                            oneOf:
                                -   $ref: "#/components/schemas/FragmentMappedValue"
                        onError:
                            $ref: "#/components/schemas/ActionInteraction"
                            # @review
                            description:
                                The action interaction in case the action fails.
                        onSuccess:
                            $ref: "#/components/schemas/ActionInteraction"
                            # @review
                            description:
                                The action interaction in case the action succeeds.
                        textFragmentValue:
                            $ref: "#/components/schemas/TextFragmentValue"
                            # @review
                            description:
                                The fragment editable element's text value.
            # @review
            description:
                A fragment editable element value of type action.
            type: object
        ActionInteraction:
            # @review
            description:
                The result of an action interaction.
            properties:
                type:
                    # @review
                    description:
                        The type of result.
                    enum: [DisplayPage, None, Notification, Page, URL]
                    type:
                        string
                value:
                    oneOf:
                        -   $ref: "#/components/schemas/DisplayPageActionInteraction"
                        -   $ref: "#/components/schemas/NoneActionInteraction"
                        -   $ref: "#/components/schemas/NotificationActionInteraction"
                        -   $ref: "#/components/schemas/PageActionInteraction"
                        -   $ref: "#/components/schemas/URLActionInteraction"
            type: object
        AnalyticsConfiguration:
            description:
                Contains all analytics configuration properties.
            properties:
                googleAnalyticsConfiguration:
                    $ref: "#/components/schemas/GoogleAnalyticsConfiguration"
                matomoAnalyticsScript:
                    description:
                        Set the script for Matomo that is used for this set of pages. Enter the full script code
                        including the script start and end tags.
                    type: string
            type: object
        BackgroundImageFragmentEditableElementValue:
            allOf:
                -   $ref: "#/components/schemas/FragmentEditableElementValue"
                -   properties:
                        backgroundFragmentImageValue:
                            $ref: "#/components/schemas/FragmentImageValue"
                            # @review
                            description:
                                The fragment editable element's background image value.
            # @review
            description:
                A fragment editable element value of type background image.
            type: object
        BasicFragmentInstancePageElementDefinition:
            allOf:
                -   $ref: "#/components/schemas/PageElementDefinition"                               
                -   properties:
                        fragmentInstance:
                            $ref: "#/components/schemas/FragmentInstance"
                            # @review
                            description:
                                The fragment instance of the basic fragment page element definition.
            # @review
            description:
                The page element definition of a basic fragment instance.
            type: object  
        BasicLayout:
            properties:
                align:
                    enum: [Baseline, Center, End, None, Start, Stretch]
                    type: string
                flexWrap:
                    enum: [NoWrap, Wrap, WrapReverse]
                    type: string
                justify:
                    enum: [Center, End, None, SpaceAround, SpaceBetween, Start]
                    type: string
        BasicWidgetPageWidgetInstance:
            allOf:
                -   $ref: "#/components/schemas/WidgetPageWidgetInstance"
            # @review
            description:
                A basic (non nested applications) widget instance in a widget page.
            type: object
        CategoryFragmentConfigurationFieldValue:
            allOf:
                -   $ref: "#/components/schemas/FragmentConfigurationFieldValue"
                -   properties:
                        value:
                            $ref: "#/components/schemas/ItemExternalReference"
                            # @review
                            description:
                                The value of the fragment configuration field of type category.
                        value_i18n:
                            additionalProperties:
                                $ref: "#/components/schemas/ItemExternalReference"
                            # @review
                            description:
                                The localized value of the fragment configuration field of type category.
                            type: object
            # @review
            description:
                The value of a fragment configuration field of type category.
            type: object
        CheckboxFragmentConfigurationFieldValue:
            allOf:
                -   $ref: "#/components/schemas/FragmentConfigurationFieldValue"
                -   properties:
                        value:
                            # @review
                            description:
                                Whether the fragment configuration field of type checkbox is checked.
                            type: boolean
                        value_i18n:
                            additionalProperties:
                                type: boolean
                            # @review
                            description:
                                Whether the fragment configuration field of type checkbox is checked.
                            type: object
            # @review
            description:
                The value of a fragment configuration field of type checkbox.
            type: object
        ClassNameReference:
            allOf:
                -   $ref: "#/components/schemas/CollectionReference"
                -   properties:
                        className:
                            type: string
            # @review
            description:
                A reference specifying the class name.
            required:
                -   className
            type: object
        ClassSubtypeReference:
            # @review
            description:
                A reference specifying the class name and an optional subtype.
            properties:
                className:
                    type: string
                subTypeExternalReference:
                    $ref: "#/components/schemas/ItemExternalReference"
            required:
                -   className
            type: object
        ClientExtension:
            # @review
            description:
                A reference to a client extension along with its configuration values.
            properties:
                clientExtensionConfig:
                    additionalProperties:
                        type: string
                    # @review
                    description:
                        The configuration keys and values of the client extension.
                    type: object
                externalReferenceCode:
                    # @review
                    description:
                        The client extension's external reference code.
                    type: string
            type: object
        CollectionDisplayListStyle:
            # @review
            description:
                The collection display's list style.
            discriminator:
                mapping:
                    ListStyle: "#/components/schemas/ListStyle"
                    Template: "#/components/schemas/TemplateListStyle"
                propertyName: collectionDisplayListStyleType
            properties:
                collectionDisplayListStyleType:
                    # @review
                    description:
                        The collection display's list style type (ListStyle, Template).
                    enum: [ListStyle, Template]
                    type: string
            type: object
        CollectionDisplayPageElementDefinition:
            allOf:
                -   $ref: "#/components/schemas/PageElementDefinition"
                -   properties:
                        collectionDisplayListStyle:
                            $ref: "#/components/schemas/CollectionDisplayListStyle"
                        collectionDisplayViewports:
                            # @review
                            description:
                                A list of viewports of the collection display page element.
                            items:
                                $ref: "#/components/schemas/CollectionDisplayViewport"
                            type: array
                        collectionSettings:
                            $ref: "#/components/schemas/CollectionSettings"
                        displayAllItems:
                            # @review
                            description:
                                Whether to show all items when pagination is disabled.
                            type: boolean
                        displayAllPages:
                            # @review
                            description:
                                Whether to show all pages when pagination is enabled.
                            type: boolean
                        emptyCollectionConfig:
                            $ref: "#/components/schemas/EmptyCollectionConfig"
                        name:
                            # @review
                            description:
                                The custom name of a collection display page element.
                            type: string
                        numberOfItems:
                            # @review
                            description:
                                The maximum number of items to display in the collection display page element when
                                pagination is disabled.
                            type: integer
                        numberOfItemsPerPage:
                            # @review
                            description:
                                The maximum number of items per page to display in the collection display page element
                                when pagination is enabled.
                            type: integer
                        numberOfPages:
                            # @review
                            description:
                                The maximum number of pages to display in the collection display page element when
                                pagination is enabled.
                            type: integer
                        paginationType:
                            # @review
                            description:
                                The type of pagination.
                            enum: [
                                None,
                                Numeric,
                                Simple]
                            type: string
            # @review
            description:
                The page element definition of a Collection.
            type: object
        CollectionDisplayViewport:
            # @review
            description:
                A collection display viewport.
            properties:
                collectionDisplayViewportDefinition:
                    # @review
                    allOf:
                        -   $ref: "#/components/schemas/BasicLayout"
                        -   properties:
                                hidden:
                                    # @review
                                    description:
                                        Specifies if the collection display is hidden to the user for the viewport.
                                    type: boolean
                                numberOfColumns:
                                    # @review
                                    description:
                                        The number of columns of the collection viewport if a grid list style is
                                        selected.
                                    type: integer
                    description:
                        The definition of the collection display viewport.
                    type: object
                id:
                    enum: [Desktop, LandscapeMobile, PortraitMobile, Tablet]
                    type: string
            required:
                -   collectionDisplayViewportDefinition
                -   id
            type: object
        CollectionFragmentConfigurationFieldValue:
            allOf:
                -   $ref: "#/components/schemas/FragmentConfigurationFieldValue"
                -   properties:
                        value:
                            $ref: "#/components/schemas/CollectionReference"
                            # @review
                            description:
                                The value of the fragment configuration field of type collection.
                        value_i18n:
                            additionalProperties:
                                $ref: "#/components/schemas/CollectionReference"
                            # @review
                            description:
                                The localized value of the fragment configuration field of type collection.
                            type: object
            # @review
            description:
                The value of a fragment configuration field of type collection.
            type: object
        CollectionItemExternalReference:
            allOf:
                -   $ref: "#/components/schemas/CollectionReference"
                -   $ref: "#/components/schemas/ItemExternalReference"
            # @review
            description:
                A unique reference to a collection which remains constant across environments.
            type: object
        CollectionItemPageElementDefinition:
            allOf:
                -   $ref: "#/components/schemas/PageElementDefinition"
                -   properties:
                        collectionItemConfig:
                            # @review
                            description:
                                The collection item page element's configuration.
                            type: object
            # @review
            description:
                The page element definition of a Collection Item.
            type: object
        CollectionReference:
            # @review
            description:
                The page collection's reference.
            discriminator:
                mapping:
                    Collection: "#/components/schemas/CollectionItemExternalReference"
                    CollectionProvider: "#/components/schemas/ClassNameReference"
                propertyName: collectionType
            properties:
                collectionType:
                    # @review
                    description:
                        The collection's type (Collection, CollectionProvider).
                    enum: [Collection, CollectionProvider]
                    type: string
            type: object
        CollectionSettings:
            properties:
                collectionConfig:
                    additionalProperties:
                        type: object
                    # @review
                    description:
                        The configuration keys and values of the collection.
                    type: object
                collectionReference:
                    $ref: "#/components/schemas/CollectionReference"
            type: object
        ColorPaletteFragmentConfigurationFieldValue:
            allOf:
                -   $ref: "#/components/schemas/FragmentConfigurationFieldValue"
                -   properties:
                        value:
                            $ref: "#/components/schemas/ColorPaletteValue"
                            # @review
                            description:
                                The value of the fragment configuration field of type color palette.
                        value_i18n:
                            additionalProperties:
                                $ref: "#/components/schemas/ColorPaletteValue"
                            # @review
                            description:
                                The localized value of the fragment configuration field of type color palette.
                            type: object
            # @review
            description:
                The value of a fragment configuration field of type color palette.
            type: object
        ColorPaletteValue:
            # @review
            description:
                The value of a field of type color palette.
            properties:
                color:
                    type: string
                cssClass:
                    type: string
                rgbValue:
                    type: string
            type: object
        ColorPickerFragmentConfigurationFieldValue:
            allOf:
                -   $ref: "#/components/schemas/FragmentConfigurationFieldValue"
                -   properties:
                        value:
                            # @review
                            description:
                                The value of the fragment configuration field of type color picker.
                            type: string
                        value_i18n:
                            additionalProperties:
                                type: string
                            # @review
                            description:
                                The localized value of the fragment configuration field of type color picker.
                            type: object
            # @review
            description:
                The value of a fragment configuration field of type color picker.
            type: object
        ContainerPageElementDefinition:
            allOf:
                -   $ref: "#/components/schemas/PageElementDefinition"
                -   properties:
                        backgroundFragmentImage:
                            $ref: "#/components/schemas/FragmentImage"
                            # @review
                            description:
                                The fragment's background image.
                        contentVisibility:
                            # @review
                            description:
                                The content visibility of the container.
                            enum: [Auto]
                            type: string
                        cssClasses:
                            # @review
                            description:
                                A list of CSS Classes that are applied to all viewports.
                            items:
                                type: string
                            type: array
                        fragmentLink:
                            $ref: "#/components/schemas/FragmentLink"
                            # @review
                            description:
                                The fragment link of the container page element.
                        fragmentViewports:
                            # @review
                            description:
                                A list of fragment viewports of the container page element.
                            items:
                                $ref: "#/components/schemas/FragmentViewport"
                            type: array
                        htmlProperties:
                            $ref: "#/components/schemas/HtmlProperties"
                        indexed:
                            # @review
                            description:
                                A flag that indicates whether the container page element is indexed or not.
                            type: boolean
                        layout:
                            $ref: "#/components/schemas/Layout"
                            # @review
                            description:
                                The container page element's layout.
                        name:
                            # @review
                            description:
                                The custom name of a container page element.
                            type: string
            # @review
            description:
                The page element definition of a container.
            type: object
        ContentPageSettings:
            allOf:
                -   $ref: "#/components/schemas/PageSettings"
                -   properties:
                        customMetaTags:
                            # @review
                            description:
                                A list of custom meta tags this page has.
                            items:
                                $ref: "#/components/schemas/CustomMetaTag"
                            type: array
                        openGraphSettings:
                            $ref: "#/components/schemas/OpenGraphSettings"
                            # @review
                            description:
                                The page's Open Graph settings.
                        seoSettings:
                            $ref: "#/components/schemas/SEOSettings"
                            # @review
                            description:
                                The page's SEO settings.
            # @review
            description:
                The settings of a content page.
            type: object
        ContentPageSpecification:
            allOf:
                -   $ref: "#/components/schemas/PageSpecification"
                -   properties:
                        draftContentPageSpecificationExternalReferenceCode:
                            # @review
                            description:
                                The draft content page specification external reference code or null if it is a draft
                                content page specification.
                            type: string
                        pageExperiences:
                            items:
                                $ref: "#/components/schemas/PageExperience"
                            type: array
                        settings:
                            $ref: "#/components/schemas/Settings"
                        siteTemplatePageSpecificationExternalReferenceCode:
                            # @review
                            description:
                                The site template page specification's external reference code.
                            type: string
            # @review
            description:
                A page specification of a content page. A content page will contain 1 page specification for its draft
                layout and 1 page specification for its published layout.
            type: object
        ContentPageTemplate:
            allOf:
                -   $ref: "#/components/schemas/PageTemplate"
            # @review
            description:
                A content page template.
            type: object
        ContentPageTemplateSettings:
            allOf:
                -   $ref: "#/components/schemas/PageTemplateSettings"
            # @review
            description:
                The settings of a content page template.
            type: object
        ContextReference:
            # @review
            description:
                A reference of type context, used in collection display fragments and display page templates.
            properties:
                contextSource:
                    enum: [CollectionItem, DisplayPageItem]
                    type: string
            required:
                -   contextSource
            type: object
        ContextualMenuNavigationMenuValue:
            allOf:
                -   $ref: "#/components/schemas/NavigationMenuValue"
                -   properties:
                        contextualMenuType:
                            enum: [Children, ParentAndItsSiblings, SelfAndSiblings]
                            type: string
                    required:
                        -   contextualMenuType
                    type: object
        CustomMetaTag:
            # @review
            description:
                A custom meta tag.
            properties:
                key:
                    # @review
                    description:
                        The custom meta tag's key.
                    type: string
                value_i18n:
                    additionalProperties:
                        type: string
                    # @review
                    description:
                        The localized custom meta tag's values.
                    type: object
            type: object
        DefaultFragmentReference:
            allOf:
                -   $ref: "#/components/schemas/FragmentReference"
                -   properties:
                        defaultFragmentKey:
                            # @review
                            description:
                                The key of the default fragment.
                            type: string
            # @review
            description:
                A reference to a default fragment (provided out-of-the-box).
            required:
                -   defaultFragmentKey
            type: object
        DirectFragmentImageValue:
            allOf:
                -   $ref: "#/components/schemas/FragmentImageValue"
                -   properties:
                        value_i18n:
                            additionalProperties:
                                $ref: "#/components/schemas/ImageValue"
                            # @review
                            description:
                                The localized value of the direct fragment image.
                            type: object
            # @review
            description:
                A fragment image value of type direct.
            type: object
        DisplayPageActionInteraction:
            # @review
            description:
                The definition of an action interaction of type display page.
            properties:
                mapping:
                    # @review
                    description:
                        The mapping of the display page action result.
                    properties:
                        fieldKey:
                            # @review
                            description:
                                The mapping's field key.
                            type: string
                    type: object
            type: object
        DisplayPageFormContainerSubmissionResult:
            # @review
            allOf:
                -   $ref: "#/components/schemas/SuccessFormContainerSubmissionResult"
                -   properties:
                        defaultDisplayPage:
                            # @review
                            description:
                                Default display page when a form container submission is successful.
                            type: boolean
                        itemExternalReference:
                            $ref: "#/components/schemas/ItemExternalReference"
                            # @review
                            description:
                                A reference to a site page when a form container submission is successful.
                        successNotificationMessage:
                            $ref: "#/components/schemas/SuccessNotificationMessage"
                            # @review
                            description:
                                The success notification message.
            description:
                The definition of a submission result of type page.
            type: object
        DisplayPageNavigationMenuItemSettings:
            description:
                Type-specific settings for "Blogs Entry", "Document", "Knowledge Base Article", "Product", "Web Content"
                navigation menu item types.
            properties:
                className:
                    description:
                        The class name of the entity that this navigation menu item is set to.
                    type: string
                externalReferenceCode:
                    description:
                        The external reference code of the entity that this navigation menu item is set to.
                    type: string
                scopeExternalReferenceCode:
                    description:
                        The external reference code of the site associated with the entity that this navigation menu
                        item is set to.
                    type: string
                title:
                    description:
                        The title or name of the entity that this navigation menu item is set to.
                    type: string
                type:
                    description:
                        The type of the underlying entity that this navigation menu item is set to.
                    type: string
            type: object
        DisplayPageTemplate:
            # @review
            description:
                A display page template.
            properties:
                contentTypeReference:
                    $ref: "#/components/schemas/ClassSubtypeReference"
                    description:
                        The content type (and optionally subtype) associated to the display page template.
                creator:
                    $ref: ../../headless-admin-user/headless-admin-user-impl/rest-openapi.yaml#Creator
                    # @review
                    description:
                        The display page template's creator. It is not returned by default. It can be embedded via
                        nestedFields.
                    readOnly: true
                dateCreated:
                    # @review
                    description:
                        The display page template's creation date.
                    format: date-time
                    type: string
                dateModified:
                    # @review
                    description:
                        The last time any field of the display page template was changed.
                    format: date-time
                    type: string
                datePublished:
                    # @review
                    description:
                        The display page template's most recent publication date.
                    format: date-time
                    type: string
                displayPageTemplateSettings:
                    $ref: "#/components/schemas/DisplayPageTemplateSettings"
                    # @review
                    description:
                        Settings of the display page template, such as SEO or OpenGraph.
                externalReferenceCode:
                    # @review
                    description:
                        The display page template's external reference code.
                    type: string
                friendlyUrlHistory:
                    $ref: "#/components/schemas/FriendlyUrlHistory"
                    # @review
                    description:
                        The history of previously used URLs to the display page template's rendered content. This field
                        is not returned by default. It can be requested via nestedFields.
                friendlyUrlPath_i18n:
                    additionalProperties:
                        type: string
                    # @review
                    description:
                        The localized relative URLs to the display page template's rendered content.
                    type: object
                key:
                    # @review
                    description:
                        The display page template's key.
                    type: string
                markedAsDefault:
                    # @review
                    description:
                        Whether the display page template is the default one for the given content type/subtype.
                    type: boolean
                name:
                    # @review
                    description:
                        The display page template's name.
                    type: string
                pageSpecifications:
                    # @review
                    description:
                        The display page template's specifications. A display page template will contain 1 page
                        specifications for its draft layout and 1 page specifications for its published layout. This
                        field is not returned by default. It can be requested via nestedFields.
                    items:
                        $ref: "#/components/schemas/PageSpecification"
                    type: array
                parentFolder:
                    $ref: "#/components/schemas/DisplayPageTemplateFolder"
                    # @review
                    description:
                        The display page template's parent folder.
                permissions:
                    items:
                        type: permission
                    type: array
                thumbnailURLReference:
                    $ref: "#/components/schemas/ThumbnailURLReference"
                    # @review
                    description:
                        The display page template's thumbnail.
                uuid:
                    # @review
                    description:
                        A valid external identifier to reference this display page template.
                    type: string
            type: object
        DisplayPageTemplateFolder:
            # @review
            description:
                A display page template folder.
            properties:
                creator:
                    $ref: ../../headless-admin-user/headless-admin-user-impl/rest-openapi.yaml#Creator
                    # @review
                    description:
                        The display page template folder's creator. It is not returned by default. It can be embedded
                        via nestedFields.
                    readOnly: true
                dateCreated:
                    # @review
                    description:
                        The display page template folder's creation date.
                    format: date-time
                    type: string
                dateModified:
                    # @review
                    description:
                        The last time any field of the display page template folder was changed.
                    format: date-time
                    type: string
                description:
                    # @review
                    description:
                        The display page template folder's description.
                    type: string
                externalReferenceCode:
                    # @review
                    description:
                        The display page template folder's external reference code.
                    type: string
                key:
                    # @review
                    description:
                        The display page template folder's key.
                    type: string
                name:
                    # @review
                    description:
                        The display page template folder's name.
                    type: string
                parentDisplayPageTemplateFolder:
                    $ref: "#/components/schemas/DisplayPageTemplateFolder"
                    # @review
                    description:
                        The parent display page template folder.
                parentDisplayPageTemplateFolderExternalReferenceCode:
                    # @review
                    description:
                        The parent display page template folder's external reference code.
                    type: string
                permissions:
                    items:
                        type: permission
                    type: array
                uuid:
                    # @review
                    description:
                        A valid external identifier to reference this page template folder.
                    type: string
            type: object
        DisplayPageTemplateOpenGraphSettings:
            description:
                Represents display page template settings related with Open Graph protocol.
            properties:
                descriptionTemplate:
                    description:
                        The Open Graph's description template.
                    type: string
                imageAltTemplate:
                    description:
                        The Open Graph's image alt template.
                    type: string
                imageTemplate:
                    description:
                        The Open Graph's image template.
                    type: string
                titleTemplate:
                    description:
                        The Open Graph's title template.
                    type: string
            type: object
        DisplayPageTemplateSEOSettings:
            description:
                Settings related with SEO of a display page template.
            properties:
                descriptionTemplate:
                    description:
                        The description template of the display page template to be used as summary for search engines.
                    type: string
                htmlTitleTemplate:
                    description:
                        The main title template of the display page template to be used by search engines.
                    type: string
                robots_i18n:
                    additionalProperties:
                        type: string
                    description:
                        A localized tag telling search engines if and how they should crawl the display page template.
                    type: object
                sitemapSettings:
                    $ref: "#/components/schemas/SitemapSettings"
                    # @review
                    description:
                        Represents settings related with the site map.
            type: object
        DisplayPageTemplateSettings:
            # @review
            description:
                The settings of a display page template.
            properties:
                openGraphSettings:
                    $ref: "#/components/schemas/DisplayPageTemplateOpenGraphSettings"
                    # @review
                    description:
                        The display page template's Open Graph settings.
                seoSettings:
                    $ref: "#/components/schemas/DisplayPageTemplateSEOSettings"
                    # @review
                    description:
                        The display page template's SEO settings.
            type: object
        DropZonePageElementDefinition:
            allOf:
                -   $ref: "#/components/schemas/PageElementDefinition"
                -   properties:
                        addNewFragmentEntries:
                            # @review
                            description:
                                Whether to add new fragment entries automatically in the allowed fragments list.
                            type: boolean
                        allowedFragmentReferences:
                            # @review
                            description:
                                A list of allowed fragment references.
                            items:
                                $ref: "#/components/schemas/FragmentReference"
                            type: array
            # @review
            description:
                Represent a page element definition of a drop zone.
            type: object
        EmbeddedMessageFormContainerSubmissionResult:
            # @review
            allOf:
                -   $ref: "#/components/schemas/SuccessFormContainerSubmissionResult"
                -   properties:
                        message:
                            $ref: "#/components/schemas/FragmentInlineValue"
                            # @review
                            description:
                                The localized submission of message type.
                        successNotificationMessage:
                            $ref: "#/components/schemas/SuccessNotificationMessage"
                            # @review
                            description:
                                The success notification message.
            description:
                The definition of a submission result of type embedded message.
            type: object
        EmptyCollectionConfig:
            properties:
                displayMessage:
                    # @review
                    description:
                        Whether to display a message when the collection is empty or no results match the applied
