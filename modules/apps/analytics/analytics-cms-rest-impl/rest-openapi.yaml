components:
    schemas:
        OverviewContent:
            properties:
                categoriesCount:
                    format: int64
                    type: integer
                tagsCount:
                    format: int64
                    type: integer
                totalCount:
                    format: int64
                    type: integer
                trend:
                    $ref: "#/components/schemas/Trend"
                vocabulariesCount:
                    format: int64
                    type: integer
        Trend:
            properties:
                classification:
                    enum: [NEGATIVE, NEUTRAL, POSITIVE]
                    type: string
                percentage:
                    format: double
                    type: number
info:
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: ""
    version: v1.0
openapi: 3.0.1
paths:
    "/overview/content":
        get:
            operationId: getOverviewContent
            parameters:
                -   in: query
                    name: languageId
                    schema:
                        type: string
                -   in: query
                    name: rangeKey
                    schema:
                        type: integer
                -   in: query
                    name: spaceId
                    schema:
                        type: integer
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/OverviewContent"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/OverviewContent"
            tags: ["OverviewContent"]