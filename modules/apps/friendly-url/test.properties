modified.files.includes[relevant][friendly-url-java-rule]=\
    **/*.java,\
    **/test/**,\
    **/testIntegration/**

modules.includes.required.test.batch.class.names.includes[modules-integration-postgresql163][relevant][friendly-url-java-rule]=\
    apps/friendly-url/**/*Test.java

modules.includes.required.test.batch.class.names.includes[modules-unit][relevant][friendly-url-java-rule]=\
    apps/friendly-url/**/*Test.java

relevant.rule.names=friendly-url-java-rule

test.batch.names[relevant][friendly-url-java-rule]=\
    modules-integration-postgresql163,\
    modules-unit

test.batch.run.property.query[functional-tomcat-mysql*-jdk*][test-portal-hotfix-release]=\
    (portal.acceptance == true) AND \
    (\
        (testray.main.component.name ~ "Friendly URL") OR \
        (testray.main.component.name ~ "Friendly URL Service")\
    )

testray.main.component.name=Friendly URL Service