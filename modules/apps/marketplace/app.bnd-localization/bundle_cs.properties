liferay-releng-app-description=Liferay Marketplace je nedílnou součástí platformy Liferay pro všechny uživatele. Podnikoví předplatitelé mají také exkluzivní přístup k aplikacím Liferay Subscription Apps prostřednictvím tržiště Liferay Marketplace. Přihlaste se pomocí svého účtu Liferay a procházejte stovky aplikací, které vám pomohou s budováním vašeho podnikání nebo technického řešení.