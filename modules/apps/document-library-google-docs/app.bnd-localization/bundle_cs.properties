liferay-releng-app-description=Plugin Liferay pro Google Drive&trade; umožňuje uživatelům vytvářet zástupce souborů Google Drive&trade v jejich úložištích Dokumenty a média. Tyto dokumenty lze prohlížet a spravovat v Dokumentech a médiích. Po nasazení můžete tuto aplikaci konfigurovat v Ovládacích panelech.