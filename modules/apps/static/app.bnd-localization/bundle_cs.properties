liferay-releng-app-description=Statická aplikace obsahuje důležitou skupinu rozšiřujících modulů a utilit, které Liferay staticky instaluje před instalací jakýchkoli dynamických modulů OSGi. Funkce aplikace zahrnují rozšiřující modul log4j, rozšiřující modul OSGi WAB, konfigurační utility, utility pro nasazení OSGi, indexování cílové platformy a další.<br /><br />Tato sada je k dispozici v balíčku ${liferay.releng.app.title.prefix}.