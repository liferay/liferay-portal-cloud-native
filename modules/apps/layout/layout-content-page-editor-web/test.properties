##
## Modules
##

    modules.includes.required.test.batch.class.names.includes[modules-integration-*-jdk8][relevant]=\
        apps/layout/layout-content-page-editor-web/**/*Test.java

##
## Test Batch
##

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant]}

    #
    # Relevant
    #

    playwright.test.project[playwright-js-tomcat90-mysql57-jdk8][relevant]=layout-content-page-editor-web

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant]=\
        (portal.acceptance == true) AND \
        (\
            (testray.main.component.name ~ "Content Page Templates") OR \
            (testray.main.component.name ~ "Content Pages") OR \
            (testray.main.component.name ~ "Display Page Templates") OR \
            (testray.main.component.name ~ "Fragments") OR \
            (testray.main.component.name ~ "Master Page Templates") OR \
            (testray.main.component.name ~ "Page Administration") OR \
            (testray.main.component.name ~ "Page Editor")\
        )

##
## Testray
##

    testray.main.component.name=Content Pages