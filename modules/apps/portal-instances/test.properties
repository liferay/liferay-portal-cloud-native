modified.files.includes[relevant][portal-instances-java-rule]=\
    **/*.java,\
    **/test/**,\
    **/testIntegration/**

modules.includes.required.test.batch.class.names.includes[modules-integration-postgresql163][relevant][portal-instances-java-rule]=\
    apps/portal-instances/**/*Test.java

modules.includes.required.test.batch.class.names.includes[modules-unit][relevant][portal-instances-java-rule]=\
    apps/portal-instances/**/*Test.java

relevant.rule.names=portal-instances-java-rule

test.batch.names[relevant][portal-instances-java-rule]=\
    modules-integration-postgresql163,\
    modules-unit

test.batch.run.property.query[functional-tomcat-mysql*-jdk*][test-portal-hotfix-release]=\
    (portal.acceptance == true) AND \
    (\
        (testray.component.names ~ "Virtual Instances") OR \
        (testray.main.component.name ~ "Virtual Instances")\
    )

testray.main.component.name=Virtual Instances