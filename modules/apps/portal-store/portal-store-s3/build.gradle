task buildIBMS3StoreUnitTest(type: Copy)

buildIBMS3StoreUnitTest {
	doFirst {
		delete "src/test/java/com/liferay/portal/store/s3/IBMS3StoreUnitTest.java"

	}

	ext {
		autoClean = false
	}

	filter {
		String line ->

		line.replace "S3Store s3Store", "IBMS3Store ibmS3Store"
	}

	filter {
		String line ->

		line.replace "S3Store()", "IBMS3Store()"
	}

	filter {
		String line ->

		line.replace "import java.net.InetSocketAddress;", "import jakarta.annotation.Generated;\n\nimport java.net.InetSocketAddress;"
	}

	filter {
		String line ->

		line.replace "public class S3StoreUnitTest", "@Generated(\"\")\npublic class IBMS3StoreUnitTest"
	}

	filter {
		String line ->

		line.replace "s3Store.", "ibmS3Store."
	}

	from new File("src/test/java/com/liferay/portal/store/s3/S3StoreUnitTest.java")
	into "src/test/java/com/liferay/portal/store/s3"
	rename {
		"IBMS3StoreUnitTest.java"

	}
}

clean {
	delete "src/test/java/com/liferay/portal/store/s3/IBMS3StoreUnitTest.java"
}

compileJava {
	dependsOn buildIBMS3StoreUnitTest
}

