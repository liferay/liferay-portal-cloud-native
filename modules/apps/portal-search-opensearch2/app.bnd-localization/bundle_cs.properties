liferay-releng-app-description=Tento konektor integruje Liferay DXP s OpenSearch 2.12, vyhledávačem s otevřeným zdrojovým kódem pro podniky.<br />OpenSearch nabízí lexikální vyhledávání textových dat, robustní škálovatelnost a rozšiřitelnost a vektorové vyhledávání pro aplikace využívající embeddingy, jako je například Sémantické vyhledávání od Liferay.<br />Instalace této aplikace vyžaduje specifické konfigurace uvedené v oficiální dokumentaci. Podrobné informace o kompatibilitě naleznete v matici kompatibility vyhledávačů: https://help.liferay.com/hc/en-us/articles/360016511651.