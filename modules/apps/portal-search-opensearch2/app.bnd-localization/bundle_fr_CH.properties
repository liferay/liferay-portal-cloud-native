liferay-releng-app-description=This connector integrates Liferay DXP with OpenSearch 2, the open source and enterprise grade search engine.<br />OpenSearch offers lexical search for text data, robust scalability and extensibility, and vector search for applications using embeddings, such as Liferay's Semantic Search.<br />The installation of this app requires specific configurations covered in the official documentation. For detailed compatibility information, see the Search Engine Compatibility Matrix: https://help.liferay.com/hc/en-us/articles/360016511651. (Automatic Copy)