modified.files.includes[relevant][frontend-editor-java-rule]=\
    **/*.java,\
    **/test/**,\
    **/testIntegration/**

modules.includes.required.test.batch.class.names.includes[modules-integration-postgresql163][relevant][frontend-editor-java-rule]=\
    apps/frontend-editor/**/*Test.java

modules.includes.required.test.batch.class.names.includes[modules-unit][relevant][frontend-editor-java-rule]=\
    apps/frontend-editor/**/*Test.java

relevant.rule.names=frontend-editor-java-rule

test.batch.names[relevant][frontend-editor-java-rule]=\
    modules-integration-postgresql163,\
    modules-unit

test.batch.run.property.query[functional-tomcat-mysql*-jdk*][test-portal-hotfix-release]=\
    (portal.acceptance == true) AND \
    (testray.component.names ~ "WYSIWYG")

testray.main.component.name=Frontend Editor