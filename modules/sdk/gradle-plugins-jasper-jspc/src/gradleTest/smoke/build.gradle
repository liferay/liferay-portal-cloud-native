import org.gradle.util.VersionNumber

apply plugin: "com.liferay.jasper.jspc"

task runGradleTest

compileJSP {
	destinationDir = new File(buildDir, "compiled-jsps")
}

dependencies {
	api group: "com.liferay.jakarta.portlet", name: "com.liferay.jakarta.portlet-api", version: "4.0.0"
	api group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "163.0.1"
	api group: "com.liferay.portal", name: "com.liferay.util.taglib", version: "28.0.0"
}

generateJSPJava {
	webAppDir = file("src/main/resources")
}

repositories {
	maven {
		url "https://repository-cdn.liferay.com/nexus/content/groups/public"
	}
}

runGradleTest {
	dependsOn compileJSP

	doLast {
		File dir = new File(compileJSP.destinationDir, "org/apache/jsp")

		for (String fileName in ["init_jsp.class", "view_jsp.class"]) {
			File generatedFile = new File(dir, fileName)

			assert generatedFile.exists()
		}
	}
}