task runGradleTest

runGradleTest {
	dependsOn ":global-js-client-extension:createClientExtensionConfig"

	doLast {
		Project clientExtensionProject = project(":global-js-client-extension")

		File clientExtensionConfigJSONFile = clientExtensionProject.file("${clientExtensionProject.buildDir}/liferay-client-extension-build/global-js-client-extension.client-extension-config.json")

		assert clientExtensionConfigJSONFile.exists()

		assert clientExtensionConfigJSONFile.text.contains('scriptElementAttributesJSON={\\"async\\":false,\\"data-bool-false\\":false,\\"data-bool-true\\":true,\\"data-empty\\":\\"\\",\\"data-str-false\\":\\"false\\",\\"data-str-true\\":\\"true\\",\\"defer\\":true,\\"nomodule\\":false}')
	}
}