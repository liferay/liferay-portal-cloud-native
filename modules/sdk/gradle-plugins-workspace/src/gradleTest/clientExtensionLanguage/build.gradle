import groovy.json.JsonSlurper

task runGradleTest

runGradleTest {
	dependsOn ":language:build"

	doLast {
		Project languageProject = project(":language")

		Map<String, Object> expectedConfigEntries = new HashMap<>()

		expectedConfigEntries.put("projectId", "languagebatch")
		expectedConfigEntries.put("scopes", Arrays.asList(
				"Liferay.Headless.Admin.Workflow.everything",
				"Liferay.Headless.Batch.Engine.everything",
				"Liferay.Message.Admin.REST.everything")
		)
		expectedConfigEntries.put("type", "oAuthApplicationHeadlessServer")
		expectedConfigEntries.put("typeSettings",
			"scopes=Liferay.Headless.Admin.Workflow.everything\nLiferay.Headless.Batch.Engine.everything\nLiferay.Message.Admin.REST.everything")

		_assertConfigEntries(expectedConfigEntries, languageProject)

		Map<String, Map<String, Object>> expectedItems = new HashMap<>()

		Map<String, Object> item = new HashMap<>()

		item.put("languageId", "en_US")
		item.put("value", "Sample Value")

		expectedItems.put("sample-key", item)

		_assertItems(expectedItems, languageProject)
	}
}

private void _assertItems(Map<String, Map<String, Object>> expectedItems, Project languageProject) {
	File clientExtensionBuildDir = new File(languageProject.buildDir, "liferay-client-extension-build")

	File languageBatchEngineFile = new File(clientExtensionBuildDir, "/batch/language-batch-engine-data.json")

	JsonSlurper jsonSlurper = new JsonSlurper()

	Object jsonObject = jsonSlurper.parse(languageBatchEngineFile)

	Object[] items = jsonObject.get("items")

	assert items.length == expectedItems.size()

	for(Object item : items) {
		Map<String, Object> expectedItem = expectedItems.get(item.get("key"))

		assert expectedItem != null

		assert Objects.equals(item.get("languageId"), expectedItem.get("languageId"))
		assert Objects.equals(item.get("value"), expectedItem.get("value"))
	}
}

private void _assertConfigEntries(Map<String, Object> expectedEntries, Project languageProject) {
	File clientExtensionBuildDir = new File(languageProject.buildDir, "liferay-client-extension-build")

	File file = new File(clientExtensionBuildDir, "language.client-extension-config.json")

	assert file.exists()

	JsonSlurper jsonSlurper = new JsonSlurper()

	Object jsonObject = jsonSlurper.parse(file)

	jsonObject = jsonObject.get("com.liferay.oauth2.provider.configuration.OAuth2ProviderApplicationHeadlessServerConfiguration~liferay-language-batch-oauth-application-headless-server")

	for(String expectedKey : expectedEntries.keySet()) {
		Object expectedValue = expectedEntries.get(expectedKey)

		if (Objects.equals(expectedKey, "typeSettings")) {
			String[] typeSettingsArray = (String[])jsonObject.get("typeSettings")

			assert typeSettingsArray.contains(expectedValue)
		} else if (expectedValue instanceof List) {
			List<Object> actualValues = (List<Object>)jsonObject.get(expectedKey)
			List<Object> expectedValues = (List<Object>)expectedValue

			for (int i = 0; i < expectedValues.size(); i++) {
				assert Objects.equals(expectedValues.get(i), actualValues.get(i))
			}
		} else {
			assert Objects.equals(expectedValue, jsonObject.get(expectedKey))
		}
	}
}