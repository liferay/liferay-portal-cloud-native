ext {
	gitHash = "1e88530f74aea4efa139fec7214f395d25a4032b"
	mvnJARInclude = "MockMock-${project.version}.one-jar.jar"
	gitHubOwner = "tweakers-dev"
	gitHubRepository = "MockMock"
	mvnTargetDir = "target"
}

apply from: "../build-maven.gradle"

task compileMVN(type: Exec)

sourceCompatibility = "1.6"
targetCompatibility = "1.6"

compileMVN {
	commandLine getMVNCommand("compile")
	dependsOn downloadSource
	workingDir = mvnSourceDir
}

downloadSource {
	doLast {
		File pomXmlFile = new File(mvnSourceDir, "pom.xml")

		if (pomXmlFile.exists()) {
			pomXmlFile.text = pomXmlFile.text.replace("<groupId>org.dstovall</groupId>", "<groupId>com.jolira</groupId>")
		}
	}
}

jarMVN {
	dependsOn compileMVN
}