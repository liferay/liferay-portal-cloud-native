import com.liferay.gradle.plugins.patcher.PatchTask

apply plugin: "com.liferay.patcher"

task deployJar(type: Copy)
task jarManifest
task jarPatched(type: Zip)
task patch(type: PatchTask)

dependencies {
	api group: "com.liferay", name: "org.hibernate.core", version: "5.6.7.LIFERAY-PATCHED-2.JAKARTA-LIFERAY-PATCHED-1"
	api group: "jakarta.persistence", name: "jakarta.persistence-api", version: "3.1.0"
	api group: "org.springframework", name: "spring-orm", version: "6.2.9"
}

deploy {
	finalizedBy deployJar
}

deployJar {
	ext {
		autoClean = false
	}

	from jar
	into "../../../lib/portal"

	rename {
		"spring-orm.jar"
	}
}

jar {
	dependsOn jarPatched
	setActions([])
}

jarManifest {
	doLast {
		ant.jar(destfile: jar.archivePath, update: true)
	}
}

jarPatched {
	archiveFileName = jar.archiveFileName
	destinationDirectory = jar.destinationDirectory
	duplicatesStrategy = "exclude"
	from copyPatchOriginalLibClasses
	mustRunAfter compileJava
	mustRunAfter generatePomFileForMavenPublication
	mustRunAfter processResources
}

jarSources {
	mustRunAfter patch
}

javadoc {
	enabled = false
}

patch {
	ext {
		autoClean = false
	}

	fileNames "org/springframework/orm/hibernate5/SessionFactoryUtils.java"
	fileNames "org/springframework/orm/hibernate5/SpringSessionSynchronization.java"
	originalLibModuleName = "spring-orm"
}