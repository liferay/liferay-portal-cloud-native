import com.liferay.gradle.plugins.patcher.PatchTask

apply plugin: "com.liferay.patcher"

task deployJar(type: Copy)
task patch(type: PatchTask)

dependencies {
	compileOnly group: "commons-logging", name: "commons-logging", version: "1.2"
	compileOnly group: "org.apache.logging.log4j", name: "log4j-api", version: "2.20.0"
	compileOnly group: "org.apache.logging.log4j", name: "log4j-core", version: "2.20.0"
}

deploy {
	finalizedBy deployJar
}

deployJar {
	ext {
		autoClean = false
	}

	from jar
	into "../../../lib/portal"

	rename {
		"commons-logging.jar"
	}
}

jarSources {
	mustRunAfter patch
}

patch {
	ext {
		autoClean = false
	}

	fileNames "org/apache/commons/logging/LogSource.java"
	fileNames "org/apache/commons/logging/impl/Log4JLogger.java"
	originalLibModuleName = "commons-logging"
}