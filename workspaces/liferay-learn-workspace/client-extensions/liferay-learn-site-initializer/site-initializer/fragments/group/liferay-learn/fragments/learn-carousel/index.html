[#assign numberOfSlides = configuration.numberOfSlides?number]

<div aria-label="Featured Content Carousel" class="carousel-main-container" role="region" tabindex="0">
	<div aria-atomic="true" aria-live="polite" class="carousel-live-region"></div>
	<div class="swiper">
		<div class="swiper-wrapper">
			[#list 1..numberOfSlides as slideIndex]
				<div class="swiper-slide">
				<lfr-drop-zone data-lfr-drop-zone-id="${slideIndex}" data-lfr-priority="${slideIndex}">
					</lfr-drop-zone>
				</div>
			[/#list]
		</div>
	</div>

	[#if numberOfSlides != 1]

			<div class="carousel-nav-button carousel-nav-button-prev">
