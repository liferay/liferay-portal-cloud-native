#
# Application
#

liferay.learn.dxp.site.group.id=
liferay.learn.google.credentials=
liferay.learn.webassessor.security.token=

#
# LXC
#

com.liferay.lxc.dxp.domains=localhost:8080
com.liferay.lxc.dxp.mainDomain=localhost:8080
com.liferay.lxc.dxp.server.protocol=http

#
# OAuth
#

liferay-learn-etc-spring-boot-oahs.oauth2.headless.server.client.secret=myfancypassword

liferay.oauth.application.external.reference.codes=\
    liferay-learn-etc-spring-boot-oahs,\
    liferay-learn-etc-spring-boot-oaua

liferay.oauth.urls.excludes=\
    /learn/*\/questions,\
    /learn/*\/result,\
    /learn/lesson/*\/audio/base64,\
    /rag/search,\
    /ready

#
# Spring Boot
#

server.port=58081

spring.ai.model.embedding.text=vertexai

spring.ai.vectorstore.qdrant.collection-name=learn
spring.ai.vectorstore.qdrant.host=qdrant
spring.ai.vectorstore.qdrant.initialize-schema=true
spring.ai.vectorstore.qdrant.use-tls=false

spring.ai.vertex.ai.embedding.location=us-central1
spring.ai.vertex.ai.embedding.project-id=text-to-speech-2025-04-24
spring.ai.vertex.ai.embedding.text.options.model=gemini-embedding-001
spring.ai.vertex.ai.embedding.text.options.task-type=RETRIEVAL_DOCUMENT

spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.0-flash
spring.ai.vertex.ai.gemini.credentials-uri=file:/opt/liferay/credentials.json
spring.ai.vertex.ai.gemini.location=us-central1
spring.ai.vertex.ai.gemini.project-id=text-to-speech-2025-04-24