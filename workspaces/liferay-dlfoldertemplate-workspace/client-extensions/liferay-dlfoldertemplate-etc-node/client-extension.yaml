assemble:
    - include:
          - "**/*.js"
          - package.json
liferay-dlfoldertemplate-oauth-application-server:
    .serviceAddress: localhost:8050
    .serviceScheme: http
    name: Liferay DL Folder Template Etc Node OAuth Application Server
    scopes:
        - Liferay.Object.Admin.REST.everything
        - Liferay.Headless.Admin.User.everything.read
        - Liferay.Headless.Delivery.everything
        - Liferay.Headless.Batch.Engine.everything
        - Liferay.Object.Admin.REST.everything.write
        - Liferay.Object.Admin.REST.everything.read
        - C_T4T14FolderTemplate.everything
        - C_T4T14FolderTemplateNode.everything
    type: oAuthApplicationHeadlessServer
liferay-dlfoldertemplate-oauth-application-user-agent:
    .serviceAddress: localhost:8050
    .serviceScheme: http
    name: Liferay DL Folder Template Etc Node OAuth Application  User Agent
    scopes:
        - Liferay.Headless.Delivery.everything.read
        - Liferay.Object.Admin.REST.everything
    type: oAuthApplicationUserAgent
liferay-dlfoldertemplate-sample-hr-object-action:
    name: Create HR Employee Folder
    oAuth2ApplicationExternalReferenceCode: liferay-dlfoldertemplate-oauth-application-user-agent
    resourcePath: /jobs/hr/employee/folder
    type: objectAction

