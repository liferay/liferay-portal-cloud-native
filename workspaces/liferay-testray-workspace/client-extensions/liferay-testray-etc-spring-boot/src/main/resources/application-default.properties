#
# Application
#

liferay.testray.jira.cloud.id=
liferay.testray.jira.oauth.client.id=
liferay.testray.jira.oauth.client.secret=
liferay.testray.jira.sync.cron=0 0 0 * * *

#
# LXC
#

com.liferay.lxc.dxp.domains=localhost:8080
com.liferay.lxc.dxp.mainDomain=localhost:8080
com.liferay.lxc.dxp.server.protocol=http

#
# OAuth
#

liferay-testray-etc-spring-boot-oahs.oauth2.headless.server.client.secret=myfancypassword

liferay.oauth.application.external.reference.codes=\
    liferay-testray-etc-spring-boot-oahs,\
    liferay-testray-etc-spring-boot-oaua

liferay.oauth.urls.excludes=/jira/oauth/callback,/jira/oauth/login,/ready

#
# Spring Boot
#

server.port=58081