assemble:
    - include: ".env"
    - include: "Dockerfile"
    - include: "LCP.json"
    - include: "package.json"
    - include: "src/**/*"
liferay-testray-etc-jira-node-oauth-application-user-agent:
    .serviceAddress: 127.0.0.1:3001
    .serviceScheme: http
    name: Testray Jira OAuth Integration User Agent
    scopes:
        - C_Issue.everything.read
        - C_Requirement.everything
        - C_TestrayJiraOAuths.everything
        - Liferay.Headless.Admin.User.everything
    type: oAuthApplicationUserAgent
testray-jira-import-requirement-tickets:
    name: Testray Jira Import Requirement Tickets
    oAuth2ApplicationExternalReferenceCode: liferay-testray-etc-jira-node-oauth-application-user-agent
    resourcePath: /jira/import-requirement-tickets
    type: objectAction
testray-jira-preauthorize:
    name: Testray Jira PreAuthorize
    oAuth2ApplicationExternalReferenceCode: liferay-testray-etc-jira-node-oauth-application-user-agent
    resourcePath: /jira/preauthorize
    type: objectAction
testray-jira-update-ticket:
    name: Testray Jira Update Tickets
    oAuth2ApplicationExternalReferenceCode: liferay-testray-etc-jira-node-oauth-application-user-agent
    resourcePath: /jira/update-tickets
    type: objectAction
testray-resync-jira-ticket:
    name: Testray Resync Jira Ticket
    oAuth2ApplicationExternalReferenceCode: liferay-testray-etc-jira-node-oauth-application-user-agent
    resourcePath: /jira/resync
    type: objectAction