components:
    schemas:
        TestrayBuildAutofill:
            properties:
                caseAmount:
                    format: int32
                    type: integer
        TestrayRunComparison:
            properties:
                results:
                    items:
                        type: object
                    type: array
                testrayCasePriorities:
                    type: string
                testrayTeamId:
                    format: int64
                    type: integer
            type: object
        TestrayTestSuite:
            properties:
                caseAmount:
                    format: int32
                    type: integer
                runtime:
                    format: int64
                    type: integer
                tarFileName:
                    type: string
                xmlFileName:
                    type: string
info:
    license:
        name: "Apache 2.0"
        url: "http://www.apache.org/licenses/LICENSE-2.0.html"
    title: "Testray REST"
    version: v1.0
openapi: 3.0.1
paths:
    "/testray-build-autofill/{testrayBuildId1}/{testrayBuildId2}":
        post:
            operationId: postTestrayBuildAutofill
            parameters:
                - in: path
                  name: testrayBuildId1
                  required: true
                  schema:
                      format: int64
                      type: integer
                - in: path
                  name: testrayBuildId2
                  required: true
                  schema:
                      format: int64
                      type: integer
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/TestrayBuildAutofill"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/TestrayBuildAutofill"
            tags: ["TestrayBuildAutofill"]
    "/testray-run-comparisons/{testrayRunId1}/{testrayRunId2}":
        get:
            operationId: getTestrayRunComparison
            parameters:
                - in: path
                  name: testrayRunId1
                  required: true
                  schema:
                      format: int64
                      type: integer
                - in: path
                  name: testrayRunId2
                  required: true
                  schema:
                      format: int64
                      type: integer
                - in: query
                  name: testrayCasePriorities
                  schema:
                      type: string
                - in: query
                  name: testrayTeamId
                  schema:
                      format: int64
                      type: integer
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/TestrayRunComparison"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/TestrayRunComparison"
            tags: ["TestrayRunComparison"]
    "/testray-test-suite":
        post:
            operationId: postTestrayTestSuite
            requestBody:
                content:
                    multipart/form-data:
                        schema:
                            properties:
                                file:
                                    format: binary
                                    type: string
                            type: object
            responses:
                204:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/TestrayTestSuite"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/TestrayTestSuite"
                400:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/TestrayTestSuite"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/TestrayTestSuite"
                    description:
                        Invalid answer provided
            tags: ["TestrayTestSuite"]