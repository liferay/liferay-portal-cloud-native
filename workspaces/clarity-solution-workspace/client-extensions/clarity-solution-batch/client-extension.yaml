assemble:
    -   from: batch
        into: batch
clarity-solution-batch:
    name: Clarity Solution Batch
    oAuthApplicationHeadlessServer: clarity-solution-batch-oahs
    type: batch
clarity-solution-batch-oahs:
    .serviceAddress: localhost:8080
    .serviceScheme: http
    name: Clarity Solution OAuth Application Headless Server
    scopes:
        -   Liferay.Headless.Admin.Workflow.everything
        -   Liferay.Headless.Batch.Engine.everything
        -   Liferay.Object.Admin.REST.everything
    type: oAuthApplicationHeadlessServer