assemble:
    - from: build/vite
      into: static
clarity-solution-js-import-maps-entry:
    bareSpecifier: clarity-solution-js-import-maps-entry
    name: Clarity Solution JS Import Maps Entry
    type: jsImportMapsEntry
    url: /index.js
    oAuthApplicationHeadlessServer: clarity-solution-js-import-maps-entry-oahs
clarity-solution-js-import-maps-entry-oahs:
    .serviceAddress: localhost:8080
    .serviceScheme: http
    name: Clarity Solution JS Import Maps Entry OAuth Application Headless Server
    scopes:
        - C_DistributorLocation.everything
    type: oAuthApplicationHeadlessServer
