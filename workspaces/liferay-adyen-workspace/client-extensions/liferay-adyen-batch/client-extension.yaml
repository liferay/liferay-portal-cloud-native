assemble:
    -   from: batch
        into: batch
liferay-adyen-batch:
    name: Liferay Adyen Batch
    oAuthApplicationHeadlessServer: liferay-adyen-batch-oahs
    type: batch
liferay-adyen-batch-oahs:
    .serviceAddress: localhost:8080
    .serviceScheme: http
    name: Liferay Adyen Batch OAuth Application Headless Server
    scopes:
        -   Liferay.Headless.Batch.Engine.everything
        -   Liferay.Object.Admin.REST.everything
    type: oAuthApplicationHeadlessServer