assemble:
    - fromTask: bootJar
liferay-stripe-commerce-tax-engine:
    key: liferay-stripe-commerce-tax-engine
    name: Liferay Stripe Commerce Tax Engine
    oAuth2ApplicationExternalReferenceCode: liferay-stripe-commerce-tax-engine-oauth-application-user-agent
    taxEngineTypeSettings:
        apiKey:
    type: commerceTaxEngine
liferay-stripe-commerce-tax-engine-oauth-application-user-agent:
    .serviceAddress: localhost:58081
    .serviceScheme: http
    name: Liferay Stripe Commerce Tax Engine OAuth Application User Agent
    scopes:
        - Liferay.Headless.Admin.Workflow.everything
    type: oAuthApplicationUserAgent