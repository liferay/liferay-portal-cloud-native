assemble:
    -   from: build/static
        into: static
liferay-ai-hub-custom-element:
    cssURLs:
        -   js/main.css
    friendlyURLMapping: liferay-ai-hub-custom-element
    htmlAttributes:
        ai-hub-url: https://ai.hub.liferay.com
        chatbot-external-reference-code: MY_CHATBOT
        id: aihub-chat-widget-script
