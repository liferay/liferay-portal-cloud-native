assemble:
    - from: build/vite
      into: static
liferay-content-wizard-custom-element:
    cssURLs:
        - "**/index*.css"
    friendlyURLMapping: liferay-content-wizard-custom-element
    htmlElementName: liferay-content-wizard-custom-element
    instanceable: false
    name: Liferay Content Wizard
    portletCategoryName: category.client-extensions
    properties:
        route: app
    type: customElement
    urls:
        - "main.js"
    useESM: true
liferay-content-wizard-settings-custom-element:
    cssURLs:
        - "**/index*.css"
    friendlyURLMapping: liferay-content-wizard-custom-element
    htmlElementName: liferay-content-wizard-custom-element
    instanceable: false
    name: Liferay Content Wizard Settings
    panelAppOrder: 700
    panelCategoryKey: applications_menu.applications.custom.apps
    portletCategoryName: category.client-extensions
    properties:
        route: settings
    type: customElement
    urls:
        - "main.js"
    useESM: true