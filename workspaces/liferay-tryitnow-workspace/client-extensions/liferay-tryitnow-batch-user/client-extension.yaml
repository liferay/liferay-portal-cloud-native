assemble:
    - from: batch
      into: batch
liferay-tryitnow-batch-user:
    name: Liferay Try It Now Batch User
    oAuthApplicationHeadlessServer: liferay-tryitnow-batch-user-oauth-application-headless-server
    type: batch
liferay-tryitnow-batch-user-oauth-application-headless-server:
    .serviceAddress: localhost:8080
    .serviceScheme: http
    name: Liferay Try It Now Batch User OAuth Application Headless Server
    scopes:
        - Liferay.Headless.Batch.Engine.everything
        - Liferay.Object.Admin.REST.everything
    type: oAuthApplicationHeadlessServer