[#if themeDisplay.isSignedIn()]
	<div class="account-selection-dropdown d-none">
		<div class="account-dropdown">
			<button class="align-items-center btn btn-unstyled d-flex dropdown dropdown-trigger" id="account-search">
				<div>
					<div class="align-items-center d-flex justify-content-center" id="profillerContainer">
						<img class="avatar mr-2" id="profile-account-image" src="/image/organization_logo" />

						<span class="account-name font-weight-semi-bold mb-0 text-nowrap" id="profile-account-name"></span>
					</div>
				</div>

				<div class="dropdown-arrow">[@clay["icon"] symbol="caret-bottom" /]</div>
			</button>

			<div class="dropdown-menu-container">
				<div class="dropdown-menu-inner">
					<div class="m-3">
						<h2>${languageUtil.get(locale, "accounts", "Accounts")}</h2>
					</div>

					<hr />

					<div class="m-3">
						<input class="form-control search-input" placeholder="Search" type="text" />
					</div>

					<hr id="divider" />

					<ul class="account-list list-unstyled mb-0 mt-3" id="dropdownList"></ul>
				</div>

				<div class="d-none p-4 text-center" id="empty-account-container">
					<div class="account-icon d-flex justify-content-center mb-3">
						<div class="align-items-center bg-light d-flex icon-wrapper justify-content-center rounded-circle text-primary">
							[@clay["icon"] symbol="user" /]
						</div>
					</div>

					<h5>No Marketplace account available</h5>

					<span class="empty-account-message">
						Click the button below to create your first Marketplace
						account or to join an already existing one
					</span>
				</div>

				<lfr-drop-zone></lfr-drop-zone>
			</div>
		</div>
	</div>
[/#if]
