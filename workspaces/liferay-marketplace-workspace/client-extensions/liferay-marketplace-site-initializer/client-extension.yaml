liferay-marketplace-site-initializer:
    name: Liferay Marketplace Site Initializer
    oAuthApplicationHeadlessServer: liferay-marketplace-site-initializer-oahs
    siteExternalReferenceCode: LIFERAY_MARKETPLACE
    siteName: Marketplace
    type: siteInitializer
liferay-marketplace-site-initializer-oahs:
    .serviceAddress: localhost:8080
    .serviceScheme: http
    name: Liferay Marketplace Site Initializer OAuth Application Headless Server
    scopes:
        -   Liferay.Headless.Site.everything
    type: oAuthApplicationHeadlessServer