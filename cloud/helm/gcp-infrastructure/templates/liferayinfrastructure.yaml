{{- if .Values.enabled -}}
apiVersion: gcp.liferay.com/v1alpha1
kind: LiferayInfrastructure
metadata:
    annotations:
        argocd.argoproj.io/sync-options: ServerSideApply=true
        argocd.argoproj.io/sync-wave: "-20"
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
spec:
    backup: {{ .Values.backup | toYaml | nindent 8 }}
    cmk: {{ .Values.cmk | toYaml | nindent 8 }}
    commonTags:
        environment_id: {{ .Values.environmentId }}
        project_id: {{ .Values.projectId }}
    database:
        {{- $database := .Values.database -}}
        {{- $_ := set $database "rootPasswordSecretName" (printf "%s-db-root-password" .Release.Name) -}}
        {{- $database | toYaml | nindent 8 }}
    environmentId: {{ .Values.environmentId }}
    forceDestroy: {{ .Values.forceDestroy }}
    orphanOnDelete: {{ .Values.orphanOnDelete }}
    overlay: {{ .Values.overlay | toYaml | nindent 8 }}
    projectId: {{ .Values.projectId }}
    region: {{ .Values.region }}
    storage: {{ .Values.storage | toYaml | nindent 8 }}
{{- end -}}