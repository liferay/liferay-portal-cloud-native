{{- if and .Values.enabled .Values.gateway.className .Values.gateway.name }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
    annotations:
        argocd.argoproj.io/sync-wave: "-30"
    labels:
        app: liferay
        component: gateway
        environmentId: {{ .Values.environmentId }}
        projectId: {{ .Values.projectId }}
    name: {{ .Values.gateway.name }}-attachment
    namespace: {{ .Release.Namespace }}
spec:
    enableProxyProtocol: true
    targetRefs:
        -   group: gateway.networking.k8s.io
            kind: Gateway
            name: {{ .Values.gateway.name }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
    annotations:
        argocd.argoproj.io/sync-wave: "-30"
    labels:
        app: liferay
        component: gateway
        environmentId: {{ .Values.environmentId }}
        projectId: {{ .Values.projectId }}
    name: {{ .Values.gateway.name }}
    namespace: {{ .Release.Namespace }}
spec:
    gatewayClassName: {{ .Values.gateway.className }}
    listeners:
        {{- if not (hasKey .Values.endpoints "http") }}
        -   allowedRoutes:
                namespaces:
                    from: Same
            name: http
            port: 80
            protocol: HTTP
        {{- end }}
        {{- range  $name, $config := .Values.endpoints }}
        -   allowedRoutes:
                namespaces:
                    from: Same
            {{- if $config.hostname }}
            hostname: {{ $config.hostname | quote }}
            {{- end }}
            name: {{ $name }}
            port: {{ $config.port }}
            protocol: {{ $config.protocol }}
            {{- with $config.tls }}
            tls:
                {{- if or .externalSecretNames .certificateRefs }}
                certificateRefs:
                    {{- if .externalSecretNames }}
                    {{- range .externalSecretNames }}
                    -   kind: Secret
                        name: {{ include "liferay.k8sFriendlyString" . }}
                    {{- end }}
                    {{- end }}
                    {{- with .certificateRefs }}
                    {{- toYaml . | nindent 20 }}
                    {{- end }}
                {{- end }}
                mode: {{ .mode | default "Terminate" }}
            {{- end }}
        {{- end }}
{{- end -}}