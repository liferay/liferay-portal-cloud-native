apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
    labels:
        component: backup-restore-platform
    name: backup-restore-cluster-workflow-template
spec:
    arguments:
        parameters:
            -   name: recovery-point-arn
    artifactGC:
        {{- .Values.argo.workflowSpec.artifactGC | toYaml | nindent 8 }}
    artifactRepositoryRef:
        configMap: backup-restore-artifact-repository
    entrypoint: main
    podGC:
        {{- .Values.argo.workflowSpec.podGC | toYaml | nindent 8 }}
    serviceAccountName: backup-restore-service-account
    templates:
        -   inputs:
                parameters:
                    -   name: liferay-infrastructure-name
                    -   name: restore-phase
                    -   default: "null"
                        name: snapshot-identifier
                    -   name: target-active-data-plane
            name: apply-infrastructure
            outputs:
                parameters:
                    -   name: generation
                        valueFrom:
                            jsonPath: "{.metadata.generation}"
            resource:
                action: patch
                manifest: |-
                    apiVersion: aws.liferay.com/v1alpha1
                    kind: LiferayInfrastructure
                    metadata:
                        name: {{ "{{" }}inputs.parameters.liferay-infrastructure-name}}
                        namespace: {{ "{{" }}workflow.namespace}}
                    spec:
                        database:
                            snapshotIdentifier: {{ "{{" }}inputs.parameters.snapshot-identifier}}
                        restorePhase: {{ "{{" }}inputs.parameters.restore-phase}}
                        targetActiveDataPlane: {{ "{{" }}inputs.parameters.target-active-data-plane}}
                mergeStrategy: merge
        -   inputs:
                parameters:
                    -   name: liferay-infrastructure-name
                    -   name: restore-phase
                    -   default: "null"
                        name: snapshot-identifier
                    -   name: target-active-data-plane
            name: apply-wait-infrastructure
            steps:
                -   -   arguments:
                            parameters:
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}inputs.parameters.liferay-infrastructure-name}}"
                                -   name: restore-phase
                                    value: "{{ "{{" }}inputs.parameters.restore-phase}}"
                                -   name: snapshot-identifier
                                    value: "{{ "{{" }}inputs.parameters.snapshot-identifier}}"
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}inputs.parameters.target-active-data-plane}}"
                        name: apply-infrastructure
                        template: apply-infrastructure
                -   -   arguments:
                            parameters:
                                -   name: expected-generation
                                    value: "{{ "{{" }}steps.apply-infrastructure.outputs.parameters.generation}}"
                        name: wait-infrastructure-ready
                        template: wait-infrastructure-ready
        -   inputs:
                parameters:
                    -   name: liferay-infrastructure-name
                    -   name: s3-bucket-id
                    -   name: target-active-data-plane
            name: clean-up-infrastructure
            steps:
                -   -   arguments:
                            parameters:
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}inputs.parameters.liferay-infrastructure-name}}"
                                -   name: restore-phase
                                    value: none
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}inputs.parameters.target-active-data-plane}}"
                        name: clean-up-rds-instance
                        template: apply-wait-infrastructure
                    -   arguments:
                            parameters:
                                -   name: s3-bucket-id
                                    value: "{{ "{{" }}inputs.parameters.s3-bucket-id}}"
                        name: clean-up-s3-bucket
                        template: clean-up-s3-bucket
        -   container:
                args:
                    -   "s3"
                    -   "rm"
                    -   "s3://{{ "{{" }}inputs.parameters.s3-bucket-id}}/"
                    -   "--only-show-errors"
                    -   "--recursive"
                command: ["aws"]
                image: "{{ .Values.images.awsCli.repository }}:{{ .Values.images.awsCli.tag }}"
                resources:
                    {{- .Values.resources.default | toYaml | nindent 20 }}
            inputs:
                parameters:
                    -   name: s3-bucket-id
            name: clean-up-s3-bucket
        -   name: get-current-infrastructure-state
            outputs:
                parameters:
                    -   name: backup-service-role-arn
                        valueFrom:
                            path: /tmp/backup-service-role-arn.txt
                    -   name: backup-vault-name
                        valueFrom:
                            path: /tmp/backup-vault-name.txt
                    -   name: data-active
                        valueFrom:
                            path: /tmp/data-active.txt
                    -   name: data-inactive
                        valueFrom:
                            path: /tmp/data-inactive.txt
                    -   name: liferay-infrastructure-name
                        valueFrom:
                            path: /tmp/liferay-infrastructure-name.txt
                    -   name: liferay-workload-name
                        valueFrom:
                            path: /tmp/liferay-workload-name.txt
                    -   name: s3-bucket-id-active
                        valueFrom:
                            path: /tmp/s3-bucket-id-active.txt
                    -   name: s3-bucket-id-inactive
                        valueFrom:
                            path: /tmp/s3-bucket-id-inactive.txt
            script:
                command: [sh]
                image: "{{ .Values.images.helmKubectl.repository }}:{{ .Values.images.helmKubectl.tag }}"
                resources:
                    {{- .Values.resources.default | toYaml | nindent 20 }}
                source: |-
                    {{- tpl (.Files.Get "scripts/get-current-infrastructure-state.sh") . | nindent 20 }}
        -   inputs:
                parameters:
                    -   name: backup-vault-name
            name: get-peer-recovery-points
            outputs:
                parameters:
                    -   name: rds-snapshot-id
                        valueFrom:
                            path: /tmp/rds-snapshot-id.txt
                    -   name: s3-recovery-point-arn
                        valueFrom:
                            path: /tmp/s3-recovery-point-arn.txt
            script:
                command: [sh]
                image: "{{ .Values.images.awsCli.repository }}:{{ .Values.images.awsCli.tag }}"
                resources:
                    {{- .Values.resources.default | toYaml | nindent 20 }}
                source: |-
                    {{- tpl (.Files.Get "scripts/get-peer-recovery-points.sh") . | nindent 20 }}
        -   container:
                args:
                    -   rollout
                    -   restart
                    -   statefulset
                    -   "{{ "{{" }}inputs.parameters.liferay-workload-name}}"
                command: [kubectl]
                image: "{{ .Values.images.helmKubectl.repository }}:{{ .Values.images.helmKubectl.tag }}"
                resources:
                    {{- .Values.resources.default | toYaml | nindent 20 }}
            inputs:
                parameters:
                    -   name: liferay-workload-name
            name: kubectl-rollout-restart
        -   container:
                args:
                    -   rollout
                    -   status
                    -   statefulset
                    -   "{{ "{{" }}inputs.parameters.liferay-workload-name}}"
                    -   --timeout={{ .Values.liferayWorkload.rolloutTimeout }}
                command: [kubectl]
                image: "{{ .Values.images.helmKubectl.repository }}:{{ .Values.images.helmKubectl.tag }}"
                resources:
                    {{- .Values.resources.default | toYaml | nindent 20 }}
            inputs:
                parameters:
                    -   name: liferay-workload-name
            name: kubectl-rollout-status
        -   dag:
                tasks:
                    -   arguments:
                            parameters:
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.liferay-infrastructure-name}}"
                                -   name: s3-bucket-id
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.s3-bucket-id-active}}"
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.data-inactive}}"
                        depends: restart-liferay
                        name: clean-up-infrastructure
                        template: clean-up-infrastructure
                    -   name: get-current-infrastructure-state
                        template: get-current-infrastructure-state
                    -   arguments:
                            parameters:
                                -   name: backup-vault-name
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.backup-vault-name}}"
                        depends: get-current-infrastructure-state
                        name: get-peer-recovery-points
                        template: get-peer-recovery-points
                    -   arguments:
                            parameters:
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.liferay-infrastructure-name}}"
                                -   name: restore-phase
                                    value: promoting
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.data-inactive}}"
                        depends: restore-rds-instance && restore-s3-bucket
                        name: promote-inactive-data-plane
                        template: apply-wait-infrastructure
                    -   arguments:
                            parameters:
                                -   name: liferay-workload-name
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.liferay-workload-name}}"
                        depends: promote-inactive-data-plane
                        name: restart-liferay
                        template: restart-liferay
                    -   arguments:
                            parameters:
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.liferay-infrastructure-name}}"
                                -   name: restore-phase
                                    value: provisioning
                                -   name: snapshot-identifier
                                    value: "{{ "{{" }}tasks.get-peer-recovery-points.outputs.parameters.rds-snapshot-id}}"
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.data-inactive}}"
                        depends: get-current-infrastructure-state && get-peer-recovery-points
                        name: restore-rds-instance
                        template: apply-wait-infrastructure
                    -   arguments:
                            parameters:
                                -   name: backup-service-role-arn
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.backup-service-role-arn}}"
                                -   name: s3-recovery-point-arn
                                    value: "{{ "{{" }}tasks.get-peer-recovery-points.outputs.parameters.s3-recovery-point-arn}}"
                                -   name: s3-bucket-id
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.s3-bucket-id-inactive}}"
                        depends: get-current-infrastructure-state && get-peer-recovery-points
                        name: restore-s3-bucket
                        template: restore-s3-bucket
                    -   arguments:
                            parameters:
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.liferay-infrastructure-name}}"
                                -   name: s3-bucket-id
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.s3-bucket-id-inactive}}"
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.data-active}}"
                        depends: "(!restore-rds-instance.Omitted && !restore-rds-instance.Skipped || !restore-s3-bucket.Omitted && !restore-s3-bucket.Skipped) && !promote-inactive-data-plane.Succeeded"
                        name: roll-back-infrastructure
                        template: clean-up-infrastructure
                    -   arguments:
                            parameters:
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.liferay-infrastructure-name}}"
                                -   name: liferay-workload-name
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.liferay-workload-name}}"
                                -   name: s3-bucket-id
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.s3-bucket-id-inactive}}"
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}tasks.get-current-infrastructure-state.outputs.parameters.data-active}}"
                        depends: "promote-inactive-data-plane.Succeeded && !restart-liferay.Succeeded"
                        name: roll-back-restart
                        template: roll-back-restart
            name: main
        -   inputs:
                parameters:
                    -   name: backup-service-role-arn
                    -   name: s3-bucket-id
                    -   name: s3-recovery-point-arn
            name: restore-s3-bucket
            script:
                command: [sh]
                image: "{{ .Values.images.awsCli.repository }}:{{ .Values.images.awsCli.tag }}"
                resources:
                    {{- .Values.resources.default | toYaml | nindent 20 }}
                source: |-
                    {{- tpl (.Files.Get "scripts/restore-s3-bucket.sh") . | nindent 20 }}
        -   inputs:
                parameters:
                    -   name: liferay-workload-name
            name: restart-liferay
            steps:
                -   -   arguments:
                            parameters:
                                -   name: liferay-workload-name
                                    value: "{{ "{{" }}inputs.parameters.liferay-workload-name}}"
                        name: kubectl-rollout-restart
                        template: kubectl-rollout-restart
                -   -   arguments:
                            parameters:
                                -   name: liferay-workload-name
                                    value: "{{ "{{" }}inputs.parameters.liferay-workload-name}}"
                        name: kubectl-rollout-status
                        template: kubectl-rollout-status
        -   inputs:
                parameters:
                    -   name: liferay-infrastructure-name
                    -   name: liferay-workload-name
                    -   name: s3-bucket-id
                    -   name: target-active-data-plane
            name: roll-back-restart
            steps:
                -   -   arguments:
                            parameters:
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}inputs.parameters.liferay-infrastructure-name}}"
                                -   name: restore-phase
                                    value: promoting
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}inputs.parameters.target-active-data-plane}}"
                        name: apply-wait-infrastructure
                        template: apply-wait-infrastructure
                -   -   arguments:
                            parameters:
                                -   name: liferay-workload-name
                                    value: "{{ "{{" }}inputs.parameters.liferay-workload-name}}"
                        name: restart-liferay
                        template: restart-liferay
                -   -   arguments:
                            parameters:
                                -   name: liferay-infrastructure-name
                                    value: "{{ "{{" }}inputs.parameters.liferay-infrastructure-name}}"
                                -   name: s3-bucket-id
                                    value: "{{ "{{" }}inputs.parameters.s3-bucket-id}}"
                                -   name: target-active-data-plane
                                    value: "{{ "{{" }}inputs.parameters.target-active-data-plane}}"
                        name: clean-up-infrastructure
                        template: clean-up-infrastructure
        -   inputs:
                parameters:
                    -   name: expected-generation
            name: wait-infrastructure-ready
            script:
                command: [sh]
                image: "{{ .Values.images.helmKubectl.repository }}:{{ .Values.images.helmKubectl.tag }}"
                resources:
                    {{- .Values.resources.default | toYaml | nindent 20 }}
                source: |-
                    {{- tpl (.Files.Get "scripts/wait-infrastructure-ready.sh") . | nindent 20 }}
    ttlStrategy:
        {{- .Values.argo.workflowSpec.ttlStrategy | toYaml | nindent 8 }}