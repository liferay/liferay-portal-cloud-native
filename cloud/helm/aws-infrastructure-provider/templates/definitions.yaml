apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
    annotations:
        argocd.argoproj.io/sync-options: ServerSideApply=true
        argocd.argoproj.io/sync-wave: "-60"
    name: liferayinfrastructures.aws.liferay.com
spec:
    group: aws.liferay.com
    names:
        kind: LiferayInfrastructure
        plural: liferayinfrastructures
        shortNames:
            -   lfrinfra
            -   lri
        singular: liferayinfrastructure
    versions:
        -   name: v1alpha1
            referenceable: true
            schema:
                openAPIV3Schema:
                    properties:
                        spec:
                            properties:
                                backup:
                                    properties:
                                        enabled:
                                            default: false
                                            type: boolean
                                        region:
                                            type: string
                                        rules:
                                            items:
                                                properties:
                                                    retentionDays:
                                                        type: integer
                                                    ruleName:
                                                        type: string
                                                    schedule:
                                                        type: string
                                                    startWindow:
                                                        type: integer
                                                required:
                                                    -   retentionDays
                                                    -   ruleName
                                                    -   schedule
                                                    -   startWindow
                                                type: object
                                            minItems: 1
                                            type: array
                                    required:
                                        -   rules
                                    type: object
                                commonTags:
                                    additionalProperties:
                                        type: string
                                    default: {}
                                    type: object
                                database:
                                    properties:
                                        autoMinorVersionUpgrade:
                                            type: boolean
                                        databaseInsightsMode:
                                            type: string
                                        deletionProtection:
                                            type: boolean
                                        engine:
                                            type: string
                                        engineVersion:
                                            type: string
                                        instanceClass:
                                            type: string
                                        multiAz:
                                            type: boolean
                                        region:
                                            type: string
                                        snapshotIdentifier:
                                            nullable: true
                                            type: string
                                        storageGB:
                                            type: integer
                                        username:
                                            type: string
                                    type: object
                                deletionProtection:
                                    default: false
                                    type: boolean
                                environmentId:
                                    type: string
                                overlay:
                                    properties:
                                        region:
                                            type: string
                                    type: object
                                projectId:
                                    type: string
                                region:
                                    type: string
                                restorePhase:
                                    enum:
                                        -   none
                                        -   promoting
                                        -   provisioning
                                    type: string
                                search:
                                    properties:
                                        opensearch:
                                            properties:
                                                autoSoftwareUpdates:
                                                    default: true
                                                    type: boolean
                                                engineVersion:
                                                    default: OpenSearch_2.15
                                                    type: string
                                                instanceCount:
                                                    default: 2
                                                    type: integer
                                                instanceType:
                                                    default: t3.small.search
                                                    type: string
                                                region:
                                                    type: string
                                                username:
                                                    default: liferay_search_admin
                                                    type: string
                                                volumeSizeGB:
                                                    default: 20
                                                    type: integer
                                            type: object
                                    type: object
                                storage:
                                    properties:
                                        region:
                                            type: string
                                    type: object
                                targetActiveDataPlane:
                                    enum:
                                        -   blue
                                        -   green
                                    type: string
                            required:
                                -   database
                                -   deletionProtection
                                -   environmentId
                                -   projectId
                                -   region
                                -   search
                                -   storage
                            type: object
                        status:
                            properties:
                                managedServiceDetailsReady:
                                    default: false
                                    type: boolean
                            type: object
                    type: object
            served: true