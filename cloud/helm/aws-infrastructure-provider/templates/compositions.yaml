apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
    annotations:
        argocd.argoproj.io/sync-wave: "-50"
    name: liferay-aws-infrastructure-provider.aws.liferay.com
spec:
    compositeTypeRef:
        apiVersion: aws.liferay.com/v1alpha1
        kind: LiferayInfrastructure
    mode: Pipeline
    pipeline:
        -   functionRef:
                name: function-go-templating
            input:
                apiVersion: template.fn.crossplane.io/v1beta1
                inline:
                    template: |
                        {{`
                        {{- $accountId := `}}{{ .Values.aws.accountId | quote }}{{` -}}
                        {{- $deploymentName := `}}{{ .Values.deploymentName | quote }}{{` -}}
                        {{- $liferayServiceAccountRoleName := `}}{{ .Values.liferayServiceAccountRoleName | quote }}{{` -}}
                        {{- $nodesSecurityGroupId := `}}{{ .Values.aws.nodesSecurityGroupId | quote }}{{` -}}
                        {{- $privateSubnetIds := `}}{{ .Values.aws.privateSubnetIds | quote }}{{` -}}
                        {{- $vpcId := `}}{{ .Values.aws.vpcId | quote }}{{` -}}

                        {{- $xr := .observed.composite.resource -}}

                        {{- $environmentId := $xr.spec.environmentId -}}
                        {{- $projectId := $xr.spec.projectId -}}
                        {{- $projectIdFull := printf "%s-%s" $projectId $environmentId -}}
                        {{- $uidHash := printf "%s-%s-%s" $accountId $deploymentName $projectIdFull | sha256sum | trunc 6 -}}
                        {{- $baseName := printf "%.18s-%s" $projectIdFull $uidHash -}}

                        {{- $managementPolicies := $xr.spec.deletionProtection | ternary (list "Create" "Observe" "Update") (list "*") | toJson -}}
                        {{- $managementPoliciesNoUpdate := $xr.spec.deletionProtection | ternary (list "Create" "Observe") (list "Create" "Delete" "Observe") | toJson -}}
                        {{- $namespace := $xr.metadata.namespace -}}
                        {{- $oidcProvider := `}}{{ .Values.aws.oidcProvider | quote }}{{` -}}
                        {{- $privateSubnetIdsList := $privateSubnetIds | fromJson -}}

                        {{- $backupSpec := $xr.spec.backup | default dict -}}

                        {{- if $backupSpec.enabled }}
                        ---
                        apiVersion: s3.aws.m.upbound.io/v1beta1
                        kind: Bucket
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $baseName }}-argo-wf
                                gotemplating.fn.crossplane.io/composition-resource-name: argo-wf
                            labels:
                                app: liferay
                                component: argo-wf
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $baseName }}-argo-wf
                        spec:
                            forProvider:
                                region: {{ $backupSpec.region }}
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: s3.aws.m.upbound.io/v1beta1
                        kind: BucketVersioning
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $baseName }}-argo-wf-versioning
                                gotemplating.fn.crossplane.io/composition-resource-name: argo-wf-versioning
                            labels:
                                app: liferay
                                component: argo-wf
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $baseName }}-argo-wf-versioning
                        spec:
                            forProvider:
                                bucketSelector:
                                    matchLabels:
                                        app: liferay
                                        component: argo-wf
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                                region: {{ $backupSpec.region }}
                                versioningConfiguration:
                                    status: Enabled
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: backup.aws.m.upbound.io/v1beta1
                        kind: Plan
                        metadata:
                            annotations:
                                gotemplating.fn.crossplane.io/composition-resource-name: backup-plan
                            labels:
                                app: liferay
                                component: backup-plan
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $baseName }}-backup-plan
                        spec:
                            forProvider:
                                name: {{ $baseName }}-backup-plan
                                region: {{ $backupSpec.region }}
                                rule:
                                    {{- range $rule := $backupSpec.rules }}
                                    -   lifecycle:
                                            deleteAfter: {{ .retentionDays }}
                                        ruleName: {{ .ruleName }}
                                        schedule: {{ .schedule | quote }}
                                        startWindow: {{ .startWindow }}
                                        targetVaultNameSelector:
                                            matchLabels:
                                                app: liferay
                                                component: backup-vault
                                                environmentId: {{ $environmentId }}
                                                projectId: {{ $projectId }}
                                    {{- end }}
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: iam.aws.m.upbound.io/v1beta1
                        kind: Policy
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $baseName }}-backup-restore-policy
                                gotemplating.fn.crossplane.io/composition-resource-name: backup-restore-policy
                            labels:
                                app: liferay
                                component: backup-restore-role
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $baseName }}-backup-restore-policy
                        spec:
                            forProvider:
                                policy: |
                                    {
                                        "Statement": [
                                            {
                                                "Action": [
                                                    "s3:DeleteObject",
                                                    "s3:GetObject",
                                                    "s3:ListBucket",
                                                    "s3:PutObject"
                                                ],
                                                "Effect": "Allow",
                                                "Resource": [
                                                    "arn:aws:s3:::{{ $baseName }}-argo-wf",
                                                    "arn:aws:s3:::{{ $baseName }}-argo-wf/*"
                                                ]
                                            },
                                            {
                                                "Action": "iam:PassRole",
                                                "Effect": "Allow",
                                                "Resource": "arn:aws:iam::{{ $accountId }}:role/{{ $baseName }}-backup-service-role"
                                            },
                                            {
                                                "Action": [
                                                    "backup:DescribeRecoveryPoint",
                                                    "backup:DescribeRestoreJob",
                                                    "backup:GetRecoveryPointRestoreMetadata",
                                                    "backup:ListRecoveryPointsByBackupVault",
                                                    "backup:StartRestoreJob"
                                                ],
                                                "Effect": "Allow",
                                                "Resource": "*"
                                            }
                                        ],
                                        "Version": "2012-10-17"
                                    }
                        ---
                        apiVersion: iam.aws.m.upbound.io/v1beta1
                        kind: Role
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $baseName }}-backup-restore-role
                                gotemplating.fn.crossplane.io/composition-resource-name: backup-restore-role
                            labels:
                                app: liferay
                                component: backup-restore-role
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $baseName }}-backup-restore-role
                        spec:
                            forProvider:
                                assumeRolePolicy: |
                                    {
                                        "Statement": [
                                            {
                                                "Action": "sts:AssumeRoleWithWebIdentity",
                                                "Condition": {
                                                    "StringEquals": {
                                                        "{{ $oidcProvider }}:aud": "sts.amazonaws.com",
                                                        "{{ $oidcProvider }}:sub": "system:serviceaccount:{{ $namespace }}:backup-restore"
                                                    }
                                                },
                                                "Effect": "Allow",
                                                "Principal": {
                                                    "Federated": "arn:aws:iam::{{ $accountId }}:oidc-provider/{{ $oidcProvider }}"
                                                }
                                            }
                                        ],
                                        "Version": "2012-10-17"
                                    }
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: iam.aws.m.upbound.io/v1beta1
                        kind: Role
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $baseName }}-backup-service-role
                                gotemplating.fn.crossplane.io/composition-resource-name: backup-service-role
                            labels:
                                app: liferay
                                component: backup-service-role
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $baseName }}-backup-service-role
                        spec:
                            forProvider:
                                assumeRolePolicy: |
                                    {
                                        "Statement": [
                                            {
                                                "Action": "sts:AssumeRole",
                                                "Effect": "Allow",
                                                "Principal": {
                                                    "Service": "backup.amazonaws.com"
                                                }
                                            }
                                        ],
                                        "Version": "2012-10-17"
                                    }
                                managedPolicyArns:
                                    -   arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
                                    -   arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForRestores
                                    -   arn:aws:iam::aws:policy/AWSBackupServiceRolePolicyForS3Backup
                                    -   arn:aws:iam::aws:policy/AWSBackupServiceRolePolicyForS3Restore
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: iam.aws.m.upbound.io/v1beta1
                        kind: RolePolicyAttachment
                        metadata:
                            annotations:
                                gotemplating.fn.crossplane.io/composition-resource-name: backup-restore-role-policy-attachment
                            labels:
                                app: liferay
                                component: backup-restore-role
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $baseName }}-backup-restore-role-policy-attachment
                        spec:
                            forProvider:
                                policyArnSelector:
                                    matchLabels:
                                        app: liferay
                                        component: backup-restore-role
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                                roleSelector:
                                    matchLabels:
                                        app: liferay
                                        component: backup-restore-role
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: backup.aws.m.upbound.io/v1beta1
                        kind: Selection
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $baseName }}-by-tags-selection
                                gotemplating.fn.crossplane.io/composition-resource-name: by-tags-selection
                            labels:
                                app: liferay
                                component: backup-selection
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $baseName }}-by-tags-selection
                        spec:
                            forProvider:
                                condition:
                                    -   stringEquals:
                                        -   key: aws:ResourceTag/Active
                                            value: "true"
                                        -   key: aws:ResourceTag/Backup
                                            value: "true"
                                        -   key: aws:ResourceTag/DeploymentName
                                            value: {{ $deploymentName }}
                                iamRoleArnSelector:
                                    matchLabels:
                                        app: liferay
                                        component: backup-service-role
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                                name: {{ $baseName }}-by-tags-selection
                                planIdSelector:
                                    matchLabels:
                                        app: liferay
                                        component: backup-plan
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                                region: {{ $backupSpec.region }}
                                resources: ["*"]
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: backup.aws.m.upbound.io/v1beta1
                        kind: Vault
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $baseName }}-backup-vault
                                gotemplating.fn.crossplane.io/composition-resource-name: backup-vault
                            labels:
                                app: liferay
                                component: backup-vault
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $baseName }}-backup-vault
                        spec:
                            forProvider:
                                region: {{ $backupSpec.region }}
                            managementPolicies: {{ $managementPolicies }}
                        {{- end }}

                        {{- $databaseInstanceManagementPolicies := $backupSpec.enabled | ternary ((list "*") | toJson) $managementPolicies -}}
                        {{- $databaseSpec := $xr.spec.database }}

                        {{- range $dataPlane := list "blue" "green" -}}
                        {{- if or (eq $dataPlane $xr.spec.activeDataPlane) $databaseSpec.isRestoring }}
                        ---
                        apiVersion: rds.aws.m.upbound.io/v1beta1
                        kind: Instance
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $baseName }}-database-{{ $dataPlane }}
                                gotemplating.fn.crossplane.io/composition-resource-name: database-{{ $dataPlane }}
                            labels:
                                app: liferay
                                component: database
                                dataPlane: {{ $dataPlane }}
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $baseName }}-database-{{ $dataPlane }}
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                allocatedStorage: {{ $databaseSpec.storageGB }}
                                autoGeneratePassword: true
                                backupRetentionPeriod: 7
                                dbName: lportal
                                dbSubnetGroupNameSelector:
                                    matchLabels:
                                        app: liferay
                                        component: database-subnet-group
                                        dataPlane: {{ $dataPlane }}
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                                engine: postgres
                                engineVersion: {{ $databaseSpec.engineVersion | quote }}
                                identifier: {{ $baseName }}-database-{{ $dataPlane }}
                                instanceClass: {{ $databaseSpec.instanceClass }}
                                multiAz: false
                                passwordSecretRef:
                                    key: password
                                    name: liferay-database-{{ $dataPlane }}-password
                                region: {{ $databaseSpec.region }}
                                skipFinalSnapshot: true
                                {{- if and (ne $dataPlane $xr.spec.activeDataPlane) $databaseSpec.snapshotIdentifier }}
                                snapshotIdentifier: {{ $databaseSpec.snapshotIdentifier }}
                                {{- end }}
                                storageType: gp3
                                username: {{ $databaseSpec.username }}
                                vpcSecurityGroupIdSelector:
                                    matchLabels:
                                        app: liferay
                                        component: database-security-group
                                        dataPlane: {{ $dataPlane }}
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                                tags:
                                    Active: {{ printf "%t" (eq $dataPlane $xr.spec.activeDataPlane) }}
                                    Backup: true
                                    Name: {{ $baseName }}-database-{{ $dataPlane }}
                            managementPolicies: {{ $databaseInstanceManagementPolicies }}
                            writeConnectionSecretToRef:
                                name: liferay-database-{{ $dataPlane }}-credentials
                        ---
                        apiVersion: ec2.aws.m.upbound.io/v1beta1
                        kind: SecurityGroup
                        metadata:
                            annotations:
                                gotemplating.fn.crossplane.io/composition-resource-name: database-security-group-{{ $dataPlane }}
                            labels:
                                app: liferay
                                component: database-security-group
                                dataPlane: {{ $dataPlane }}
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                region: {{ $databaseSpec.region }}
                                tags:
                                    Name: {{ $baseName }}-database-security-group-{{ $dataPlane }}
                                vpcId: {{ $vpcId }}
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: ec2.aws.m.upbound.io/v1beta1
                        kind: SecurityGroupIngressRule
                        metadata:
                            annotations:
                                gotemplating.fn.crossplane.io/composition-resource-name: database-security-group-ingress-{{ $dataPlane }}
                            labels:
                                app: liferay
                                component: database-security-group-ingress
                                dataPlane: {{ $dataPlane }}
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                fromPort: 5432
                                ipProtocol: tcp
                                referencedSecurityGroupId: {{ $nodesSecurityGroupId }}
                                region: {{ $databaseSpec.region }}
                                securityGroupIdSelector:
                                    matchLabels:
                                        app: liferay
                                        component: database-security-group
                                        dataPlane: {{ $dataPlane }}
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                                toPort: 5432
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: rds.aws.m.upbound.io/v1beta1
                        kind: SubnetGroup
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $baseName }}-database-subnet-group-{{ $dataPlane }}
                                gotemplating.fn.crossplane.io/composition-resource-name: database-subnet-group-{{ $dataPlane }}
                            labels:
                                app: liferay
                                component: database-subnet-group
                                dataPlane: {{ $dataPlane }}
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $baseName }}-database-subnet-group-{{ $dataPlane }}
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                region: {{ $databaseSpec.region }}
                                subnetIds: {{ $privateSubnetIdsList | toJson }}
                                tags:
                                    Name: {{ $baseName }}-database-{{ $dataPlane }}-subnets
                            managementPolicies: {{ $managementPolicies }}
                        {{- end }}
                        {{- end -}}

                        {{- $overlayBucketName := printf "%s-overlay-%s" $deploymentName $baseName -}}
                        {{- $overlaySpec := $xr.spec.overlay }}
                        ---
                        apiVersion: s3.aws.m.upbound.io/v1beta1
                        kind: Bucket
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-bucket
                            labels:
                                app: liferay
                                component: overlay
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $overlayBucketName }}
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                region: {{ $overlaySpec.region }}
                                tags:
                                    Name: {{ $overlayBucketName }}
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: s3.aws.m.upbound.io/v1beta1
                        kind: BucketLifecycleConfiguration
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-bucket-lifecycle
                            labels:
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $overlayBucketName }}
                        spec:
                            forProvider:
                                bucketSelector:
                                    matchLabels:
                                        app: liferay
                                        component: overlay
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                                region: {{ $overlaySpec.region }}
                                rule:
                                    -   abortIncompleteMultipartUpload:
                                            -   daysAfterInitiation: 7
                                        id: abort-incomplete-multipart-upload
                                        status: Enabled
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: s3.aws.m.upbound.io/v1beta1
                        kind: BucketPublicAccessBlock
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}-bucket-public-access-block
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-bucket-public-access-block
                            labels:
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $overlayBucketName }}
                        spec:
                            forProvider:
                                blockPublicAcls: true
                                blockPublicPolicy: true
                                bucketSelector:
                                    matchLabels:
                                        app: liferay
                                        component: overlay
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                                ignorePublicAcls: true
                                region: {{ $overlaySpec.region }}
                                restrictPublicBuckets: true
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: s3.aws.m.upbound.io/v1beta1
                        kind: BucketVersioning
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}-bucket-versioning
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-bucket-versioning
                            labels:
                                app: liferay
                                component: overlay-versioning
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $overlayBucketName }}
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                bucketSelector:
                                    matchLabels:
                                        app: liferay
                                        component: overlay
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                                    namespace: {{ $namespace }}
                                region: {{ $overlaySpec.region }}
                                versioningConfiguration:
                                    status: Enabled
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: iam.aws.m.upbound.io/v1beta1
                        kind: Policy
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}-upload-only-policy
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-upload-only-policy
                            labels:
                                app: liferay
                                aws.liferay.com/username: {{ $overlayBucketName }}-ci-uploader
                                component: overlay-upload-only-policy
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $overlayBucketName }}-upload-only
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                policy: |
                                    {
                                        "Statement": [
                                            {
                                                "Action": [
                                                    "s3:ListBucket",
                                                    "s3:PutObject"
                                                ],
                                                "Effect": "Allow",
                                                "Resource": [
                                                    "arn:aws:s3:::{{ $overlayBucketName }}"
                                                ],
                                                "Sid": "AllowListBucket"
                                            },
                                            {
                                                "Action": [
                                                    "s3:PutObject"
                                                ],
                                                "Effect": "Allow",
                                                "Resource": [
                                                    "arn:aws:s3:::{{ $overlayBucketName }}/*"
                                                ],
                                                "Sid": "AllowPutBucket"
                                            },
                                            {
                                                "Action": [
                                                    "s3:DeleteObject",
                                                    "s3:DeleteObjectVersion"
                                                ],
                                                "Effect": "Deny",
                                                "Resource": [
                                                    "arn:aws:s3:::{{ $overlayBucketName }}",
                                                    "arn:aws:s3:::{{ $overlayBucketName }}/*"
                                                ],
                                                "Sid": "DenyDeleteBucket"
                                            }
                                        ],
                                       "Version": "2012-10-17"
                                    }
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: iam.aws.m.upbound.io/v1beta1
                        kind: User
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}-ci-uploader-user
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-ci-uploader-user
                            labels:
                                aws.liferay.com/username: {{ $overlayBucketName }}-ci-uploader
                            name: {{ $overlayBucketName }}-ci-uploader
                            namespace: {{ $namespace }}
                        spec:
                            forProvider: {}
                        ---
                        apiVersion: iam.aws.m.upbound.io/v1beta1
                        kind: UserPolicyAttachment
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}-ci-uploader-user-policy-attachment
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-ci-uploader-user-policy-attachment
                            name: {{ $overlayBucketName }}-ci-uploader
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                policyArnSelector:
                                    matchLabels:
                                        aws.liferay.com/username: {{ $overlayBucketName }}-ci-uploader
                                userSelector:
                                    matchLabels:
                                        aws.liferay.com/username: {{ $overlayBucketName }}-ci-uploader
                        ---
                        apiVersion: iam.aws.m.upbound.io/v1beta1
                        kind: AccessKey
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $overlayBucketName }}-ci-uploader-access-key
                                gotemplating.fn.crossplane.io/composition-resource-name: overlay-ci-uploader-access-key
                            name: {{ $overlayBucketName }}-ci-uploader
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                userSelector:
                                    matchLabels:
                                        aws.liferay.com/username: {{ $overlayBucketName }}-ci-uploader
                            writeConnectionSecretToRef:
                                name: {{ $overlayBucketName }}-ci-uploader-access-key

                        {{- $storageName := printf "%s-%s-storage" $accountId $baseName -}}
                        {{- $storageSpec := $xr.spec.storage }}

                        {{- range $dataPlane := list "blue" "green" }}
                        ---
                        apiVersion: s3.aws.m.upbound.io/v1beta1
                        kind: Bucket
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $storageName }}-{{ $dataPlane }}
                                gotemplating.fn.crossplane.io/composition-resource-name: storage-{{ $dataPlane }}
                            labels:
                                app: liferay
                                component: storage
                                dataPlane: {{ $dataPlane }}
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $storageName }}-{{ $dataPlane }}
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                region: {{ $storageSpec.region }}
                                tags:
                                    Active: {{ printf "%t" (eq $dataPlane $xr.spec.activeDataPlane) }}
                                    Backup: true
                                    Name: {{ $storageName }}-{{ $dataPlane }}
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: s3.aws.m.upbound.io/v1beta1
                        kind: BucketLifecycleConfiguration
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $storageName }}-lifecycle-{{ $dataPlane }}
                                gotemplating.fn.crossplane.io/composition-resource-name: storage-lifecycle-{{ $dataPlane }}
                            labels:
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $storageName }}-lifecycle-{{ $dataPlane }}
                        spec:
                            forProvider:
                                bucketSelector:
                                    matchLabels:
                                        app: liferay
                                        component: storage
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                                        dataPlane: {{ $dataPlane }}
                                region: {{ $storageSpec.region }}
                                rule:
                                    -   abortIncompleteMultipartUpload:
                                            -   daysAfterInitiation: 7
                                        id: abort-incomplete-multipart-upload
                                        status: Enabled
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: s3.aws.m.upbound.io/v1beta1
                        kind: BucketPublicAccessBlock
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $storageName }}-public-access-block-{{ $dataPlane }}
                                gotemplating.fn.crossplane.io/composition-resource-name: storage-public-access-block-{{ $dataPlane }}
                            labels:
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $storageName }}-public-access-block-{{ $dataPlane }}
                        spec:
                            forProvider:
                                blockPublicAcls: true
                                blockPublicPolicy: true
                                bucketSelector:
                                    matchLabels:
                                        app: liferay
                                        component: storage
                                        dataPlane: {{ $dataPlane }}
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                                ignorePublicAcls: true
                                region: {{ $storageSpec.region }}
                                restrictPublicBuckets: true
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: s3.aws.m.upbound.io/v1beta1
                        kind: BucketVersioning
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $storageName }}-versioning-{{ $dataPlane }}
                                gotemplating.fn.crossplane.io/composition-resource-name: storage-versioning-{{ $dataPlane }}
                            labels:
                                app: liferay
                                component: storage-versioning
                                dataPlane: {{ $dataPlane }}
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $storageName }}-versioning-{{ $dataPlane }}
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                bucketSelector:
                                    matchLabels:
                                        app: liferay
                                        component: storage
                                        dataPlane: {{ $dataPlane }}
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                                    namespace: {{ $namespace }}
                                region: {{ $storageSpec.region }}
                                versioningConfiguration:
                                    status: Enabled
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: iam.aws.m.upbound.io/v1beta1
                        kind: Policy
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $storageName }}-policy-{{ $dataPlane }}
                                gotemplating.fn.crossplane.io/composition-resource-name: storage-policy-{{ $dataPlane }}
                            labels:
                                app: liferay
                                component: storage-policy
                                dataPlane: {{ $dataPlane }}
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $storageName }}-policy-{{ $dataPlane }}
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                policy: |
                                    {
                                        "Statement": [
                                            {
                                                "Action": [
                                                    "s3:DeleteObject",
                                                    "s3:GetObject",
                                                    "s3:ListBucket",
                                                    "s3:PutObject"
                                                ],
                                                "Effect": "Allow",
                                                "Resource": [
                                                    "arn:aws:s3:::{{ $storageName }}-{{ $dataPlane }}",
                                                    "arn:aws:s3:::{{ $storageName }}-{{ $dataPlane }}/*"
                                                ]
                                            }
                                        ],
                                        "Version": "2012-10-17"
                                    }
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: iam.aws.m.upbound.io/v1beta1
                        kind: RolePolicyAttachment
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $storageName }}-policy-attachment-{{ $dataPlane }}
                                gotemplating.fn.crossplane.io/composition-resource-name: storage-policy-attachment-{{ $dataPlane }}
                            labels:
                                app: liferay
                                component: storage-policy-attachment
                                dataPlane: {{ $dataPlane }}
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $storageName }}-policy-attachment-{{ $dataPlane }}
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                policyArnSelector:
                                    matchLabels:
                                        app: liferay
                                        component: storage-policy
                                        dataPlane: {{ $dataPlane }}
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                                role: {{ $liferayServiceAccountRoleName }}
                            managementPolicies: {{ $managementPolicies }}
                        {{- end }}

                        {{- $searchName := printf "%.21s-search" $baseName -}}
                        {{- $searchSpec := $xr.spec.search }}

                        ---
                        apiVersion: opensearch.aws.m.upbound.io/v1beta1
                        kind: Domain
                        metadata:
                            annotations:
                                crossplane.io/external-name: arn:aws:es:{{ $searchSpec.region }}:{{ $accountId }}:domain/{{ $searchName }}
                                gotemplating.fn.crossplane.io/composition-resource-name: search
                            labels:
                                app: liferay
                                component: search
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $searchName }}
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                advancedSecurityOptions:
                                    enabled: true
                                    internalUserDatabaseEnabled: true
                                    masterUserOptions:
                                        masterUserName: {{ $searchSpec.username }}
                                        masterUserPasswordSecretRef:
                                            key: password
                                            name: liferay-search-password
                                clusterConfig:
                                    instanceCount: {{ $searchSpec.instanceCount }}
                                    instanceType: {{ $searchSpec.instanceType }}
                                    zoneAwarenessConfig:
                                        availabilityZoneCount: 2
                                    zoneAwarenessEnabled: true
                                domainEndpointOptions:
                                    enforceHttps: true
                                    tlsSecurityPolicy: Policy-Min-TLS-1-2-2019-07
                                domainName: {{ $searchName }}
                                ebsOptions:
                                    ebsEnabled: true
                                    volumeSize: 20
                                    volumeType: gp3
                                encryptAtRest:
                                    enabled: true
                                engineVersion: {{ $searchSpec.engineVersion | quote }}
                                nodeToNodeEncryption:
                                    enabled: true
                                region: {{ $searchSpec.region }}
                                tags:
                                    Name: {{ $searchName }}
                                vpcOptions:
                                    securityGroupIdSelector:
                                        matchLabels:
                                            app: liferay
                                            component: search-security-group
                                            environmentId: {{ $environmentId }}
                                            projectId: {{ $projectId }}
                                    subnetIds: {{ slice $privateSubnetIdsList 0 2 | toJson }}
                            managementPolicies: {{ $managementPolicies }}
                            writeConnectionSecretToRef:
                                name: liferay-search-credentials
                        ---
                        apiVersion: opensearch.aws.m.upbound.io/v1beta1
                        kind: DomainPolicy
                        metadata:
                            annotations:
                                gotemplating.fn.crossplane.io/composition-resource-name: search-policy
                            labels:
                                app: liferay
                                component: search-policy
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $searchName }}-policy
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                accessPolicies: |
                                    {
                                        "Statement": [
                                            {
                                                "Action": "es:*",
                                                "Effect": "Allow",
                                                "Principal": {
                                                    "AWS": "*"
                                                },
                                                "Resource": "arn:aws:es:{{ $searchSpec.region }}:{{ $accountId }}:domain/{{ $searchName }}/*"
                                            }
                                        ],
                                        "Version": "2012-10-17"
                                    }
                                domainName: {{ $searchName }}
                                region: {{ $searchSpec.region }}
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: kubernetes.m.crossplane.io/v1alpha1
                        kind: Object
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $baseName }}-search-password-secret
                                gotemplating.fn.crossplane.io/composition-resource-name: search-password-secret
                            labels:
                                app: liferay
                                component: search-password-secret
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $searchName }}-password-secret
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                manifest:
                                    apiVersion: v1
                                    kind: Secret
                                    metadata:
                                        labels:
                                            app: liferay
                                            component: search-password-secret
                                            environmentId: {{ $environmentId }}
                                            projectId: {{ $projectId }}
                                        name: liferay-search-password
                                        namespace: {{ $namespace }}
                                    stringData:
                                        password: {{ print (randAlphaNum 16) "!#%+7QZ_b" | shuffle | quote }}
                                    type: Opaque
                            managementPolicies: {{ $managementPoliciesNoUpdate }}
                        ---
                        apiVersion: ec2.aws.m.upbound.io/v1beta1
                        kind: SecurityGroup
                        metadata:
                            annotations:
                                gotemplating.fn.crossplane.io/composition-resource-name: search-security-group
                            labels:
                                app: liferay
                                component: search-security-group
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                region: {{ $searchSpec.region }}
                                tags:
                                    Name: {{ $searchName }}-security-group
                                vpcId: {{ $vpcId }}
                            managementPolicies: {{ $managementPolicies }}
                        ---
                        apiVersion: ec2.aws.m.upbound.io/v1beta1
                        kind: SecurityGroupIngressRule
                        metadata:
                            annotations:
                                gotemplating.fn.crossplane.io/composition-resource-name: search-security-group-ingress
                            labels:
                                app: liferay
                                component: search-security-group-ingress
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                fromPort: 443
                                ipProtocol: tcp
                                referencedSecurityGroupId: {{ $nodesSecurityGroupId }}
                                region: {{ $searchSpec.region }}
                                securityGroupIdSelector:
                                    matchLabels:
                                        app: liferay
                                        component: search-security-group
                                        environmentId: {{ $environmentId }}
                                        projectId: {{ $projectId }}
                                toPort: 443
                            managementPolicies: {{ $managementPolicies }}
                        `}}
                kind: GoTemplate
                source: Inline
            step: liferay-infrastructure
        -   functionRef:
                name: function-go-templating
            input:
                apiVersion: template.fn.crossplane.io/v1beta1
                inline:
                    template: |
                        {{`
                        {{- $accountId := `}}{{ .Values.aws.accountId | quote }}{{` -}}
                        {{- $deploymentName := `}}{{ .Values.deploymentName | quote }}{{` -}}

                        {{- $xr := .observed.composite.resource -}}

                        {{- $environmentId := $xr.spec.environmentId -}}
                        {{- $projectId := $xr.spec.projectId -}}
                        {{- $projectIdFull := printf "%s-%s" $projectId $environmentId -}}
                        {{- $uidHash := printf "%s-%s-%s" $accountId $deploymentName $projectIdFull | sha256sum | trunc 6 -}}
                        {{- $baseName := printf "%.18s-%s" $projectIdFull $uidHash -}}

                        {{- $managementPolicies := $xr.spec.deletionProtection | ternary (list "Create" "Observe" "Update") (list "*") | toJson -}}
                        {{- $namespace := $xr.metadata.namespace -}}

                        {{- $databaseResourceName := printf "database-%s" $xr.spec.activeDataPlane -}}
                        {{- $searchResourceName := "search" -}}
                        {{- $storageResourceName := printf "storage-%s" $xr.spec.activeDataPlane -}}

                        {{- $database := dict -}}
                        {{- $search := dict -}}
                        {{- $storage := dict -}}

                        {{- if .observed.resources -}}
                            {{- $database = index .observed.resources $databaseResourceName -}}
                            {{- $search = index .observed.resources $searchResourceName -}}
                            {{- $storage = index .observed.resources $storageResourceName -}}
                        {{- end -}}

                        {{- $databaseAddress := "" -}}
                        {{- $databasePassword := "" -}}
                        {{- $databasePort := "" -}}
                        {{- if kindIs "map" $database -}}
                            {{- with $database }}
                                {{- with .connectionDetails }}
                                    {{- $databasePassword = .password | toString | b64dec -}}
                                {{- end -}}
                                {{- with .resource }}
                                    {{- with .status }}
                                        {{- with .atProvider }}
                                            {{- $databaseAddress = .address -}}
                                            {{- $databasePort = .port | toString -}}
                                        {{- end -}}
                                    {{- end -}}
                                {{- end -}}
                            {{- end -}}
                        {{- end -}}

                        {{- $searchEndpoint := "" -}}
                        {{- $searchPassword := "" -}}
                        {{- if kindIs "map" $search -}}
                            {{- with $search }}
                                {{- with .connectionDetails }}
                                    {{- $searchPassword = index . "attribute.advanced_security_options.0.master_user_options.0.master_user_password" | toString | b64dec -}}
                                {{- end -}}
                                {{- with .resource }}
                                    {{- with .status }}
                                        {{- with .atProvider }}
                                            {{- $searchEndpoint = .endpoint -}}
                                        {{- end -}}
                                    {{- end -}}
                                {{- end -}}
                            {{- end -}}
                        {{- end -}}

                        {{- $storageName := "" -}}
                        {{- if kindIs "map" $storage -}}
                            {{- with $storage }}
                                {{- with .resource }}
                                    {{- with .metadata }}
                                        {{- with .annotations }}
                                            {{- $storageName = index . "crossplane.io/external-name" -}}
                                        {{- end -}}
                                    {{- end -}}
                                {{- end -}}
                            {{- end -}}
                        {{- end -}}

                        {{- if and $databaseAddress $databasePassword $searchEndpoint $storageName }}
                        ---
                        apiVersion: kubernetes.m.crossplane.io/v1alpha1
                        kind: Object
                        metadata:
                            annotations:
                                crossplane.io/external-name: {{ $baseName }}-managed-service-details-secret
                                gotemplating.fn.crossplane.io/composition-resource-name: managed-service-details-secret
                            labels:
                                app: liferay
                                component: managed-service-details-secret
                                environmentId: {{ $environmentId }}
                                projectId: {{ $projectId }}
                            name: {{ $baseName }}-managed-service-details-secret
                            namespace: {{ $namespace }}
                        spec:
                            forProvider:
                                manifest:
                                    apiVersion: v1
                                    kind: Secret
                                    metadata:
                                        labels:
                                            app: liferay
                                            component: managed-service-details-secret
                                            environmentId: {{ $environmentId }}
                                            projectId: {{ $projectId }}
                                        name: managed-service-details
                                        namespace: {{ $namespace }}
                                        ownerReferences:
                                            -   apiVersion: aws.liferay.com/v1alpha1
                                                blockOwnerDeletion: true
                                                controller: true
                                                kind: LiferayInfrastructure
                                                name: {{ .observed.composite.resource.metadata.name }}
                                                uid: {{ .observed.composite.resource.metadata.uid }}
                                    stringData:
                                        DATABASE_ENDPOINT: {{ $databaseAddress | toString }}
                                        DATABASE_PASSWORD: {{ $databasePassword | default "" | toString }}
                                        DATABASE_PORT: {{ $databasePort | default 5432 | quote }}
                                        DATABASE_USERNAME: {{ $database.resource.spec.forProvider.username | toString }}
                                        OPENSEARCH_ENDPOINT: {{ $searchEndpoint | toString }}
                                        OPENSEARCH_PASSWORD: {{ $searchPassword | default "" | toString }}
                                        OPENSEARCH_USERNAME: {{ $search.resource.spec.forProvider.advancedSecurityOptions.masterUserOptions.masterUserName | toString }}
                                        S3_BUCKET_ID: {{ $storageName | toString }}
                                        S3_BUCKET_REGION: {{ $storage.resource.spec.forProvider.region | toString }}
                                    type: Opaque
                            managementPolicies: {{ $managementPolicies }}
                        {{- end }}
                        ---
                        apiVersion: aws.liferay.com/v1alpha1
                        kind: LiferayInfrastructure
                        status:
                        {{- if and $databaseAddress $databasePassword $searchEndpoint $storageName }}
                            managedServiceDetailsReady: true
                        {{- else }}
                            managedServiceDetailsReady: false
                        {{- end }}
                        `}}
                kind: GoTemplate
                source: Inline
            step: managed-service-details-secret
        -   functionRef:
                name: function-tag-manager
            input:
                addTags:
                    -   fromFieldPath: spec.commonTags
                        type: FromCompositeFieldPath
                    -   tags:
                            DeploymentName: {{ .Values.deploymentName }}
                        type: FromValue
                apiVersion: tag-manager.fn.crossplane.io/v1beta1
                kind: ManagedTags
            step: apply-default-tags
        -   functionRef:
                name: function-auto-ready
            step: auto-detect-ready-composed-resources