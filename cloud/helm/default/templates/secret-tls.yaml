{{- if .Values.ingress.tls }}
{{- range $tls := .Values.ingress.tls }}
apiVersion: v1
data:
    tls.crt: {{ $.Files.Get $tls.certFilePath | b64enc }}
    tls.key: {{ $.Files.Get $tls.keyFilePath | b64enc }}
kind: Secret
metadata:
    name: {{ $tls.secretName }}
    namespace: {{ include "liferay.namespace" $ }}
type: kubernetes.io/tls
---
{{- end }}
{{- end }}