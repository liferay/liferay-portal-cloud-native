{{- if .Values.enabled -}}
{{- $elasticsearch := .Values.search.elasticsearch | default dict -}}
{{- $overlay := .Values.overlay | default dict -}}
{{- $opensearch := .Values.search.opensearch | default dict -}}
{{- $storage := .Values.storage | default dict -}}
{{- $storageBlue := $storage.blue | default dict -}}
{{- $storageGreen := $storage.green | default dict -}}
apiVersion: aws.liferay.com/v1alpha1
kind: LiferayInfrastructure
metadata:
    annotations:
        argocd.argoproj.io/sync-wave: "-20"
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
spec:
    backup: {{ .Values.backup | toYaml | nindent 8 }}
    commonTags:
        EnvironmentId: {{ .Values.environmentId }}
        ProjectId: {{ .Values.projectId }}
    database: {{ .Values.database | toYaml | nindent 8 }}
    deletionProtection: {{ .Values.deletionProtection | default false }}
    environmentId: {{ .Values.environmentId }}
    overlay:
        region: {{ $overlay.region | default "us-west-2" | quote }}
    projectId: {{ .Values.projectId }}
    search:
        opensearch:
            engineVersion: {{ $opensearch.engineVersion | default "OpenSearch_2.15" | quote }}
            instanceCount: {{ $opensearch.instanceCount | default 2 }}
            instanceType: {{ $opensearch.instanceType | default "t3.small.search" | quote }}
            region: {{ $opensearch.region | default "us-west-2" | quote }}
            username: {{ $opensearch.username | default "liferay_search_admin" | quote }}
        {{- if $elasticsearch.enabled }}
        elasticsearch:
            maxMapCount: {{ $elasticsearch.maxMapCount }}
            name: {{ include "elasticsearch.name" . }}
            nodeCount: {{ $elasticsearch.nodeCount }}
            version: {{ $elasticsearch.version | quote }}
            volumeSize: {{ $elasticsearch.volumeSize | quote }}
        {{- end }}
    storage: {{ .Values.storage | toYaml | nindent 8 }}
{{- end -}}